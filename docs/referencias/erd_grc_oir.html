<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GRC-OIR — Modelo de datos (ERD)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--surface3:#e6e5de;
  --border:#e0dfd8;--border-med:#c8c7bf;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --mono:'SF Mono','Cascadia Code','Consolas','Courier New',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.02em;color:#534AB7}
.tb-title{font-size:13px;color:var(--text2)}
.legend{display:flex;gap:10px;margin-left:auto;align-items:center;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.zbtns{display:flex;gap:4px;margin-left:8px}
.zbtn{height:26px;width:26px;border-radius:6px;border:1px solid var(--border-med);background:var(--surface);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.zbtn:hover{background:var(--surface2)}
.canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab}
.canvas-wrap.grabbing{cursor:grabbing}
.canvas{position:absolute;transform-origin:0 0}
.entity{position:absolute;background:var(--surface);border-radius:10px;border:1px solid var(--border);min-width:210px;box-shadow:0 2px 8px rgba(0,0,0,.06);user-select:none}
.ehead{padding:9px 13px;border-radius:9px 9px 0 0;border-bottom:1px solid var(--border);cursor:move}
.ename{font-size:13px;font-weight:600}
.ephase{font-size:10px;font-weight:500;margin-top:1px;letter-spacing:.04em;text-transform:uppercase}
.efields{padding:4px 0;max-height:220px;overflow-y:auto}
.frow{display:flex;align-items:center;gap:6px;padding:3px 13px;font-size:11.5px;transition:background .1s}
.frow:hover{background:var(--surface2)}
.ficon{font-size:10px;font-family:var(--mono);font-weight:600;width:14px;text-align:center;flex-shrink:0}
.fname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ftype{font-family:var(--mono);font-size:9.5px;color:var(--text3);white-space:nowrap}
.forigin{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:3px;white-space:nowrap}
.fo-calc{background:#E6F1FB;color:#0C447C}
.fo-deriv{background:#FAEEDA;color:#633806}
.fo-bool{background:#EAF3DE;color:#27500A}
.fo-cat{background:#EEEDFE;color:#3C3489}
.frow.pk .ficon{color:#854F0B} .frow.pk .fname{font-weight:600;color:#854F0B}
.frow.fk .ficon{color:#0C447C} .frow.fk .fname{color:#0C447C}
svg.lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

/* Detail panel */
.dpanel{position:absolute;right:14px;top:14px;width:310px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:50;display:none;max-height:calc(100vh - 80px);overflow:hidden;flex-direction:column}
.dpanel.show{display:flex}
.dp-h{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dp-title{font-size:14px;font-weight:600}
.dp-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
.dp-close:hover{background:var(--surface2)}
.dp-body{padding:12px 14px;overflow-y:auto;flex:1}
.dp-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:10px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.dp-sec:first-child{margin-top:0}
.dp-f{margin-bottom:8px;padding:6px 8px;border-radius:6px;background:var(--surface2);font-size:12px}
.dp-fn{font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px;margin-bottom:2px}
.dp-fd{color:var(--text2);line-height:1.4;margin-top:2px}
.dp-fm{font-family:var(--mono);font-size:10px;color:#534AB7;margin-top:2px}
.dp-badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 7px;border-radius:10px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">GRC·OIR</div>
  <div class="tb-title">Modelo de datos — ERD interactivo</div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#EEEDFE;border:1px solid var(--border-med)"></div>FASE 0</div><div class="leg"><div class="leg-dot" style="background:#E1F5EE;border:1px solid var(--border-med)"></div>FASE 1</div><div class="leg"><div class="leg-dot" style="background:#E6F1FB;border:1px solid var(--border-med)"></div>FASE 2</div><div class="leg"><div class="leg-dot" style="background:#FAEEDA;border:1px solid var(--border-med)"></div>FASE 3</div><div class="leg"><div class="leg-dot" style="background:#F1EFE8;border:1px solid var(--border-med)"></div>FASE 4</div><div class="leg"><div class="leg-dot" style="background:#FCEBEB;border:1px solid var(--border-med)"></div>FASE 5</div>
    <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:4px">🔑PK 🔗FK</span>
  </div>
  <div class="zbtns">
    <button class="zbtn" onclick="doZoom(.12)">+</button>
    <button class="zbtn" onclick="doZoom(-.12)">−</button>
    <button class="zbtn" onclick="resetView()" title="Reset vista">⌂</button>
  </div>
</div>
<div class="canvas-wrap" id="wrap">
  <div class="canvas" id="canvas">
    <svg class="lines" id="lines"></svg>
  </div>
</div>
<div class="dpanel" id="dpanel">
  <div class="dp-h"><div class="dp-title" id="dp-title"></div><div class="dp-close" onclick="closeDp()">×</div></div>
  <div class="dp-body" id="dp-body"></div>
</div>

0s | mencion","nullable":false},{"name":"tarifa_bruta","label":"Tarifa bruta","type":"DECIMAL(12,2)","origin":"input_manual","desc":"Precio de lista por spot","nullable":false},{"name":"descuento_pct","label":"% descuento","type":"DECIMAL(5,2)","origin":"input_manual","desc":"Descuento acordado","nullable":false},{"name":"tarifa_neta","label":"Tarifa neta","type":"DECIMAL(12,2)","origin":"calculado","desc":"Tarifa después de descuento","formula":"tarifa_bruta * (1 - descuento_pct / 100)","dependencies":["tarifa_bruta","descuento_pct"]},{"name":"vigencia_desde","label":"Vigencia desde","type":"DATE","origin":"input_manual","desc":"Inicio de vigencia","nullable":false},{"name":"vigencia_hasta","label":"Vigencia hasta","type":"DATE","origin":"input_manual","desc":"Fin de vigencia","nullable":false},{"name":"notas","label":"Notas","type":"TEXT","origin":"input_manual","desc":"Condiciones adicionales"},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = vigente","nullable":false},{"name":"created_at","label":"Fecha captura","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de captura","nullable":false},{"name":"created_by","label":"Capturado por","type":"UUID","origin":"relacion","desc":"Usuario que capturó","fk":true,"nullable":false}]},{"name":"MetodoPago","headerColor":"EEEDFE","headerTextColor":"3C3489","desc":"Catálogo de métodos de pago aceptados (transferencia, cheque, efectivo, etc.). Usado en facturas y cobranza.","fields":[{"name":"metodo_pago_id","label":"ID Método pago","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"clave_metodo","label":"Clave","type":"VARCHAR(20)","origin":"input_manual","desc":"Clave del método según catálogo SAT (ej. 01, 03, 99)","nullable":false,"unique":true},{"name":"descripcion_metodo","label":"Descripción","type":"VARCHAR(150)","origin":"input_manual","desc":"Descripción del método (Efectivo, Cheque nominativo, Transferencia electrónica)","nullable":false},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = activo","nullable":false}]},{"name":"CuentaContable","headerColor":"EEEDFE","headerTextColor":"3C3489","desc":"Catálogo de cuentas contables. Usado en facturas para clasificación contable.","fields":[{"name":"cuenta_contable_id","label":"ID Cuenta contable","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"codigo_cuenta","label":"Código cuenta","type":"VARCHAR(30)","origin":"input_manual","desc":"Código de la cuenta contable","nullable":false,"unique":true},{"name":"nombre_cuenta","label":"Nombre cuenta","type":"VARCHAR(200)","origin":"input_manual","desc":"Descripción de la cuenta","nullable":false},{"name":"tipo_cuenta","label":"Tipo","type":"ENUM","origin":"catalogo","desc":"ingreso | costo | gasto | activo | pasivo"},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = activo","nullable":false}]},{"name":"LayoutFactura","headerColor":"EEEDFE","headerTextColor":"3C3489","desc":"Catálogo de plantillas/layouts disponibles para imprimir facturas. Cada factura puede usar un layout distinto según cliente, empresa facturadora o tipo de operación.","fields":[{"name":"layout_factura_id","label":"ID Layout","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"nombre_layout","label":"Nombre layout","type":"VARCHAR(100)","origin":"input_manual","desc":"Nombre identificador del layout","nullable":false},{"name":"descripcion_layout","label":"Descripción","type":"VARCHAR(300)","origin":"input_manual","desc":"Descripción del uso o características del layout"},{"name":"archivo_plantilla_path","label":"Ruta plantilla","type":"VARCHAR(500)","origin":"input_manual","desc":"Ruta del archivo de plantilla (.html, .docx, etc.)"},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = activo","nullable":false}]},{"name":"Categoria","headerColor":"EEEDFE","headerTextColor":"3C3489","desc":"Catálogo de categorías comerciales de la venta (ej. Automotriz, Alimentos, Tecnología, Farmacéutica). Permite segmentar órdenes por categoría de producto/industria para reportes y análisis.","fields":[{"name":"categoria_id","label":"ID Categoría","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"nombre_categoria","label":"Nombre categoría","type":"VARCHAR(100)","origin":"input_manual","desc":"Nombre de la categoría (ej. Automotriz, Alimentos)","nullable":false},{"name":"descripcion_categoria","label":"Descripción","type":"VARCHAR(300)","origin":"input_manual","desc":"Descripción de la categoría"},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = activo","nullable":false},{"name":"created_at","label":"Fecha alta","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de alta","nullable":false}]},{"name":"Usuario","headerColor":"EEEDFE","headerTextColor":"3C3489","desc":"Usuario interno del sistema. Cada área tiene permisos diferenciados. Adicionalmente, ciertos campos sensibles tienen permisos a nivel de campo (ver LogCambioParametro).","fields":[{"name":"usuario_id","label":"ID Usuario","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"nombre_usuario","label":"Nombre completo","type":"VARCHAR(150)","origin":"input_manual","desc":"Nombre completo","nullable":false},{"name":"email","label":"Correo corporativo","type":"VARCHAR(150)","origin":"input_manual","desc":"Correo (login)","nullable":false,"unique":true},{"name":"area","label":"Área","type":"ENUM","origin":"catalogo","desc":"ventas | facturacion | tesoreria | cxc | cxp | direccion | nominas | admin","nullable":false},{"name":"roles_adicionales","label":"Roles adicionales","type":"TEXT","origin":"input_manual","desc":"Roles adicionales separados por coma (ej. \"admin_parametros\", \"auditor\"). Permite asignar permisos especiales sobre campos sensibles.","nullable":true,"comments":"Mecanismo para otorgar permisos sobre campos protegidos sin cambiar el área principal"},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = cuenta activa","nullable":false},{"name":"created_at","label":"Fecha alta","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de alta","nullable":false}]}]},{"label":"FASE 1 — Órdenes de Transmisión","color":"E1F5EE","textColor":"085041","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Flujo operativo central. El anunciante envía una orden (OrdenCliente) con los datos generales de la campaña. De ahí se derivan las órdenes internas (OrdenEstacion), siempre ligadas a la original. Asignar una orden interna significa programarla: estación, contrato, categoría, horarios, spots y precio. Después de la transmisión llega el reporte de lo realmente ejecutado (Verificación). Si no coincide, se editan las órdenes internas para reflejar la realidad. Solo cuando están ajustadas se cierran (orden_cerrada) — y solo entonces Facturación puede jalar la información.","entities":[{"name":"OrdenCliente","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Orden de transmisión recibida del anunciante (cliente comercial) o su agencia. Es el documento de referencia para facturación y cobro. Contiene los datos comerciales, la programación de transmisión y tres estados independientes: orden, pago a afiliado y pago a agencia. Al cerrarse (estatus_orden = orden_cerrada) habilita la facturación.","fields":[{"name":"orden_id","label":"ID Orden","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"folio_orden","label":"Folio orden","type":"VARCHAR(20)","origin":"clave_autogenerada","desc":"Folio legible auto-generado (OC-YYYY-NNNN)","nullable":false,"unique":true},{"name":"numero_orden_cliente","label":"No. orden del cliente","type":"VARCHAR(50)","origin":"input_manual","desc":"Número de orden asignado por el cliente o agencia (referencia externa)","nullable":false,"comments":"Referencia del cliente, no nuestro folio"},{"name":"fecha_venta","label":"Fecha de venta","type":"DATE","origin":"input_manual","desc":"Fecha en que se cerró la venta","nullable":false},{"name":"anio_venta","label":"Año de venta","type":"INTEGER","origin":"derivado","desc":"Año extraído de fecha_venta","formula":"YEAR(fecha_venta)","dependencies":["fecha_venta"]},{"name":"mes_venta","label":"Mes de venta","type":"INTEGER","origin":"derivado","desc":"Mes extraído de fecha_venta","formula":"MONTH(fecha_venta)","dependencies":["fecha_venta"]},{"name":"empresa_facturadora_id","label":"Empresa facturadora","type":"UUID","origin":"relacion","desc":"Entidad legal del grupo que facturará","fk":true,"nullable":false,"catalog":"EmpresaFacturadora"},{"name":"vendedor_principal_id","label":"Vendedor principal","type":"UUID","origin":"relacion","desc":"Vendedor responsable","fk":true,"nullable":false,"catalog":"Vendedor"},{"name":"vendedor_secundario_id","label":"Vendedor secundario","type":"UUID","origin":"relacion","desc":"Segundo vendedor (compartido). NULL si no aplica.","fk":true,"nullable":true,"catalog":"Vendedor"},{"name":"anunciante_id","label":"Anunciante (cliente)","type":"UUID","origin":"relacion","desc":"Anunciante que origina la orden","fk":true,"nullable":false,"catalog":"Anunciante"},{"name":"agencia_id","label":"Agencia","type":"UUID","origin":"relacion","desc":"Agencia que intermedia. NULL si es venta directa.","fk":true,"nullable":true,"catalog":"Agencia"},{"name":"contrato_id","label":"Contrato","type":"UUID","origin":"relacion","desc":"Contrato bajo el cual se carga esta venta. NULL si no aplica.","fk":true,"nullable":true,"catalog":"Contrato"},{"name":"marca_id","label":"Marca","type":"UUID","origin":"relacion","desc":"Marca del anunciante para esta campaña","fk":true,"nullable":true,"catalog":"Marca","allow_manual_override":true},{"name":"categoria_id","label":"Categoría","type":"UUID","origin":"relacion","desc":"Categoría comercial de la venta","fk":true,"nullable":true,"catalog":"Categoria","allow_manual_override":true},{"name":"producto","label":"Producto","type":"VARCHAR(200)","origin":"input_manual","desc":"Producto específico de la marca anunciado (ej. \"Coca-Cola Zero 600ml\"). Captura libre.","nullable":true,"comments":"Más específico que marca. Texto libre para flexibilidad."},{"name":"direccion_facturacion","label":"Dirección de facturación","type":"TEXT","origin":"input_manual","desc":"Dirección a usar en la factura. Se hereda del Anunciante pero puede sobreescribirse.","nullable":true,"allow_manual_override":true,"inherited_from":"Anunciante.localizacion"},{"name":"facturacion_directa_cliente","label":"Facturación directa al cliente","type":"BOOLEAN","origin":"booleano","desc":"TRUE = se factura directo al anunciante sin intermediación de agencia. Es condición de esta venta, NO del catálogo de anunciante.","nullable":false,"comments":"Flag de filtro para reportes"},{"name":"afiliado_factura_directo_al_cliente","label":"Afiliado factura directo al cliente","type":"BOOLEAN","origin":"booleano","desc":"TRUE = el afiliado emite factura directamente al anunciante (no a OIR). Condición específica de esta venta/campaña.","nullable":false,"comments":"Si TRUE, el flujo de facturación cambia: el afiliado no nos factura a nosotros, sino al cliente final."},{"name":"fecha_inicio_campania","label":"Fecha inicio campaña","type":"DATE","origin":"input_manual","desc":"Inicio de la campaña","nullable":false},{"name":"fecha_fin_campania","label":"Fecha fin campaña","type":"DATE","origin":"input_manual","desc":"Fin de la campaña","nullable":false,"validations":">= fecha_inicio_campania"},{"name":"total_dias_campania","label":"Total días campaña","type":"INTEGER","origin":"calculado","desc":"Número total de días de campaña","formula":"DATEDIFF(fecha_fin_campania, fecha_inicio_campania) + 1","dependencies":["fecha_inicio_campania","fecha_fin_campania"]},{"name":"duracion_spot","label":"Duración spot","type":"ENUM","origin":"catalogo","desc":"20s | 30s | 60s | mencion","nullable":false},{"name":"precio_unitario","label":"Precio unitario","type":"DECIMAL(12,2)","origin":"input_manual","desc":"Precio promedio por spot acordado con el cliente. Referencia general.","nullable":false,"comments":"Cada línea de ProgramacionTransmision puede tener su propio precio. Este es el promedio o referencia."},{"name":"total_spots","label":"Total spots solicitados","type":"INTEGER","origin":"input_manual","desc":"Total de spots que solicita el cliente en esta orden","nullable":false,"comments":"La distribución por estación/horario se detalla en las OrdenEstacion"},{"name":"subtotal","label":"Subtotal","type":"DECIMAL(14,2)","origin":"calculado","desc":"Subtotal antes de IVA","formula":"total_spots * precio_unitario","dependencies":["total_spots","precio_unitario"]},{"name":"iva","label":"IVA","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA 16%","formula":"subtotal * 0.16","dependencies":["subtotal"]},{"name":"total","label":"Total","type":"DECIMAL(14,2)","origin":"calculado","desc":"Total con IVA","formula":"subtotal + iva","dependencies":["subtotal","iva"]},{"name":"observaciones_predefinidas","label":"Observaciones predefinidas","type":"TEXT","origin":"catalogo","desc":"Observaciones seleccionadas de catálogo de cláusulas comunes","nullable":true,"comments":"En implementación puede usar sub-catálogo de textos predefinidos"},{"name":"observaciones_libres","label":"Observaciones libres","type":"TEXT","origin":"input_manual","desc":"Notas libres específicas de esta orden","nullable":true},{"name":"estatus_orden","label":"Estatus orden","type":"ENUM","origin":"input_manual","desc":"recibida | capturada | en_transmision | en_verificacion | orden_cerrada | facturada | cobrada | cancelada","nullable":false,"comments":"orden_cerrada habilita la facturación. Ocurre después de validar verificaciones contra solicitado."},{"name":"estatus_pago_afiliado","label":"Estatus pago afiliado","type":"ENUM","origin":"input_manual","desc":"pendiente | en_revision | pagado","nullable":false},{"name":"estatus_pago_agencia","label":"Estatus pago agencia","type":"ENUM","origin":"input_manual","desc":"pendiente | en_revision | pagado","nullable":false},{"name":"archivo_orden_original_path","label":"Ruta archivo original","type":"VARCHAR(500)","origin":"input_manual","desc":"PDF/imagen de la orden original recibida del cliente"},{"name":"created_by","label":"Capturado por","type":"UUID","origin":"relacion","desc":"Usuario de Ventas que capturó","fk":true,"nullable":false},{"name":"created_at","label":"Fecha captura","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de captura","nullable":false},{"name":"updated_at","label":"Última modificación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Última modificación"}]},{"name":"OrdenEstacion","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Orden interna / asignación operativa. Se deriva de la OrdenCliente y siempre está ligada a ella. Cada registro representa una asignación a una estación en un horario específico. \"Asignar\" = programar la transmisión con todos los datos operativos. Una OrdenCliente puede tener muchas OrdenEstacion (distintas estaciones y/o distintos horarios). Después del reporte de transmisión real, se edita para reflejar lo ejecutado. Solo cuando se cierra (estatus = cerrada), Facturación puede jalar la información.","fields":[{"name":"orden_estacion_id","label":"ID Orden estación","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"folio_orden_estacion","label":"Folio","type":"VARCHAR(25)","origin":"clave_autogenerada","desc":"Folio legible (OE-YYYY-NNNNx)","nullable":false,"unique":true},{"name":"orden_id","label":"Orden del cliente origen","type":"UUID","origin":"relacion","desc":"OrdenCliente de la cual se deriva. Siempre ligada.","fk":true,"nullable":false},{"name":"numero_orden_estacion","label":"No. orden estación","type":"VARCHAR(50)","origin":"input_manual","desc":"Número de orden específico comunicado al afiliado","nullable":true},{"name":"contrato_id","label":"Contrato","type":"UUID","origin":"relacion","desc":"Contrato bajo el cual se carga. Heredado de OrdenCliente.","fk":true,"nullable":true,"catalog":"Contrato","inherited_from":"OrdenCliente.contrato_id","allow_manual_override":true},{"name":"anunciante_id","label":"Anunciante (cliente)","type":"UUID","origin":"derivado","desc":"Anunciante. Heredado de OrdenCliente.","fk":true,"nullable":false,"inherited_from":"OrdenCliente.anunciante_id"},{"name":"vendedor_id","label":"Agente / Vendedor","type":"UUID","origin":"relacion","desc":"Vendedor asignado a esta orden interna. Puede diferir del principal de la OrdenCliente.","fk":true,"nullable":false,"catalog":"Vendedor","inherited_from":"OrdenCliente.vendedor_principal_id","allow_manual_override":true},{"name":"agencia_id","label":"Agencia","type":"UUID","origin":"derivado","desc":"Agencia. Heredada de OrdenCliente.","fk":true,"nullable":true,"inherited_from":"OrdenCliente.agencia_id"},{"name":"categoria_id","label":"Categoría","type":"UUID","origin":"relacion","desc":"Categoría comercial. Heredada de OrdenCliente.","fk":true,"nullable":true,"catalog":"Categoria","inherited_from":"OrdenCliente.categoria_id","allow_manual_override":true},{"name":"producto","label":"Producto","type":"VARCHAR(200)","origin":"input_manual","desc":"Producto específico. Heredado de OrdenCliente, editable.","nullable":true,"inherited_from":"OrdenCliente.producto","allow_manual_override":true},{"name":"estacion_id","label":"Estación","type":"UUID","origin":"relacion","desc":"Estación de afiliado destino. Al seleccionar se infieren plaza, afiliado y razón social.","fk":true,"nullable":false,"catalog":"Estacion"},{"name":"plaza_id","label":"Plaza","type":"UUID","origin":"derivado","desc":"Plaza de la estación. Se llena automáticamente.","fk":true,"nullable":false,"catalog":"Plaza","dependencies":["estacion_id"]},{"name":"fecha_transmision","label":"Fecha de transmisión","type":"DATE","origin":"input_manual","desc":"Fecha específica de transmisión para esta línea. Si la orden cubre un rango de fechas, se puede crear una OrdenEstacion por fecha o agrupar por rango.","nullable":false},{"name":"hora_inicio","label":"Hora inicio","type":"TIME","origin":"input_manual","desc":"Hora de inicio del horario de transmisión","nullable":false},{"name":"hora_fin","label":"Hora fin","type":"TIME","origin":"input_manual","desc":"Hora de fin del horario","nullable":false},{"name":"duracion_spot","label":"Duración spot","type":"ENUM","origin":"catalogo","desc":"20s | 30s | 60s | mencion. Heredado de OrdenCliente.","nullable":false,"inherited_from":"OrdenCliente.duracion_spot","allow_manual_override":true},{"name":"spots_solicitados","label":"Spots solicitados","type":"INTEGER","origin":"input_manual","desc":"Spots que se solicitan para este horario/estación según la OrdenCliente original","nullable":false,"validations":">= 0"},{"name":"spots_asignados","label":"Spots asignados","type":"INTEGER","origin":"input_manual","desc":"Spots efectivamente programados/asignados con el afiliado. Puede ser menor o igual a los solicitados.","nullable":false,"validations":">= 0"},{"name":"spots_faltantes","label":"Spots faltantes","type":"INTEGER","origin":"calculado","desc":"Diferencia entre solicitados y asignados. Positivo = faltan spots por asignar.","formula":"spots_solicitados - spots_asignados","dependencies":["spots_solicitados","spots_asignados"]},{"name":"precio_spot","label":"Precio por spot","type":"DECIMAL(12,2)","origin":"input_manual","desc":"Precio negociado con la emisora. PUEDE DIFERIR del precio_unitario de la OrdenCliente — la diferencia es el margen.","nullable":false,"catalog":"TarifaPlaza","allow_manual_override":true,"comments":"Núcleo del margen comercial"},{"name":"importe_estacion","label":"Importe","type":"DECIMAL(14,2)","origin":"calculado","desc":"Importe de esta asignación","formula":"spots_asignados * precio_spot","dependencies":["spots_asignados","precio_spot"]},{"name":"porcentaje_participacion_oir","label":"% participación OIR","type":"DECIMAL(5,2)","origin":"input_manual","desc":"Porcentaje que corresponde a OIR","nullable":false,"validations":"0-100"},{"name":"importe_oir","label":"Importe OIR","type":"DECIMAL(14,2)","origin":"calculado","desc":"Monto OIR","formula":"importe_estacion * porcentaje_participacion_oir / 100","dependencies":["importe_estacion","porcentaje_participacion_oir"]},{"name":"iva_oir","label":"IVA OIR","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA","formula":"importe_oir * 0.16","dependencies":["importe_oir"]},{"name":"total_oir","label":"Total OIR","type":"DECIMAL(14,2)","origin":"calculado","desc":"Importe + IVA","formula":"importe_oir + iva_oir","dependencies":["importe_oir","iva_oir"]},{"name":"importe_emisora","label":"Importe emisora","type":"DECIMAL(14,2)","origin":"calculado","desc":"Monto para la emisora","formula":"importe_estacion - importe_oir","dependencies":["importe_estacion","importe_oir"]},{"name":"iva_emisora","label":"IVA emisora","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA","formula":"importe_emisora * 0.16","dependencies":["importe_emisora"]},{"name":"total_emisora","label":"Total emisora","type":"DECIMAL(14,2)","origin":"calculado","desc":"Importe + IVA","formula":"importe_emisora + iva_emisora","dependencies":["importe_emisora","iva_emisora"]},{"name":"estatus","label":"Estatus","type":"ENUM","origin":"input_manual","desc":"borrador | asignada | en_transmision | en_revision | cerrada | cancelada. Solo en estatus \"cerrada\" Facturación puede jalar la información.","nullable":false,"comments":"borrador = recién creada desde OrdenCliente. asignada = programada con afiliado. en_revision = llegó reporte y se está reconciliando. cerrada = datos ajustados y listos para facturación."},{"name":"observaciones_estacion","label":"Observaciones","type":"TEXT","origin":"input_manual","desc":"Instrucciones operativas para el afiliado o notas internas"},{"name":"created_by","label":"Capturado por","type":"UUID","origin":"relacion","desc":"Usuario","fk":true,"nullable":false},{"name":"created_at","label":"Fecha creación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de creación","nullable":false},{"name":"updated_at","label":"Última modificación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Última modificación"}]},{"name":"Verificacion","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Registro de lo realmente transmitido según el reporte del afiliado. Cuando el reporte llega y NO coincide con lo asignado, se registra aquí la evidencia. Luego Ventas edita la OrdenEstacion para reflejar la realidad (gestión de afectaciones) y la cierra. La verificación queda como respaldo/evidencia del reporte original del afiliado.","fields":[{"name":"verificacion_id","label":"ID Verificación","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"orden_estacion_id","label":"Orden estación","type":"UUID","origin":"relacion","desc":"OrdenEstacion verificada","fk":true,"nullable":false,"unique":true},{"name":"spots_verificados","label":"Spots verificados","type":"INTEGER","origin":"input_manual","desc":"Spots confirmados por el afiliado","nullable":false},{"name":"fecha_verificacion","label":"Fecha verificación","type":"DATE","origin":"input_manual","desc":"Fecha del reporte del afiliado","nullable":false},{"name":"archivo_nombre","label":"Nombre archivo","type":"VARCHAR(255)","origin":"input_manual","desc":"Archivo cargado"},{"name":"archivo_path","label":"Ruta archivo","type":"VARCHAR(500)","origin":"clave_autogenerada","desc":"Ruta del archivo"},{"name":"notas_verificacion","label":"Notas verificación","type":"TEXT","origin":"input_manual","desc":"Observaciones: afectaciones, cambios de horario, etc."},{"name":"reconciliada","label":"Reconciliada","type":"BOOLEAN","origin":"booleano","desc":"TRUE = se validó contra la programación solicitada. Habilita el cierre de la orden.","nullable":false,"comments":"Cuando todas las OrdenEstacion de una OrdenCliente están reconciliadas, la orden puede pasar a estatus orden_cerrada."},{"name":"created_by","label":"Registrado por","type":"UUID","origin":"relacion","desc":"Usuario de Ventas","fk":true,"nullable":false},{"name":"created_at","label":"Fecha registro","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de registro","nullable":false}]},{"name":"Incidencia","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Diferencia entre lo solicitado y lo verificado. Generada automáticamente cuando los spots o horarios verificados no coinciden con los programados. No bloquea el cierre. Usada para análisis y para gestionar afectaciones (créditos al cliente, descuentos al afiliado).","fields":[{"name":"incidencia_id","label":"ID Incidencia","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"verificacion_id","label":"Verificación","type":"UUID","origin":"relacion","desc":"Verificación que generó la incidencia","fk":true,"nullable":false},{"name":"orden_estacion_id","label":"Orden estación","type":"UUID","origin":"relacion","desc":"OrdenEstacion afectada","fk":true,"nullable":false},{"name":"tipo_incidencia","label":"Tipo","type":"ENUM","origin":"input_manual","desc":"faltante | excedente | cambio_horario | cambio_fecha | spot_no_emitido","nullable":false},{"name":"spots_ordenados","label":"Spots ordenados","type":"INTEGER","origin":"derivado","desc":"Copia de spots asignados","nullable":false},{"name":"spots_ejecutados","label":"Spots ejecutados","type":"INTEGER","origin":"derivado","desc":"Copia de spots verificados","nullable":false},{"name":"diferencia_spots","label":"Diferencia","type":"INTEGER","origin":"calculado","desc":"spots_ejecutados − spots_ordenados","formula":"spots_ejecutados - spots_ordenados", _manual","desc":"Descripción de los servicios facturados","nullable":false,"comments":"Aparece en el cuerpo de la factura"},{"name":"observaciones_factura","label":"Observaciones","type":"TEXT","origin":"input_manual","desc":"Observaciones adicionales a imprimir en la factura"},{"name":"fecha_inicio_transmision","label":"Fecha inicio transmisión","type":"DATE","origin":"derivado","desc":"Fecha inicio del período transmitido. Heredada de OrdenCliente.","nullable":false,"inherited_from":"OrdenCliente.fecha_inicio_campania"},{"name":"fecha_fin_transmision","label":"Fecha fin transmisión","type":"DATE","origin":"derivado","desc":"Fecha fin del período transmitido","nullable":false,"inherited_from":"OrdenCliente.fecha_fin_campania"},{"name":"fecha_factura","label":"Fecha factura","type":"DATE","origin":"input_manual","desc":"Fecha de emisión","nullable":false},{"name":"fecha_entrega_factura","label":"Fecha entrega factura","type":"DATE","origin":"input_manual","desc":"Fecha en que se entregó al cliente/agencia. Base para fecha estimada de cobro.","nullable":true},{"name":"subtotal_factura","label":"Subtotal","type":"DECIMAL(14,2)","origin":"derivado","desc":"Subtotal antes de IVA. Heredado de OrdenCliente.","nullable":false,"allow_manual_override":true,"inherited_from":"OrdenCliente.subtotal"},{"name":"iva_factura","label":"IVA","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA 16%","formula":"subtotal_factura * 0.16","dependencies":["subtotal_factura"]},{"name":"total_factura","label":"Total","type":"DECIMAL(14,2)","origin":"calculado","desc":"Total con IVA","formula":"subtotal_factura + iva_factura","dependencies":["subtotal_factura","iva_factura"]},{"name":"cuenta_contable_id","label":"Cuenta contable","type":"UUID","origin":"relacion","desc":"Cuenta contable para clasificación","fk":true,"nullable":false,"catalog":"CuentaContable"},{"name":"metodo_pago_id","label":"Método de pago","type":"UUID","origin":"relacion","desc":"Método de pago acordado","fk":true,"nul odo_contable","label":"Período","type":"VARCHAR(7)","origin":"input_manual","desc":"YYYY-MM","nullable":false,"unique":true},{"name":"ingresos_facturados","label":"Ingresos facturados","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM FacturaCliente.total","formula":"SUM(FacturaCliente.total_factura) WHERE periodo"},{"name":"ingresos_cobrados","label":"Ingresos cobrados","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM PagoCliente","formula":"SUM(PagoCliente.monto_aplicado) WHERE periodo"},{"name":"costo_afiliados","label":"Costo afiliados","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM Requisicion pago_afiliado","formula":"SUM(Requisicion.monto_requisicion) WHERE tipo=pago_afiliado AND periodo"},{"name":"costo_agencias","label":"Costo agencias","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM Requisicion pago_agencia","formula":"SUM(Requisicion.monto_requisicion) WHERE tipo=pago_agencia AND periodo"},{"name":"costo_comisiones_vendedores","label":"Costo comisiones vendedores","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM comisiones vendedor","formula":"SUM(Requisicion.requisicion_comision_vendedor) WHERE tipo=comision_vendedor AND periodo"},{"name":"costo_comisiones_agencias","label":"Costo comisiones agencias","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM comisiones agencia","formula":"SUM(Requisicion.requisicion_comision_agencia) WHERE tipo=comision_agencia AND periodo"},{"name":"costo_nominas","label":"Costo nóminas","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM CostoAdicional nomina","formula":"SUM(CostoAdicional.monto_costo) WHERE tipo=nomina AND periodo"},{"name":"costo_overhead","label":"Costo overhead","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM CostoAdicional overhead","formula":"SUM(CostoAdicional.monto_costo) WHERE tipo=overhead AND periodo"},{"name":"utilidad_bruta","label":"Utilidad bruta","type":"DECIMAL(14,2)","origin":"calculado","desc":"Ingresos − costos directos","formula":"ingr ,"fk":true,"nullable":false,"catalog":"EmpresaFacturadora"},{"name":"vendedor_principal_id","label":"Vendedor principal","type":"UUID","origin":"relacion","desc":"Vendedor responsable","fk":true,"nullable":false,"catalog":"Vendedor"},{"name":"vendedor_secundario_id","label":"Vendedor secundario","type":"UUID","origin":"relacion","desc":"Segundo vendedor (compartido). NULL si no aplica.","fk":true,"nullable":true,"catalog":"Vendedor"},{"name":"anunciante_id","label":"Anunciante (cliente)","type":"UUID","origin":"relacion","desc":"Anunciante que origina la orden","fk":true,"nullable":false,"catalog":"Anunciante"},{"name":"agencia_id","label":"Agencia","type":"UUID","origin":"relacion","desc":"Agencia que intermedia. NULL si es venta directa.","fk":true,"nullable":true,"catalog":"Agencia"},{"name":"contrato_id","label":"Contrato","type":"UUID","origin":"relacion","desc":"Contrato bajo el cual se carga esta venta. NULL si no aplica.","fk":true,"nullable":true,"catalog":"Contrato"},{"name":"marca_id","label":"Marca","type":"UUID","origin":"relacion","desc":"Marca del anunciante para esta campaña","fk":true,"nullable":true,"catalog":"Marca","allow_manual_override":true},{"name":"categoria_id","label":"Categoría","type":"UUID","origin":"relacion","desc":"Categoría comercial de la venta","fk":true,"nullable":true,"catalog":"Categoria","allow_manual_override":true},{"name":"producto","label":"Producto","type":"VARCHAR(200)","origin":"input_manual","desc":"Producto específico de la marca anunciado (ej. \"Coca-Cola Zero 600ml\"). Captura libre.","nullable":true,"comments":"Más específico que marca. Texto libre para flexibilidad."},{"name":"direccion_facturacion","label":"Dirección de facturación","type":"TEXT","origin":"input_manual","desc":"Dirección a usar en la factura. Se hereda del Anunciante pero puede sobreescribirse.","nullable":true,"allow_manual_override":true,"inherited_from":"Anunciante.localizacion"},{"name":"facturacion_directa_cliente","label":"Facturación directa al cliente","type":"BOOLEAN","origin":"booleano","desc":"TRUE = se factura directo al anunciante sin intermediación de agencia. Es condición de esta venta, NO del catálogo de anunciante.","nullable":false,"comments":"Flag de filtro para reportes"},{"name":"afiliado_factura_directo_al_cliente","label":"Afiliado factura directo al cliente","type":"BOOLEAN","origin":"booleano","desc":"TRUE = el afiliado emite factura directamente al anunciante (no a OIR). Condición específica de esta venta/campaña.","nullable":false,"comments":"Si TRUE, el flujo de facturación cambia: el afiliado no nos factura a nosotros, sino al cliente final."},{"name":"fecha_inicio_campania","label":"Fecha inicio campaña","type":"DATE","origin":"input_manual","desc":"Inicio de la campaña","nullable":false},{"name":"fecha_fin_campania","label":"Fecha fin campaña","type":"DATE","origin":"input_manual","desc":"Fin de la campaña","nullable":false,"validations":">= fecha_inicio_campania"},{"name":"total_dias_campania","label":"Total días campaña","type":"INTEGER","origin":"calculado","desc":"Número total de días de campaña","formula":"DATEDIFF(fecha_fin_campania, fecha_inicio_campania) + 1","dependencies":["fecha_inicio_campania","fecha_fin_campania"]},{"name":"duracion_spot","label":"Duración spot","type":"ENUM","origin":"catalogo","desc":"20s | 30s | 60s | mencion","nullable":false},{"name":"precio_unitario","label":"Precio unitario","type":"DECIMAL(12,2)","origin":"input_manual","desc":"Precio promedio por spot acordado con el cliente. Referencia general.","nullable":false,"comments":"Cada línea de ProgramacionTransmision puede tener su propio precio. Este es el promedio o referencia."},{"name":"total_spots","label":"Total spots solicitados","type":"INTEGER","origin":"input_manual","desc":"Total de spots que solicita el cliente en esta orden","nullable":false,"comments":"La distribución por estación/horario se detalla en las OrdenEstacion"},{"name":"subtotal","label":"Subtotal","type":"DECIMAL(14,2)","origin":"calculado","desc":"Subtotal antes de IVA","formula":"total_spots * precio_unitario","dependencies":["total_spots","precio_unitario"]},{"name":"iva","label":"IVA","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA 16%","formula":"subtotal * 0.16","dependencies":["subtotal"]},{"name":"total","label":"Total","type":"DECIMAL(14,2)","origin":"calculado","desc":"Total con IVA","formula":"subtotal + iva","dependencies":["subtotal","iva"]},{"name":"observaciones_predefinidas","label":"Observaciones predefinidas","type":"TEXT","origin":"catalogo","desc":"Observaciones seleccionadas de catálogo de cláusulas comunes","nullable":true,"comments":"En implementación puede usar sub-catálogo de textos predefinidos"},{"name":"observaciones_libres","label":"Observaciones libres","type":"TEXT","origin":"input_manual","desc":"Notas libres específicas de esta orden","nullable":true},{"name":"estatus_orden","label":"Estatus orden","type":"ENUM","origin":"input_manual","desc":"recibida | capturada | en_transmision | en_verificacion | orden_cerrada | facturada | cobrada | cancelada","nullable":false,"comments":"orden_cerrada habilita la facturación. Ocurre después de validar verificaciones contra solicitado."},{"name":"estatus_pago_afiliado","label":"Estatus pago afiliado","type":"ENUM","origin":"input_manual","desc":"pendiente | en_revision | pagado","nullable":false},{"name":"estatus_pago_agencia","label":"Estatus pago agencia","type":"ENUM","origin":"input_manual","desc":"pendiente | en_revision | pagado","nullable":false},{"name":"archivo_orden_original_path","label":"Ruta archivo original","type":"VARCHAR(500)","origin":"input_manual","desc":"PDF/imagen de la orden original recibida del cliente"},{"name":"created_by","label":"Capturado por","type":"UUID","origin":"relacion","desc":"Usuario de Ventas que capturó","fk":true,"nullable":false},{"name":"created_at","label":"Fecha captura","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de captura","nullable":false},{"name":"updated_at","label":"Última modificación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Última modificación"}],"phase":1,"x":40,"y":1020},{"name":"OrdenEstacion","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Orden interna / asignación operativa. Se deriva de la OrdenCliente y siempre está ligada a ella. Cada registro representa una asignación a una estación en un horario específico. \"Asignar\" = programar la transmisión con todos los datos operativos. Una OrdenCliente puede tener muchas OrdenEstacion (distintas estaciones y/o distintos horarios). Después del reporte de transmisión real, se edita para reflejar lo ejecutado. Solo cuando se cierra (estatus = cerrada), Facturación puede jalar la información.","fields":[{"name":"orden_estacion_id","label":"ID Orden estación","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"folio_orden_estacion","label":"Folio","type":"VARCHAR(25)","origin":"clave_autogenerada","desc":"Folio legible (OE-YYYY-NNNNx)","nullable":false,"unique":true},{"name":"orden_id","label":"Orden del cliente origen","type":"UUID","origin":"relacion","desc":"OrdenCliente de la cual se deriva. Siempre ligada.","fk":true,"nullable":false},{"name":"numero_orden_estacion","label":"No. orden estación","type":"VARCHAR(50)","origin":"input_manual","desc":"Número de orden específico comunicado al afiliado","nullable":true},{"name":"contrato_id","label":"Contrato","type":"UUID","origin":"relacion","desc":"Contrato bajo el cual se carga. Heredado de OrdenCliente.","fk":true,"nullable":true,"catalog":"Contrato","inherited_from":"OrdenCliente.contrato_id","allow_manual_override":true},{"name":"anunciante_id","label":"Anunciante (cliente)","type":"UUID","origin":"derivado","desc":"Anunciante. Heredado de OrdenCliente.","fk":true,"nullable":false,"inherited_from":"OrdenCliente.anunciante_id"},{"name":"vendedor_id","label":"Agente / Vendedor","type":"UUID","origin":"relacion","desc":"Vendedor asignado a esta orden interna. Puede diferir del principal de la OrdenCliente.","fk":true,"nullable":false,"catalog":"Vendedor","inherited_from":"OrdenCliente.vendedor_principal_id","allow_manual_override":true},{"name":"agencia_id","label":"Agencia","type":"UUID","origin":"derivado","desc":"Agencia. Heredada de OrdenCliente.","fk":true,"nullable":true,"inherited_from":"OrdenCliente.agencia_id"},{"name":"categoria_id","label":"Categoría","type":"UUID","origin":"relacion","desc":"Categoría comercial. Heredada de OrdenCliente.","fk":true,"nullable":true,"catalog":"Categoria","inherited_from":"OrdenCliente.categoria_id","allow_manual_override":true},{"name":"producto","label":"Producto","type":"VARCHAR(200)","origin":"input_manual","desc":"Producto específico. Heredado de OrdenCliente, editable.","nullable":true,"inherited_from":"OrdenCliente.producto","allow_manual_override":true},{"name":"estacion_id","label":"Estación","type":"UUID","origin":"relacion","desc":"Estación de afiliado destino. Al seleccionar se infieren plaza, afiliado y razón social.","fk":true,"nullable":false,"catalog":"Estacion"},{"name":"plaza_id","label":"Plaza","type":"UUID","origin":"derivado","desc":"Plaza de la estación. Se llena automáticamente.","fk":true,"nullable":false,"catalog":"Plaza","dependencies":["estacion_id"]},{"name":"fecha_transmision","label":"Fecha de transmisión","type":"DATE","origin":"input_manual","desc":"Fecha específica de transmisión para esta línea. Si la orden cubre un rango de fechas, se puede crear una OrdenEstacion por fecha o agrupar por rango.","nullable":false},{"name":"hora_inicio","label":"Hora inicio","type":"TIME","origin":"input_manual","desc":"Hora de inicio del horario de transmisión","nullable":false},{"name":"hora_fin","label":"Hora fin","type":"TIME","origin":"input_manual","desc":"Hora de fin del horario","nullable":false},{"name":"duracion_spot","label":"Duración spot","type":"ENUM","origin":"catalogo","desc":"20s | 30s | 60s | mencion. Heredado de OrdenCliente.","nullable":false,"inherited_from":"OrdenCliente.duracion_spot","allow_manual_override":true},{"name":"spots_solicitados","label":"Spots solicitados","type":"INTEGER","origin":"input_manual","desc":"Spots que se solicitan para este horario/estación según la OrdenCliente original","nullable":false,"validations":">= 0"},{"name":"spots_asignados","label":"Spots asignados","type":"INTEGER","origin":"input_manual","desc":"Spots efectivamente programados/asignados con el afiliado. Puede ser menor o igual a los solicitados.","nullable":false,"validations":">= 0"},{"name":"spots_faltantes","label":"Spots faltantes","type":"INTEGER","origin":"calculado","desc":"Diferencia entre solicitados y asignados. Positivo = faltan spots por asignar.","formula":"spots_solicitados - spots_asignados","dependencies":["spots_solicitados","spots_asignados"]},{"name":"precio_spot","label":"Precio por spot","type":"DECIMAL(12,2)","origin":"input_manual","desc":"Precio negociado con la emisora. PUEDE DIFERIR del precio_unitario de la OrdenCliente — la diferencia es el margen.","nullable":false,"catalog":"TarifaPlaza","allow_manual_override":true,"comments":"Núcleo del margen comercial"},{"name":"importe_estacion","label":"Importe","type":"DECIMAL(14,2)","origin":"calculado","desc":"Importe de esta asignación","formula":"spots_asignados * precio_spot","dependencies":["spots_asignados","precio_spot"]},{"name":"porcentaje_participacion_oir","label":"% participación OIR","type":"DECIMAL(5,2)","origin":"input_manual","desc":"Porcentaje que corresponde a OIR","nullable":false,"validations":"0-100"},{"name":"importe_oir","label":"Importe OIR","type":"DECIMAL(14,2)","origin":"calculado","desc":"Monto OIR","formula":"importe_estacion * porcentaje_participacion_oir / 100","dependencies":["importe_estacion","porcentaje_participacion_oir"]},{"name":"iva_oir","label":"IVA OIR","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA","formula":"importe_oir * 0.16","dependencies":["importe_oir"]},{"name":"total_oir","label":"Total OIR","type":"DECIMAL(14,2)","origin":"calculado","desc":"Importe + IVA","formula":"importe_oir + iva_oir","dependencies":["importe_oir","iva_oir"]},{"name":"importe_emisora","label":"Importe emisora","type":"DECIMAL(14,2)","origin":"calculado","desc":"Monto para la emisora","formula":"importe_estacion - importe_oir","dependencies":["importe_estacion","importe_oir"]},{"name":"iva_emisora","label":"IVA emisora","type":"DECIMAL(14,2)","origin":"calculado","desc":"IVA","formula":"importe_emisora * 0.16","dependencies":["importe_emisora"]},{"name":"total_emisora","label":"Total emisora","type":"DECIMAL(14,2)","origin":"calculado","desc":"Importe + IVA","formula":"importe_emisora + iva_emisora","dependencies":["importe_emisora","iva_emisora"]},{"name":"estatus","label":"Estatus","type":"ENUM","origin":"input_manual","desc":"borrador | asignada | en_transmision | en_revision | cerrada | cancelada. Solo en estatus \"cerrada\" Facturación puede jalar la información.","nullable":false,"comments":"borrador = recién creada desde OrdenCliente. asignada = programada con afiliado. en_revision = llegó reporte y se está reconciliando. cerrada = datos ajustados y listos para facturación."},{"name":"observaciones_estacion","label":"Observaciones","type":"TEXT","origin":"input_manual","desc":"Instrucciones operativas para el afiliado o notas internas"},{"name":"created_by","label":"Capturado por","type":"UUID","origin":"relacion","desc":"Usuario","fk":true,"nullable":false},{"name":"created_at","label":"Fecha creación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de creación","nullable":false},{"name":"updated_at","label":"Última modificación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Última modificación"}],"phase":1,"x":540,"y":1020},{"name":"Verificacion","headerColor":"E1F5EE","headerTextColor":"085041","desc":"Registro de lo realmente transmitido según el reporte del afiliado. Cuando el reporte llega y NO on.requisicion_comision_agencia) WHERE tipo=comision_agencia AND periodo"},{"name":"costo_nominas","label":"Costo nóminas","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM CostoAdicional nomina","formula":"SUM(CostoAdicional.monto_costo) WHERE tipo=nomina AND periodo"},{"name":"costo_overhead","label":"Costo overhead","type":"DECIMAL(14,2)","origin":"calculado","desc":"SUM CostoAdicional overhead","formula":"SUM(CostoAdicional.monto_costo) WHERE tipo=overhead AND periodo"},{"name":"utilidad_bruta","label":"Utilidad bruta","type":"DECIMAL(14,2)","origin":"calculado","desc":"Ingresos − costos directos","formula":"ingresos_cobrados - costo_afiliados - costo_agencias - costo_comisiones_vendedores - costo_comisiones_agencias"},{"name":"utilidad_neta","label":"Utilidad neta","type":"DECIMAL(14,2)","origin":"calculado","desc":"Utilidad bruta − nóminas − overhead","formula":"utilidad_bruta - costo_nominas - costo_overhead"},{"name":"created_by","label":"Generado por","type":"UUID","origin":"relacion","desc":"Usuario Dirección","fk":true,"nullable":false},{"name":"created_at","label":"Fecha generación","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Fecha de generación","nullable":false}],"phase":4,"x":1240,"y":2180},{"name":"LogCambioParametro","headerColor":"FCEBEB","headerTextColor":"791F1F","desc":"Registro histórico de cambios a parámetros sensibles del sistema. Cada modificación a un campo marcado como requires_audit_log genera automáticamente un registro aquí. Permite auditar quién cambió qué, cuándo y qué valor tenía antes.","fields":[{"name":"log_id","label":"ID Log","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"entidad","label":"Entidad","type":"VARCHAR(100)","origin":"input_manual","desc":"Nombre de la entidad afectada (ej. \"Agencia\", \"Anunciante\")","nullable":false,"comments":"Referencia textual al nombre de la entidad"},{"name":"entidad_id","label":"ID del registro","type":"UUID","origin":"input_manual","desc":"ID del registro específico modificado","nullable":false,"comments":"Apunta al UUID del registro en la entidad correspondiente"},{"name":"campo_modificado","label":"Campo modificado","type":"VARCHAR(100)","origin":"input_manual","desc":"Nombre técnico del campo (ej. \"porcentaje_comision_agencia_default\")","nullable":false},{"name":"valor_anterior","label":"Valor anterior","type":"TEXT","origin":"input_manual","desc":"Valor previo al cambio (como texto)","nullable":true,"comments":"NULL si fue una creación"},{"name":"valor_nuevo","label":"Valor nuevo","type":"TEXT","origin":"input_manual","desc":"Valor después del cambio","nullable":false},{"name":"usuario_id","label":"Usuario que modificó","type":"UUID","origin":"relacion","desc":"Usuario que realizó el cambio","fk":true,"nullable":false},{"name":"fecha_cambio","label":"Fecha y hora del cambio","type":"TIMESTAMP","origin":"clave_autogenerada","desc":"Timestamp exacto del cambio","nullable":false},{"name":"motivo_cambio","label":"Motivo del cambio","type":"TEXT","origin":"input_manual","desc":"Razón opcional del cambio capturada por el usuario","nullable":true},{"name":"ip_origen","label":"IP origen","type":"VARCHAR(45)","origin":"clave_autogenerada","desc":"IP desde donde se realizó el cambio","nullable":true,"comments":"Para auditoría de seguridad"}],"phase":5,"x":440,"y":2480},{"name":"PermisoCampo","headerColor":"FCEBEB","headerTextColor":"791F1F","desc":"Configuración de permisos a nivel de campo. Define qué áreas/roles pueden modificar campos específicos protegidos. Complementa el control de acceso general por área del usuario.","fields":[{"name":"permiso_id","label":"ID Permiso","type":"UUID","origin":"clave_autogenerada","desc":"Identificador único","pk":true},{"name":"entidad","label":"Entidad","type":"VARCHAR(100)","origin":"input_manual","desc":"Entidad a la que aplica el permiso","nullable":false},{"name":"campo","label":"Campo","type":"VARCHAR(100)","origin":"input_manual","desc":"Campo específico protegido","nullable":false},{"name":"areas_autorizadas","label":"Áreas autorizadas","type":"VARCHAR(300)","origin":"input_manual","desc":"Lista de áreas autorizadas separadas por coma (ej. \"direccion,admin\")","nullable":false},{"name":"roles_adicionales_autorizados","label":"Roles adicionales","type":"VARCHAR(300)","origin":"input_manual","desc":"Roles adicionales autorizados (ej. \"auditor,admin_parametros\")","nullable":true},{"name":"requiere_audit_log","label":"Requiere log","type":"BOOLEAN","origin":"booleano","desc":"TRUE = los cambios generan registro en LogCambioParametro","nullable":false},{"name":"descripcion_permiso","label":"Descripción","type":"VARCHAR(300)","origin":"input_manual","desc":"Descripción del por qué este campo está protegido"},{"name":"activo","label":"Activo","type":"BOOLEAN","origin":"booleano","desc":"TRUE = la regla está vigente","nullable":false}],"phase":5,"x":840,"y":2480}];

const phColors = [
  {bg:'EEEDFE',text:'3C3489',border:'AFA9EC'},
  {bg:'E1F5EE',text:'085041',border:'5DCAA5'},
  {bg:'E6F1FB',text:'0C447C',border:'85B7EB'},
  {bg:'FAEEDA',text:'633806',border:'FAC775'},
  {bg:'F1EFE8',text:'444441',border:'B4B2A9'},
  {bg:'FCEBEB',text:'791F1F',border:'F1A8A8'},
];

const originLabels = {calculado:'calc',derivado:'deriv',booleano:'bool',catalogo:'cat'};
const originClasses = {calculado:'fo-calc',derivado:'fo-deriv',booleano:'fo-bool',catalogo:'fo-cat'};

const canvas = document.getElementById('canvas');
const svg = document.getElementById('lines');
const els = {};

entities.forEach(e => {
  const ph = phColors[e.phase] || phColors[4];
  const div = document.createElement('div');
  div.className = 'entity';
  div.id = 'e-' + e.name;
  div.style.cssText = 'left:'+e.x+'px;top:'+e.y+'px';

  const fieldsHtml = e.fields.map(f => {
    const cls = f.pk ? 'pk' : f.fk ? 'fk' : '';
    const icon = f.pk ? '🔑' : f.fk ? '🔗' : '';
    const shortType = f.type.replace(/\(.+\)/, '').replace("ENUM","ENUM").substring(0,12);
    const oLbl = originLabels[f.origin];
    const oCls = originClasses[f.origin];
    const originTag = oLbl ? '<span class="forigin '+oCls+'">'+oLbl+'</span>' : '';
    return '<div class="frow '+cls+'"><span class="ficon">'+icon+'</span><span class="fname">'+f.name+'</span><span class="ftype">'+shortType+'</span>'+originTag+'</div>';
  }).join('');

  div.innerHTML = '<div class="ehead" style="background:#'+ph.bg+';border-color:#'+ph.border+'" title="Clic para detalle"><div class="ename" style="color:#'+ph.text+'">'+e.name+'</div><div class="ephase" style="color:#'+ph.text+';opacity:.7">'+(phases[e.phase]?.label||'')+'</div></div><div class="efields">'+fieldsHtml+'</div>';

  div.querySelector('.ehead').addEventListener('click', () => showDp(e));
  canvas.appendChild(div);
  els[e.name] = div;
});

/* ── FK-based line drawing ── */
function drawLines() {
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = '<marker id="arr" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M1 1L7 4L1 7" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>';
  svg.appendChild(defs);

  // Build FK map: field name suffix → entity name
  const entityNames = entities.map(e => e.name);
  const nameMap = {};
  entityNames.forEach(n => {
    // Map lowercased variations
    nameMap[n.toLowerCase()] = n;
    // snake_case version
    const snake = n.replace(/([A-Z])/g, '_$1').toLowerCase().replace(/^_/, '');
    nameMap[snake] = n;
  });

  entities.forEach(e => {
    e.fields.filter(f => f.fk).forEach(f => {
      // Try to resolve target entity from field name
      const base = f.name.replace(/_id$/, '');
      // Try direct match
      let target = nameMap[base] || nameMap[base.replace(/_/g, '')];
      // Try variations
      if (!target) {
        const variations = [
          base,
          base.replace(/_/g,''),
          base.replace(/^vendedor_.*/, 'vendedor'),
          base.replace(/^empresa_.*/, 'empresafacturadora'),
          f.catalog
        ].filter(Boolean);
        for (const v of variations) {
          target = nameMap[v.toLowerCase()] || entityNames.find(n => n.toLowerCase() === v.toLowerCase());
          if (target) break;
        }
      }

      if (!target || target === e.name || !els[target]) return;

      const from = els[e.name], to = els[target];
      const fx = parseFloat(from.style.left), fy = parseFloat(from.style.top);
      const fw = from.offsetWidth, fh = from.offsetHeight;
      const tx = parseFloat(to.style.left), ty = parseFloat(to.style.top);
      const tw = to.offsetWidth, th = to.offsetHeight;
      const fcx = fx+fw/2, fcy = fy+fh/2, tcx = tx+tw/2, tcy = ty+th/2;

      let x1,y1,x2,y2;
      if (Math.abs(fcx-tcx) > Math.abs(fcy-tcy)) {
        x1 = fcx>tcx ? fx : fx+fw; y1 = fcy;
        x2 = tcx>fcx ? tx : tx+tw; y2 = tcy;
      } else {
        x1 = fcx; y1 = fcy>tcy ? fy : fy+fh;
        x2 = tcx; y2 = tcy>fcy ? ty : ty+th;
      }

      const dx = Math.abs(x2-x1) * 0.35;
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M'+x1+','+y1+' C'+(x1+dx*(x2>x1?1:-1))+','+y1+' '+(x2-dx*(x2>x1?1:-1))+','+y2+' '+x2+','+y2);
      p.setAttribute('fill','none');
      p.setAttribute('stroke','#C8C7BF');
      p.setAttribute('stroke-width','1.2');
      p.setAttribute('marker-end','url(#arr)');
      svg.appendChild(p);
    });
  });
}

/* ── Pan & Zoom ── */
let scale = 0.55, panX = 20, panY = 20, dragging = false, lx = 0, ly = 0;
function apply() { canvas.style.transform = 'translate('+panX+'px,'+panY+'px) scale('+scale+')'; drawLines(); }
function doZoom(d) { scale = Math.min(2, Math.max(0.2, scale + d)); apply(); }
function resetView() { scale = 0.55; panX = 20; panY = 20; apply(); }

const wrap = document.getElementById('wrap');
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.entity')) return;
  dragging = true; lx = e.clientX; ly = e.clientY;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lx; panY += e.clientY - ly;
  lx = e.clientX; ly = e.clientY; apply();
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('grabbing'); });
wrap.addEventListener('wheel', e => { e.preventDefault(); doZoom(e.deltaY < 0 ? .08 : -.08); }, { passive: false });

/* ── Entity drag ── */
let dEnt = null, dox = 0, doy = 0;
Object.values(els).forEach(el => {
  el.addEventListener('mousedown', e => {
    if (!e.target.closest('.ehead')) return;
    dEnt = el;
    dox = e.clientX/scale - parseFloat(el.style.left);
    doy = e.clientY/scale - parseFloat(el.style.top);
    e.stopPropagation();
  });
});
window.addEventListener('mousemove', e => {
  if (!dEnt) return;
  dEnt.style.left = (e.clientX/scale - dox) + 'px';
  dEnt.style.top = (e.clientY/scale - doy) + 'px';
  drawLines();
});
window.addEventListener('mouseup', () => { dEnt = null; });

/* ── Detail panel ── */
function showDp(e) {
  const ph = phColors[e.phase] || phColors[4];
  document.getElementById('dp-title').textContent = e.name;
  document.getElementById('dp-title').style.color = '#' + ph.text;

  const pks = e.fields.filter(f => f.pk);
  const fks = e.fields.filter(f => f.fk);
  const calcs = e.fields.filter(f => f.origin === 'calculado' || f.origin === 'derivado');
  const rest = e.fields.filter(f => !f.pk && !f.fk && f.origin !== 'calculado' && f.origin !== 'derivado');

  function fieldHtml(f) {
    const icon = f.pk ? '🔑 ' : f.fk ? '🔗 ' : '';
    let html = '<div class="dp-f">';
    html += '<div class="dp-fn">' + icon + f.name + ' <span style="font-weight:400;color:var(--text3);font-size:10px">' + f.type + '</span></div>';
    html += '<div class="dp-fd">' + (f.label||'') + ' — ' + f.desc + '</div>';
    if (f.formula) html += '<div class="dp-fm">= ' + f.formula + '</div>';
    if (f.catalog) html += '<div style="font-size:10px;color:#534AB7;margin-top:2px">Catálogo: ' + f.catalog + (f.allow_manual_override ? ' (editable si no existe)' : '') + '</div>';
    if (f.validations) html += '<div style="font-size:10px;color:#854F0B;margin-top:2px">✓ ' + f.validations + '</div>';
    html += '</div>';
    return html;
  }

  let html = '<div class="dp-desc">' + (e.desc||'') + '</div>';
  html += '<span class="dp-badge" style="background:#'+ph.bg+';color:#'+ph.text+'">' + (phases[e.phase]?.label||'') + '</span>';
  html += '<div style="font-size:11px;color:var(--text3);margin-top:6px">'+e.fields.length+' campos · origin: '+[...new Set(e.fields.map(f=>f.origin))].join(', ')+'</div>';

  if (pks.length) { html += '<div class="dp-sec">Clave primaria</div>' + pks.map(fieldHtml).join(''); }
  if (fks.length) { html += '<div class="dp-sec">Llaves foráneas</div>' + fks.map(fieldHtml).join(''); }
  if (calcs.length) { html += '<div class="dp-sec">Calculados / Derivados</div>' + calcs.map(fieldHtml).join(''); }
  if (rest.length) { html += '<div class="dp-sec">Campos</div>' + rest.map(fieldHtml).join(''); }

  document.getElementById('dp-body').innerHTML = html;
  document.getElementById('dpanel').classList.add('show');
}

function closeDp() { document.getElementById('dpanel').classList.remove('show'); }

apply();
</script>
