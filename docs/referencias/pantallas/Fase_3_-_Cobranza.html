<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GRC-OIR — Fase 3: Cobranza & Pagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--surface3:#e6e5de;
  --border:#e0dfd8;--border-med:#c8c7bf;--border-strong:#b0afa8;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-border:#AFA9EC;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;--teal-border:#5DCAA5;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#FAC775;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --r:8px;--rl:12px;
  --font:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Consolas',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
 
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.02em}
.logo span{color:var(--purple)}
.fase-tag{font-size:11px;font-family:var(--mono);background:var(--amber-bg);color:var(--amber-text);padding:3px 10px;border-radius:20px;font-weight:500}
.header-spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--amber-bg);color:var(--amber-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
 
.app-body{flex:1;display:flex;min-height:0;overflow:hidden}
 
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:14px 0}
.side-section{margin-bottom:18px}
.side-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.side-item{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--amber);background:var(--amber-bg);border-left-color:var(--amber);font-weight:500}
.side-icon{width:14px;height:14px;flex-shrink:0;opacity:.8}
.side-count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:8px}
.side-item.active .side-count{background:#fff;color:var(--amber-text)}
.side-count.urgent{background:var(--red-bg);color:var(--red-text)}
 
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
 
.cat-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:16px}
.cat-title{font-size:18px;font-weight:600}
.cat-sub{font-size:12px;color:var(--text3);margin-top:3px;max-width:820px}
 
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.search{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 12px;font-size:13px;font-family:var(--font);color:var(--text);width:240px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--amber)}
.search::placeholder{color:var(--text3)}
.fp{height:28px;padding:0 13px;border-radius:20px;border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.fp:hover{color:var(--text);border-color:var(--border-strong)}
.fp.active{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-text);font-weight:500}
.tb-spacer{flex:1}
.tb-count{font-size:12px;color:var(--text3);font-family:var(--mono)}
 
.split{display:flex;flex:1;overflow:hidden;min-height:0}
.list-pane{flex:1;overflow:auto;background:var(--surface)}
.detail-pane{width:480px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
 
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);letter-spacing:.05em;text-transform:uppercase;position:sticky;top:0;white-space:nowrap;z-index:1}
tbody td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody tr.sel td{background:var(--amber-bg)}
.td-main{font-weight:500;color:var(--text)}
.td-2{color:var(--text2)}
.td-mono{font-family:var(--mono);font-size:12px;color:var(--text2)}
.td-right{text-align:right}
.td-center{text-align:center}
 
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-purple{background:var(--purple-bg);color:var(--purple-text)}
.b-teal{background:var(--teal-bg);color:var(--teal-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
.b-dark{background:var(--text);color:#fff}
 
/* Estados cobranza */
.st-pendiente{background:#FAEEDA;color:#633806}
.st-cobro_parcial{background:#EEEDFE;color:#3C3489}
.st-cobrada{background:#EAF3DE;color:#27500A}
.st-vencida{background:#FCEBEB;color:#791F1F}
.st-autorizada{background:#E6F1FB;color:#0C447C}
.st-pagada{background:#181816;color:#fff}
.st-cancelada{background:#F1EFE8;color:#9c9c96}
 
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;padding:32px;text-align:center}
.d-icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-med);display:flex;align-items:center;justify-content:center;color:var(--text3)}
.dh{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.dh-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.dh-name{font-size:16px;font-weight:600;color:var(--text)}
.dh-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.db{flex:1;overflow-y:auto;padding:14px 18px}
 
.sec{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px}
.sec:first-child{margin-top:0}
.sec-action{font-size:11px;color:var(--amber);cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0}
.sec-action:hover{text-decoration:underline}
 
.fl{font-size:11px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.fl-required::after{content:'*';color:var(--red-text);margin-left:2px}
.fl-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.fl-tag.cat{background:var(--purple-bg);color:var(--purple-text)}
.fl-tag.her{background:var(--amber-bg);color:var(--amber-text)}
.fl-tag.calc{background:var(--blue-bg);color:var(--blue-text)}
.fl-tag.der{background:#F1EFE8;color:#5F5E5A}
.fv{font-size:13px;color:var(--text);margin-bottom:11px;min-height:18px}
.fv.mono{font-family:var(--mono);font-size:12px}
.fv.muted{color:var(--text2)}
.fv.link{color:var(--blue);cursor:pointer}
.fv.link:hover{text-decoration:underline}
.fv.big{font-size:18px;font-weight:600}
.fi{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;transition:border-color .15s}
.fi:focus{border-color:var(--amber);background:var(--surface)}
.fi:read-only{background:var(--surface3);color:var(--text2);cursor:not-allowed}
.fsel{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 9px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;cursor:pointer}
.fsel:focus{border-color:var(--amber);background:var(--surface)}
.ftxt{width:100%;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:8px 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;resize:vertical;min-height:60px}
.ftxt:focus{border-color:var(--amber);background:var(--surface)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.r4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
 
.df{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--surface)}
 
.btn{height:34px;padding:0 14px;border-radius:var(--r);border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-sm{height:28px;padding:0 11px;font-size:12px}
.btn-xs{height:24px;padding:0 10px;font-size:11px}
.btn-amber{background:var(--amber);border-color:var(--amber);color:#fff}
.btn-amber:hover{background:#a06412;color:#fff}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-blue:hover{background:#134a82;color:#fff}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-teal:hover{background:#0d5e49;color:#fff}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-purple:hover{background:#4840a0;color:#fff}
.btn-dark{background:var(--text);border-color:var(--text);color:#fff}
.btn-dark:hover{background:#2c2c2a;color:#fff}
.btn-danger{background:var(--red-bg);border-color:#F5C2C2;color:var(--red-text)}
.btn-danger:hover{background:#F8DEDE}
 
/* Métricas */
.mc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px}
.mc{background:var(--surface2);border-radius:var(--r);padding:10px 12px}
.mc-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.03em;text-transform:uppercase;font-weight:600}
.mc-val{font-size:17px;font-weight:600;font-family:var(--mono);color:var(--text)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:1px}
 
/* Banner KPI tipo dashboard */
.kpi-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;gap:10px}
.kpi-box{flex:1;background:var(--surface2);border-radius:var(--r);padding:10px 13px;border-left:3px solid var(--border-med)}
.kpi-box.warn{border-left-color:var(--amber-border);background:#FDF8EB}
.kpi-box.danger{border-left-color:#F5C2C2;background:#FDF5F5}
.kpi-box.success{border-left-color:#A8D585;background:#F4F9EB}
.kpi-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px}
.kpi-val{font-size:18px;font-weight:600;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px}
 
/* Heredado */
.heredado-block{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);padding:11px 13px;margin-bottom:14px;font-size:12px}
.heredado-title{font-size:10px;font-weight:600;color:var(--amber-text);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.heredado-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px}
.heredado-row{display:flex;flex-direction:column}
.heredado-lbl{font-size:10px;color:var(--amber-text);opacity:.8}
.heredado-val{font-size:12px;color:var(--text)}
 
/* Progress bar de cobranza */
.progress-bar{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin:8px 0 4px}
.progress-fill{height:100%;background:var(--green-bg);transition:width .3s}
 
/* Tipo requisicion badges */
.tipo-pago_afiliado{background:var(--teal-bg);color:var(--teal-text)}
.tipo-pago_agencia{background:var(--purple-bg);color:var(--purple-text)}
.tipo-comision_vendedor{background:var(--blue-bg);color:var(--blue-text)}
.tipo-comision_agencia{background:#FFEFD9;color:#6E4001}
 
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
</style>
</head>
<body>
 
<header class="app-header">
  <div class="logo">GRC<span>·</span>OIR</div>
  <div class="fase-tag">FASE 3 · COBRANZA & PAGOS</div>
  <div class="header-spacer"></div>
  <div class="user-chip">
    <div class="user-avatar">SP</div>
    <span>CxC/CxP · sara.peña</span>
  </div>
</header>
 
<div class="app-body">
 
  <aside class="sidebar">
    <div class="side-section">
      <div class="side-title">Cobranza al cliente</div>
      <div class="side-item active" data-view="cobranza" onclick="show('cobranza')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M2 5h12v8H2z" stroke="currentColor" stroke-width="1.4"/><circle cx="8" cy="9" r="1.7" stroke="currentColor" stroke-width="1.4"/></svg>
        Cobranza de facturas <span class="side-count" id="cnt-cb">0</span>
      </div>
      <div class="side-item" data-view="pago_cliente" onclick="show('pago_cliente')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M3 11l4-4 3 3 3-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 5h3v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Pagos recibidos <span class="side-count" id="cnt-pc">0</span>
      </div>
    </div>
 
    <div class="side-section">
      <div class="side-title">Pagos a proveedores</div>
      <div class="side-item" data-view="requisicion" onclick="show('requisicion')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M4 2h7l3 3v9H4V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M11 2v3h3M7 9h4M7 11h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Requisiciones <span class="side-count" id="cnt-rq">0</span>
      </div>
    </div>
 
    <div class="side-section">
      <div class="side-title">Tesorería</div>
      <div class="side-item" data-view="movimiento_bancario" onclick="show('movimiento_bancario')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M2 6l6-3 6 3v1H2V6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M3 7v5M6 7v5M10 7v5M13 7v5M2 13h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Movimientos bancarios <span class="side-count" id="cnt-mb">0</span>
      </div>
    </div>
 
    <div class="side-section">
      <div class="side-title">Vistas operativas</div>
      <div class="side-item" onclick="showFiltered('cobranza','vencidas')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M8 1L1 14h14L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 6v4M8 12h.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Cobranzas vencidas <span class="side-count urgent" id="cnt-venc">0</span>
      </div>
      <div class="side-item" onclick="showFiltered('requisicion','pendientes')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Por autorizar <span class="side-count urgent" id="cnt-pa">0</span>
      </div>
      <div class="side-item" onclick="showFiltered('requisicion','autorizadas')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Por pagar <span class="side-count" id="cnt-pp">0</span>
      </div>
      <div class="side-item" onclick="showFiltered('movimiento_bancario','sin_conciliar')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M3 8l3-3M3 8l3 3M13 12V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Sin conciliar <span class="side-count" id="cnt-sc">0</span>
      </div>
    </div>
  </aside>
 
  <main class="main" id="main"></main>
</div>
 
<script>
/* ════════════════════════════════════════════════
   DATOS DE REFERENCIA
════════════════════════════════════════════════ */
const cat = {
  anunciante: [
    {id:'an1',nombre_comercial:'Televisa Publicidad',rfc_anunciante:'TPU900101XX1',dias_credito_default:30,contacto_nombre:'Ana Gutiérrez',contacto_email:'a.gutierrez@televisa.com',contacto_telefono:'55 1234 5678'},
    {id:'an2',nombre_comercial:'Grupo Bimbo',rfc_anunciante:'GBI971120AB3',dias_credito_default:60,contacto_nombre:'Carlos Méndez',contacto_email:'c.mendez@bimbo.com.mx',contacto_telefono:'55 8765 4321'},
    {id:'an3',nombre_comercial:'OXXO',rfc_anunciante:'OCO030401CD5',dias_credito_default:45,contacto_nombre:'Sofía Ramírez',contacto_email:'s.ramirez@oxxo.com',contacto_telefono:'81 2222 3333'},
    {id:'an4',nombre_comercial:'Soriana',rfc_anunciante:'SOR930201IJ2',dias_credito_default:45,contacto_nombre:'Miguel Á. Flores',contacto_email:'m.flores@soriana.com',contacto_telefono:'81 4444 5555'},
  ],
  agencia: [
    {id:'ag1',nombre_agencia:'Mindshare México',rfc_agencia:'MME050610EF7'},
    {id:'ag2',nombre_agencia:'OMD México',rfc_agencia:'OMD120815GH9'},
    {id:'ag3',nombre_agencia:'Initiative',rfc_agencia:'INI081205AB7'},
  ],
  afiliado: [
    {id:'af1',nombre_afiliado:'Multimedios Estrellas de Oro',razon_social_afiliado:'Multimedios Estrellas de Oro SA de CV'},
    {id:'af2',nombre_afiliado:'OIR Bajío',razon_social_afiliado:'OIR Bajío SA de CV'},
    {id:'af3',nombre_afiliado:'Grupo Radio Centro',razon_social_afiliado:'Grupo Radio Centro SAB de CV'},
  ],
  vendedor: [
    {id:'ve1',nombre_vendedor:'Carmen Aristegui',porcentaje_comision_default:5},
    {id:'ve2',nombre_vendedor:'Roberto López',porcentaje_comision_default:4},
    {id:'ve3',nombre_vendedor:'Patricia Méndez',porcentaje_comision_default:4.5},
    {id:'ve4',nombre_vendedor:'Eduardo Castro',porcentaje_comision_default:3.5},
  ],
  metodo_pago: [
    {id:'mp1',clave_metodo:'03',descripcion_metodo:'Transferencia electrónica'},
    {id:'mp2',clave_metodo:'02',descripcion_metodo:'Cheque nominativo'},
    {id:'mp3',clave_metodo:'04',descripcion_metodo:'Tarjeta de crédito'},
    {id:'mp4',clave_metodo:'99',descripcion_metodo:'Por definir'},
  ],
};

function fmt(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtFull(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(n){return Number(n||0).toFixed(n%1===0?0:2)+'%'}
function findById(arr,id){return arr.find(x=>x.id===id)}
function findRef(catName,id){return cat[catName] ? findById(cat[catName],id) : null}
function daysBetween(d1, d2){ return Math.round((new Date(d2)-new Date(d1))/(1000*60*60*24)); }
function today(){ return '2025-06-25'; } // Fecha "actual" del demo
 
const TIPO_REQ_LBL = {pago_afiliado:'Pago afiliado',pago_agencia:'Pago agencia',comision_vendedor:'Comisión vendedor',comision_agencia:'Comisión agencia'};
 
let state = {view:'cobranza', selected:null, filter:'all', search:''};
 
function show(view, filter){
  state.view = view; state.selected = null; state.filter = filter||'all'; state.search='';
  document.querySelectorAll('.side-item').forEach(el=>el.classList.toggle('active', el.dataset.view===view));
  render();
}
function showFiltered(view, filter){ show(view, filter); }
 
function updateCounts(){
  document.getElementById('cnt-cb').textContent = data.cobranza_factura.length;
  document.getElementById('cnt-pc').textContent = data.pago_cliente.length;
  document.getElementById('cnt-rq').textContent = data.requisicion.length;
  document.getElementById('cnt-mb').textContent = data.movimiento_bancario.length;
  document.getElementById('cnt-venc').textContent = data.cobranza_factura.filter(c=>c.estatus_cobro==='vencida').length;
  document.getElementById('cnt-pa').textContent = data.requisicion.filter(r=>r.estatus_requisicion==='pendiente').length;
  document.getElementById('cnt-pp').textContent = data.requisicion.filter(r=>r.estatus_requisicion==='autorizada').length;
  document.getElementById('cnt-sc').textContent = data.movimiento_bancario.filter(m=>!m.conciliado).length;
}
 
function render(){
  const main = document.getElementById('main');
  const r = renderers[state.view];
  main.innerHTML = r ? r() : '<div style="padding:40px;color:var(--text3)">Vista no implementada.</div>';
  updateCounts();
}
 
function emptyDetail(msg){
  return `<div class="d-empty"><div class="d-icon">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.2"/></svg>

}

    if (state.filter==='parciales' && c.estatus_cobro!=='cobro_parcial') return false;
    if (state.filter==='cobradas' && c.estatus_cobro!=='cobrada') return false;
    if (state.search){
      const q = state.search.toLowerCase();
      const f = findById(facturas_cliente, c.factura_id);
      const an = findRef('anunciante', c.anunciante_id);
      return (f?.numero_factura||'').toLowerCase().includes(q) || (an?.nombre_comercial||'').toLowerCase().includes(q);
    }
    return true;
  });
  const sel = state.selected ? findById(data.cobranza_factura, state.selected) : null;
 
  // KPIs
  const porCobrar = data.cobranza_factura.filter(c=>['pendiente','cobro_parcial','vencida'].includes(c.estatus_cobro)).reduce((s,c)=>s+c.importe_pendiente,0);
  const vencido = data.cobranza_factura.filter(c=>c.estatus_cobro==='vencida').reduce((s,c)=>s+c.importe_pendiente,0);
  const cobradoMes = data.cobranza_factura.filter(c=>c.estatus_cobro==='cobrada' && c.fecha_cobro && c.fecha_cobro.substring(0,7)==='2025-06').reduce((s,c)=>s+c.importe_total,0);
  const porVencer7d = data.cobranza_factura.filter(c=>['pendiente','cobro_parcial'].includes(c.estatus_cobro) && daysBetween(today(),c.fecha_estimada_cobro)<=7 && daysBetween(today(),c.fecha_estimada_cobro)>=0).reduce((s,c)=>s+c.importe_pendiente,0);
 
  return `

    <div>
      <div class="cat-title">Cobranza de facturas</div>
      <div class="cat-sub">Seguimiento del cobro de cada factura emitida y entregada. Días de crédito heredados del anunciante (editables). Permite capturar pagos parciales o totales.</div>

    <div class="kpi-box warn"><div class="kpi-lbl" style="color:var(--amber-text)">Vence en 7 días</div><div class="kpi-val" style="color:var(--amber-text)">${fmt(porVencer7d)}</div><div class="kpi-sub">próximas a vencer</div></div>

  </div>

    <input class="search" placeholder="Buscar factura o anunciante…" value="${state.search}" oninput="state.search=this.value;render()">

    <button class="fp ${state.filter==='vencidas'?'active':''}" onclick="state.filter='vencidas';render()">Vencidas</button>
    <button class="fp ${state.filter==='pendientes'?'active':''}" onclick="state.filter='pendientes';render()">Pendientes</button>
    <button class="fp ${state.filter==='parciales'?'active':''}" onclick="state.filter='parciales';render()">Parciales</button>
    <button class="fp ${state.filter==='cobradas'?'active':''}" onclick="state.filter='cobradas';render()">Cobradas</button>

function renderCobranzaDetail(c){

  const an = findRef('anunciante', c.anunciante_id);
  const ag = f && f.agencia_id ? findRef('agencia', f.agencia_id) : null;

function guardarPago(cobranzaId){
  const c = findById(data.cobranza_factura, cobranzaId);
  const monto = parseFloat(document.getElementById('pg-monto').value);
  if (!monto || monto<=0) { alert('Captura el monto del pago.'); return; }
  if (monto > c.importe_pendiente) { alert('El monto excede el saldo pendiente.'); return; }
  const ref = document.getElementById('pg-ref').value;
  if (!ref) { alert('Captura la referencia.'); return; }
 
  data.pago_cliente.push({
    id:'pc'+(data.pago_cliente.length+100),
    cobranza_id:cobranzaId,
    fecha_pago_cliente:document.getElementById('pg-fecha').value,
    monto_aplicado:monto,
    metodo_pago_id:document.getElementById('pg-mp').value,
    referencia_pago:ref,
    archivo_nombre:'comprobante_pago.pdf',
    created_at:today(), created_by:'sp'
  });
 
  // Actualizar cobranza
  c.importe_cobrado += monto;
  c.importe_pendiente = c.importe_total - c.importe_cobrado;
  if (c.importe_pendiente === 0){
    c.estatus_cobro = 'cobrada';
    c.fecha_cobro = document.getElementById('pg-fecha').value;
  } else if (c.importe_cobrado > 0){
    c.estatus_cobro = 'cobro_parcial';
  }
 
  state.selected = cobranzaId;
  show('cobranza');
  state.selected = cobranzaId;
  render();
}

          <th style="width:9%">OC SAP</th>
          <th style="width:13%">Tipo</th>
          <th style="width:21%">Beneficiario</th>
          <th style="width:10%">Origen</th>
          <th style="width:13%" class="td-right">Monto</th>
          <th style="width:11%">Pago</th>
          <th style="width:12%" class="td-center">Estado</th>
        </tr></thead>
        <tbody>
          ${items.map(r=>{
            let beneficiario = '—', origen = '—';
            if (r.tipo_requisicion==='pago_afiliado'){
              const af = findRef('afiliado', r.afiliado_id);
              beneficiario = af?af.nombre_afiliado:r.razon_social_afiliada||'—';
              const fa = factura_afiliado.find(x=>x.id===r.factura_afiliado_id);
              origen = fa?fa.factura_emisora:'—';
            } else if (r.tipo_requisicion==='pago_agencia'){
              const ag = findRef('agencia', r.agencia_id);
              beneficiario = ag?ag.nombre_agencia:'—';
              const fg = factura_agencia.find(x=>x.id===r.factura_agencia_id);
              origen = fg?fg.folio_factura_agencia:'—';
            } else if (r.tipo_requisicion==='comision_vendedor'){
              const ve = findRef('vendedor', r.vendedor_comision_id);
              beneficiario = ve?ve.nombre_vendedor:'—';
              const oc = findById(ordenes_cliente, r.orden_id);
              origen = oc?oc.folio_orden:'—';
            } else if (r.tipo_requisicion==='comision_agencia'){
              const ag = findRef('agencia', r.agencia_id);
              beneficiario = ag?ag.nombre_agencia:'—';
              const oc = findById(ordenes_cliente, r.orden_id);
              origen = oc?oc.folio_orden:'—';
            }
            return `<tr class="${state.selected===r.id?'sel':''}" onclick="state.selected='${r.id}';render()">
              <td class="td-mono" style="font-weight:600">${r.numero_requisicion}</td>
              <td class="td-mono" style="font-size:11px">${r.numero_oc_sap||'<span style="color:var(--text3)">—</span>'}</td>
              <td><span class="badge tipo-${r.tipo_requisicion}">${TIPO_REQ_LBL[r.tipo_requisicion]}</span></td>
              <td class="td-main">${beneficiario}</td>
              <td class="td-mono" style="font-size:11px">${origen}</td>
              <td class="td-right td-mono" style="font-weight:500">${fmt(r.monto_requisicion)}</td>
              <td class="td-mono" style="font-size:11px;color:${r.fecha_pago_requisicion?'var(--green-text)':'var(--text3)'}">${r.fecha_pago_requisicion||'—'}</td>
              <td class="td-center"><span class="badge st-${r.estatus_requisicion}">${r.estatus_requisicion}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane" id="detail-pane">${sel ? renderReqDetail(sel) : emptyDetail('Selecciona una requisición para ver detalle')}</div>
  </div>`;
};
 
function renderReqDetail(r){
  // Resolver entidades según tipo
  let beneficiarioObj = null, origenObj = null;
  const isAfiliado = r.tipo_requisicion==='pago_afiliado';
  const isAgencia = r.tipo_requisicion==='pago_agencia';
  const isComVend = r.tipo_requisicion==='comision_vendedor';
  const isComAg = r.tipo_requisicion==='comision_agencia';
 
  let beneficiarioNombre='—', beneficiarioSub='', origenFolio='—', origenDesc='';
  if (isAfiliado){
    const af = findRef('afiliado', r.afiliado_id);
    beneficiarioNombre = af?af.nombre_afiliado:r.razon_social_afiliada||'—';
    beneficiarioSub = af?af.razon_social_afiliado:r.razon_social_afiliada||'';
    const fa = factura_afiliado.find(x=>x.id===r.factura_afiliado_id);
    origenFolio = fa?fa.factura_emisora:'—';
    origenDesc = fa?`Factura emisora · ${fmt(fa.total_factura_afiliado)}`:'';
  } else if (isAgencia){
    const ag = findRef('agencia', r.agencia_id);
    beneficiarioNombre = ag?ag.nombre_agencia:'—';
    beneficiarioSub = ag?ag.rfc_agencia:'';
    const fg = factura_agencia.find(x=>x.id===r.factura_agencia_id);
    origenFolio = fg?fg.folio_factura_agencia:'—';
    origenDesc = fg?`Factura agencia · ${fmt(fg.total_factura_agencia)}`:'';
  } else if (isComVend){
    const ve = findRef('vendedor', r.vendedor_comision_id);
    beneficiarioNombre = ve?ve.nombre_vendedor:'—';
    beneficiarioSub = 'Vendedor';
    const oc = findById(ordenes_cliente, r.orden_id);
    origenFolio = oc?oc.folio_orden:'—';
    origenDesc = oc?`Sobre orden · ${fmt(oc.total)}`:'';
  } else if (isComAg){
    const ag = findRef('agencia', r.agencia_id);
    beneficiarioNombre = ag?ag.nombre_agencia:'—';
    beneficiarioSub = 'Agencia';
    const oc = findById(ordenes_cliente, r.orden_id);
    origenFolio = oc?oc.folio_orden:'—';
    origenDesc = oc?`Sobre orden · ${fmt(oc.total)}`:'';
  }
 
  return `
    <div class="dh">
      <div class="dh-row">
        <div>
          <div class="dh-name">${r.numero_requisicion}</div>
          <div class="dh-sub">
            <span class="badge st-${r.estatus_requisicion}">${r.estatus_requisicion}</span>
            <span class="badge tipo-${r.tipo_requisicion}">${TIPO_REQ_LBL[r.tipo_requisicion]}</span>
            ${r.numero_oc_sap?`<span class="td-mono" style="font-size:11px;color:var(--text3)">${r.numero_oc_sap}</span>`:''}
          </div>
        </div>
        ${r.estatus_requisicion!=='pagada'?`<button class="btn btn-sm" onclick="editReq('${r.id}')">Editar</button>`:''}
      </div>
    </div>
    <div class="db">
      <div class="mc-row">
        <div class="mc"><div class="mc-lbl">Monto</div><div class="mc-val" style="color:var(--amber-text)">${fmt(r.monto_requisicion)}</div></div>
        <div class="mc"><div class="mc-lbl">Estado</div><div style="font-size:13px;font-weight:600;font-family:var(--mono);text-transform:capitalize">${r.estatus_requisicion}</div></div>
        <div class="mc"><div class="mc-lbl">Fecha pago</div><div style="font-size:13px;font-weight:600;font-family:var(--mono);color:${r.fecha_pago_requisicion?'var(--green-text)':'var(--text3)'}">${r.fecha_pago_requisicion||'—'}</div></div>
      </div>
 
      <div class="sec">Beneficiario</div>
      <div style="border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:11px">
        <div style="font-weight:600;font-size:14px">${beneficiarioNombre}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${beneficiarioSub}</div>
      </div>
 
      <div class="sec">Origen del pago</div>
      <div style="border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;cursor:pointer">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span class="td-mono" style="font-weight:600">${origenFolio}</span>
        </div>
        <div style="font-size:11px;color:var(--text3)">${origenDesc}</div>
      </div>
 
      ${(isComVend||isComAg)?`
        <div class="sec">Cálculo de comisión</div>
        <div class="r2">
          <div><div class="fl">% Comisión</div><div class="fv mono">${fmtPct(isComVend?r.porcentaje_comision_vendedor:r.porcentaje_comision_agencia_req)}</div></div>
          <div><div class="fl">Monto <span class="fl-tag calc">Calc</span></div><div class="fv mono" style="font-weight:600">${fmt(isComVend?r.requisicion_comision_vendedor:r.requisicion_comision_agencia)}</div></div>
        </div>
      `:''}
 
      <div class="sec">Referencias</div>
      <div class="r2">
        <div><div class="fl">No. requisición</div><div class="fv mono">${r.numero_requisicion}</div></div>
        <div><div class="fl">No. OC SAP</div><div class="fv mono">${r.numero_oc_sap||'<span style="color:var(--text3)">— Sin OC SAP —</span>'}</div></div>
      </div>
 
      ${r.observaciones_cuentas_por_pagar?`<div class="sec">Observaciones CxP</div><div class="fv muted">${r.observaciones_cuentas_por_pagar}</div>`:''}
    </div>
    <div class="df">
      ${r.estatus_requisicion==='pendiente'?`<button class="btn btn-danger btn-sm" onclick="cancelarReq('${r.id}')">Cancelar</button><button class="btn btn-blue btn-sm" onclick="autorizarReq('${r.id}')">Autorizar →</button>`:''}
      ${r.estatus_requisicion==='autorizada'?`<button class="btn btn-amber btn-sm" onclick="marcarPagadaReq('${r.id}')">Marcar pagada →</button>`:''}
      ${r.estatus_requisicion==='pagada'?`<button class="btn btn-sm" disabled style="opacity:.6">✓ Pagada el ${r.fecha_pago_requisicion}</button>`:''}
    </div>`;
}
 
function autorizarReq(id){
  const r = findById(data.requisicion, id);
  r.estatus_requisicion = 'autorizada';
  render();
}
 
function cancelarReq(id){
  if (confirm('¿Cancelar esta requisición?')){
    const r = findById(data.requisicion, id);
    r.estatus_requisicion = 'cancelada';
    render();
  }
}
 
function marcarPagadaReq(id){
  const r = findById(data.requisicion, id);
  const fecha = prompt('Fecha de pago (YYYY-MM-DD):', today());
  if (!fecha) return;
  r.estatus_requisicion = 'pagada';
  r.fecha_pago_requisicion = fecha;
  render();
}
 
function newReq(){ alert('Form de nueva requisición: tipo, origen (factura/orden), beneficiario, monto, OC SAP opcional.'); }
function editReq(id){ alert('Form de edición de requisición.'); }
 
/* ════════════════════════════════════════════════
   RENDERER: MOVIMIENTOS BANCARIOS
════════════════════════════════════════════════ */
renderers.movimiento_bancario = () => {
  let items = data.movimiento_bancario.filter(m=>{
    if (state.filter==='sin_conciliar' && m.conciliado) return false;
    if (state.filter==='conciliados' && !m.conciliado) return false;
    if (state.filter==='cargos' && m.tipo_movimiento!=='cargo') return false;
    if (state.filter==='abonos' && m.tipo_movimiento!=='abono') return false;
    if (state.search){
      const q = state.search.toLowerCase();
      return m.referencia_bancaria.toLowerCase().includes(q) || m.descripcion_movimiento.toLowerCase().includes(q);
    }
    return true;
  });
  items.sort((a,b)=>new Date(b.fecha_movimiento)-new Date(a.fecha_movimiento));
  const sel = state.selected ? findById(data.movimiento_bancario, state.selected) : null;
 
  const sinConciliar = data.movimiento_bancario.filter(m=>!m.conciliado).length;
  const totalAbonos = data.movimiento_bancario.filter(m=>m.tipo_movimiento==='abono').reduce((s,m)=>s+m.monto_movimiento,0);
  const totalCargos = data.movimiento_bancario.filter(m=>m.tipo_movimiento==='cargo').reduce((s,m)=>s+m.monto_movimiento,0);
 
  return `
  <div class="cat-header">
    <div>
      <div class="cat-title">Movimientos bancarios</div>
      <div class="cat-sub">Movimientos cargados por Tesorería para conciliación. Los abonos se reconcilian con pagos del cliente; los cargos con requisiciones pagadas.</div>
    </div>
    <button class="btn btn-amber" onclick="newMB()">+ Cargar movimientos</button>
  </div>
  <div class="kpi-strip">
    <div class="kpi-box success"><div class="kpi-lbl" style="color:var(--green-text)">Total abonos</div><div class="kpi-val" style="color:var(--green-text)">${fmt(totalAbonos)}</div><div class="kpi-sub">${data.movimiento_bancario.filter(m=>m.tipo_movimiento==='abono').length} entradas</div></div>
    <div class="kpi-box"><div class="kpi-lbl">Total cargos</div><div class="kpi-val">${fmt(totalCargos)}</div><div class="kpi-sub">${data.movimiento_bancario.filter(m=>m.tipo_movimiento==='cargo').length} salidas</div></div>
    <div class="kpi-box ${sinConciliar>0?'danger':''}"><div class="kpi-lbl" style="${sinConciliar>0?'color:var(--red-text)':''}">Sin conciliar</div><div class="kpi-val" style="${sinConciliar>0?'color:var(--red-text)':''}">${sinConciliar}</div><div class="kpi-sub">movimientos por revisar</div></div>
  </div>
  <div class="toolbar">
    <input class="search" placeholder="Buscar referencia o descripción…" value="${state.search}" oninput="state.search=this.value;render()">
    <button class="fp ${state.filter==='all'?'active':''}" onclick="state.filter='all';render()">Todos</button>
    <button class="fp ${state.filter==='sin_conciliar'?'active':''}" onclick="state.filter='sin_conciliar';render()">Sin conciliar</button>
    <button class="fp ${state.filter==='conciliados'?'active':''}" onclick="state.filter='conciliados';render()">Conciliados</button>
    <button class="fp ${state.filter==='abonos'?'active':''}" onclick="state.filter='abonos';render()">Abonos</button>
    <button class="fp ${state.filter==='cargos'?'active':''}" onclick="state.filter='cargos';render()">Cargos</button>
    <div class="tb-spacer"></div>
    <span class="tb-count">${items.length} de ${data.movimiento_bancario.length}</span>
  </div>
  <div class="split">
    <div class="list-pane">
      <table>
        <thead><tr>
          <th style="width:11%">Fecha</th>
          <th style="width:10%">Tipo</th>
          <th style="width:14%" class="td-right">Monto</th>
          <th style="width:18%">Referencia</th>
          <th style="width:31%">Descripción</th>
          <th style="width:16%" class="td-center">Concilia</th>
        </tr></thead>
        <tbody>
          ${items.map(m=>{
            const tipoCls = m.tipo_movimiento==='abono'?'b-green':'b-amber';
            const signo = m.tipo_movimiento==='abono'?'+':'−';
            const color = m.tipo_movimiento==='abono'?'var(--green-text)':'var(--amber-text)';
            return `<tr class="${state.selected===m.id?'sel':''}" onclick="state.selected='${m.id}';render()">
              <td class="td-mono" style="font-size:11px">${m.fecha_movimiento}</td>
              <td><span class="badge ${tipoCls}">${m.tipo_movimiento}</span></td>
              <td class="td-right td-mono" style="color:${color};font-weight:600">${signo}${fmt(m.monto_movimiento)}</td>
              <td class="td-mono" style="font-size:11px">${m.referencia_bancaria}</td>
              <td class="td-main" style="font-size:12px">${m.descripcion_movimiento}</td>
              <td class="td-center"><span class="badge ${m.conciliado?'b-green':'b-amber'}">${m.conciliado?'✓ Conciliado':'⚠ Pendiente'}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane">${sel ? (()=>{
      const tipoCls = sel.tipo_movimiento==='abono'?'b-green':'b-amber';
      const signo = sel.tipo_movimiento==='abono'?'+':'−';
      const color = sel.tipo_movimiento==='abono'?'var(--green-text)':'var(--amber-text)';
      return `
        <div class="dh">
          <div class="dh-row">
            <div>
              <div class="dh-name" style="font-family:var(--mono);color:${color}">${signo}${fmt(sel.monto_movimiento)}</div>
              <div class="dh-sub"><span class="badge ${tipoCls}">${sel.tipo_movimiento}</span><span class="badge ${sel.conciliado?'b-green':'b-amber'}">${sel.conciliado?'✓ Conciliado':'⚠ Pendiente'}</span></div>
            </div>
            ${!sel.conciliado?'<button class="btn btn-sm" onclick="conciliarMB(\''+sel.id+'\')">Conciliar</button>':''}
          </div>
        </div>
        <div class="db">
          <div class="sec">Datos</div>
          <div class="fl">Fecha</div><div class="fv mono">${sel.fecha_movimiento}</div>
          <div class="fl">Tipo</div><div class="fv">${sel.tipo_movimiento==='abono'?'Abono (entrada)':'Cargo (salida)'}</div>
          <div class="fl">Monto</div><div class="fv mono big" style="color:${color}">${signo}${fmtFull(sel.monto_movimiento)}</div>
          <div class="fl">Referencia bancaria</div><div class="fv mono">${sel.referencia_bancaria}</div>
          <div class="fl">Concepto</div><div class="fv muted">${sel.descripcion_movimiento}</div>
          ${sel.archivo_nombre?`<div class="fl">Estado de cuenta</div>
          <div style="display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:12px">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="1" width="8" height="12" rx="1.2" stroke="currentColor" stroke-width="1.1"/></svg>${sel.archivo_nombre}
          </div>`:''}
          ${!sel.conciliado?`
          <div class="sec">Sugerencias de conciliación</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Busca movimientos relacionados por monto, fecha o referencia para conciliar.</div>
          <div style="background:var(--surface2);border-radius:var(--r);padding:9px 11px;font-size:12px;color:var(--text2);text-align:center">
            <em>No se encontraron coincidencias automáticas</em>
            <div style="margin-top:6px"><button class="btn btn-xs">Buscar manualmente</button></div>
          </div>
          `:''}
        </div>
        <div class="df">
          ${!sel.conciliado?'<button class="btn btn-amber btn-sm" onclick="conciliarMB(\''+sel.id+'\')">Marcar conciliado</button>':'<button class="btn btn-sm" disabled style="opacity:.6">Conciliado</button>'}
        </div>
      `;
    })() : emptyDetail('Selecciona un movimiento')}</div>
  </div>`;
};
 
function conciliarMB(id){
  const m = findById(data.movimiento_bancario, id);
  m.conciliado = true;
  render();
}
 
function newMB(){ alert('Cargar estado de cuenta (CSV/Excel) para importar movimientos.'); }
 
/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
