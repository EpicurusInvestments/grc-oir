<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GRC-OIR — Fase 2: Facturación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--surface3:#e6e5de;
  --border:#e0dfd8;--border-med:#c8c7bf;--border-strong:#b0afa8;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-border:#AFA9EC;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;--teal-border:#5DCAA5;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#FAC775;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --r:8px;--rl:12px;
  --font:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Consolas',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
 
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.02em}
.logo span{color:var(--purple)}
.fase-tag{font-size:11px;font-family:var(--mono);background:var(--blue-bg);color:var(--blue-text);padding:3px 10px;border-radius:20px;font-weight:500}
.header-spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
 
.app-body{flex:1;display:flex;min-height:0;overflow:hidden}
 
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:14px 0}
.side-section{margin-bottom:18px}
.side-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.side-item{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--blue);background:var(--blue-bg);border-left-color:var(--blue);font-weight:500}
.side-icon{width:14px;height:14px;flex-shrink:0;opacity:.8}
.side-count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:8px}
.side-item.active .side-count{background:#fff;color:var(--blue-text)}
.side-count.urgent{background:var(--red-bg);color:var(--red-text)}
 
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
 
.cat-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:16px}
.cat-title{font-size:18px;font-weight:600}
.cat-sub{font-size:12px;color:var(--text3);margin-top:3px;max-width:820px}
 
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.search{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 12px;font-size:13px;font-family:var(--font);color:var(--text);width:240px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}
.sel-f{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 10px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;cursor:pointer}
.sel-f:focus{border-color:var(--blue)}
.fp{height:28px;padding:0 13px;border-radius:20px;border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.fp:hover{color:var(--text);border-color:var(--border-strong)}
.fp.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text);font-weight:500}
.tb-spacer{flex:1}
.tb-count{font-size:12px;color:var(--text3);font-family:var(--mono)}
 
.split{display:flex;flex:1;overflow:hidden;min-height:0}
.list-pane{flex:1;overflow:auto;background:var(--surface)}
.detail-pane{width:480px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
 
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);letter-spacing:.05em;text-transform:uppercase;position:sticky;top:0;white-space:nowrap;z-index:1}
tbody td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody tr.sel td{background:var(--blue-bg)}
.td-main{font-weight:500;color:var(--text)}
.td-2{color:var(--text2)}
.td-mono{font-family:var(--mono);font-size:12px;color:var(--text2)}
.td-right{text-align:right}
.td-center{text-align:center}
 
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-purple{background:var(--purple-bg);color:var(--purple-text)}
.b-teal{background:var(--teal-bg);color:var(--teal-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
.b-dark{background:var(--text);color:#fff}
 
/* Estatus de facturación */
.st-preparada{background:#FAEEDA;color:#633806}
.st-enviada_a_timbrado{background:#EEEDFE;color:#3C3489}
.st-timbrada{background:#E6F1FB;color:#0C447C}
.st-entregada{background:#E1F5EE;color:#085041}
.st-cobrada{background:#181816;color:#fff}
.st-cancelada{background:#F1EFE8;color:#9c9c96}
.st-recibida{background:#FAEEDA;color:#633806}
.st-en_revision{background:#EEEDFE;color:#3C3489}
.st-autorizada{background:#E6F1FB;color:#0C447C}
.st-pagada{background:#E1F5EE;color:#085041}
 
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;padding:32px;text-align:center}
.d-icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-med);display:flex;align-items:center;justify-content:center;color:var(--text3)}
.dh{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.dh-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.dh-name{font-size:16px;font-weight:600;color:var(--text)}
.dh-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.db{flex:1;overflow-y:auto;padding:14px 18px}
 
.sec{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px}
.sec:first-child{margin-top:0}
.sec-action{font-size:11px;color:var(--blue);cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0}
.sec-action:hover{text-decoration:underline}
 
.fl{font-size:11px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.fl-required::after{content:'*';color:var(--red-text);margin-left:2px}
.fl-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.fl-tag.cat{background:var(--purple-bg);color:var(--purple-text)}
.fl-tag.her{background:var(--amber-bg);color:var(--amber-text)}
.fl-tag.calc{background:var(--blue-bg);color:var(--blue-text)}
.fl-tag.der{background:#F1EFE8;color:#5F5E5A}
.fl-tag.timbrado{background:var(--purple-bg);color:var(--purple-text)}
.fv{font-size:13px;color:var(--text);margin-bottom:11px;min-height:18px}
.fv.mono{font-family:var(--mono);font-size:12px}
.fv.muted{color:var(--text2)}
.fv.link{color:var(--blue);cursor:pointer}
.fv.link:hover{text-decoration:underline}
.fv.big{font-size:18px;font-weight:600}
.fi{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;transition:border-color .15s}
.fi:focus{border-color:var(--blue);background:var(--surface)}
.fi:read-only{background:var(--surface3);color:var(--text2);cursor:not-allowed}
.fsel{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 9px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;cursor:pointer}
.fsel:focus{border-color:var(--blue);background:var(--surface)}
.ftxt{width:100%;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:8px 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;resize:vertical;min-height:60px}
.ftxt:focus{border-color:var(--blue);background:var(--surface)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
 
.df{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--surface)}
 
.btn{height:34px;padding:0 14px;border-radius:var(--r);border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-sm{height:28px;padding:0 11px;font-size:12px}
.btn-xs{height:24px;padding:0 10px;font-size:11px}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-blue:hover{background:#134a82;color:#fff}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-teal:hover{background:#0d5e49;color:#fff}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-purple:hover{background:#4840a0;color:#fff}
.btn-amber{background:#BA7517;border-color:#BA7517;color:#fff}
.btn-amber:hover{background:#a06412;color:#fff}
.btn-dark{background:var(--text);border-color:var(--text);color:#fff}
.btn-dark:hover{background:#2c2c2a;color:#fff}
 
/* Timeline de facturación */
.timeline{display:flex;align-items:center;margin:8px 0 14px;padding:8px 0}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;font-size:10px}
.tl-step:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:1.5px;background:var(--border-med);z-index:0}
.tl-step.done:not(:last-child)::after{background:var(--blue)}
.tl-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-med);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;z-index:1;color:var(--text3)}
.tl-step.done .tl-dot{background:var(--blue);border-color:var(--blue);color:#fff}
.tl-step.current .tl-dot{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 0 0 3px var(--purple-bg)}
.tl-lbl{margin-top:5px;color:var(--text3);text-align:center;font-size:9px;line-height:1.2;max-width:65px}
.tl-step.done .tl-lbl{color:var(--blue-text)}
.tl-step.current .tl-lbl{color:var(--purple-text);font-weight:600}
 
/* Metric cards */
.mc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px}
.mc{background:var(--surface2);border-radius:var(--r);padding:10px 12px}
.mc-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.03em;text-transform:uppercase;font-weight:600}
.mc-val{font-size:17px;font-weight:600;font-family:var(--mono);color:var(--text)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:1px}
 
/* Heredado */
.heredado-block{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);padding:11px 13px;margin-bottom:14px;font-size:12px}
.heredado-title{font-size:10px;font-weight:600;color:var(--amber-text);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.heredado-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px}
.heredado-row{display:flex;flex-direction:column}
.heredado-lbl{font-size:10px;color:var(--amber-text);opacity:.8}
.heredado-val{font-size:12px;color:var(--text)}
 
/* Timbrado banner */
.timbrado-banner{background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px}
.tb-title{font-size:11px;font-weight:600;color:var(--purple-text);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.tb-msg{font-size:12px;color:var(--text2);line-height:1.5}
 
/* OE allocation row */
.alloc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;font-size:12px}
.alloc-row .lbl{flex:1}
.alloc-row .input{width:120px}
 
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
</style>
</head>
<body>
 
<header class="app-header">
  <div class="logo">GRC<span>·</span>OIR</div>
  <div class="fase-tag">FASE 2 · FACTURACIÓN</div>
  <div class="header-spacer"></div>
  <div class="user-chip">
    <div class="user-avatar">MR</div>
    <span>Facturación · maria.ramos</span>
  </div>
</header>
 
<div class="app-body">
 
  <aside class="sidebar">
    <div class="side-section">
      <div class="side-title">Facturación al cliente</div>
      <div class="side-item active" data-view="factura_cliente" onclick="show('factura_cliente')">

        Facturas al cliente <span class="side-count" id="cnt-fc">0</span>
      </div>
      <div class="side-item" data-view="ordenes_para_facturar" onclick="show('ordenes_para_facturar')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Listas para facturar <span class="side-count urgent" id="cnt-lf">0</span>
      </div>
    </div>
 
    <div class="side-section">
      <div class="side-title">Facturas recibidas</div>
      <div class="side-item" data-view="factura_afiliado" onclick="show('factura_afiliado')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M2 12V4l4 4 4-4 4 4v4M2 14h12" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        De afiliados <span class="side-count" id="cnt-fa">0</span>
      </div>
      <div class="side-item" data-view="factura_agencia" onclick="show('factura_agencia')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        De agencias <span class="side-count" id="cnt-fg">0</span>
      </div>
    </div>
 
    <div class="side-section">
      <div class="side-title">Costos</div>
      <div class="side-item" data-view="costo_adicional" onclick="show('costo_adicional')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v6M6 7h3.5a1.5 1.5 0 010 3H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Costos adicionales <span class="side-count" id="cnt-co">0</span>
      </div>
    </div>
  </aside>
 
  <main class="main" id="main"></main>
</div>

function fmt(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtFull(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(n){return Number(n||0).toFixed(n%1===0?0:2)+'%'}
function findById(arr,id){return arr.find(x=>x.id===id)}
function findRef(catName,id){return cat[catName] ? findById(cat[catName],id) : null}
 
const STATUS_FC_FLOW = ['preparada','enviada_a_timbrado','timbrada','entregada','cobrada'];
const STATUS_FC_LBL = {preparada:'Preparada',enviada_a_timbrado:'Enviada a timbrado',timbrada:'Timbrada',entregada:'Entregada',cobrada:'Cobrada',cancelada:'Cancelada'};
 
let state = {view:'factura_cliente', selected:null, filter:'all', search:''};
 
function show(view, filter){
  state.view = view; state.selected = null; state.filter = filter||'all'; state.search='';
  document.querySelectorAll('.side-item').forEach(el=>el.classList.toggle('active', el.dataset.view===view));
  render();
}
 
function updateCounts(){
  document.getElementById('cnt-fc').textContent = data.factura_cliente.length;
  document.getElementById('cnt-fa').textContent = data.factura_afiliado.length;
  document.getElementById('cnt-fg').textContent = data.factura_agencia.length;
  document.getElementById('cnt-co').textContent = data.costo_adicional.length;
  // Órdenes listas para facturar = OC en estado orden_cerrada sin factura
  const listas = ordenes_cliente.filter(o => o.estatus_orden==='orden_cerrada' && !data.factura_cliente.find(f=>f.orden_id===o.id)).length;
  document.getElementById('cnt-lf').textContent = listas;
}
 
function render(){
  const main = document.getElementById('main');
  const r = renderers[state.view];
  main.innerHTML = r ? r() : '<div style="padding:40px;color:var(--text3)">Vista no implementada.</div>';
  updateCounts();
}
 
function emptyDetail(msg){
  return `<div class="d-empty"><div class="d-icon">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.2"/></svg>
  </div>${msg}</div>`;
}
 
function timelineFC(current){
  if (current==='cancelada') return `<div style="background:var(--gray-bg);color:var(--gray-text);padding:8px 12px;border-radius:var(--r);text-align:center;font-size:12px;margin:8px 0 14px;font-weight:500">Factura cancelada</div>`;
  const idx = STATUS_FC_FLOW.indexOf(current);
  const labels = {preparada:'Prep.',enviada_a_timbrado:'Enviada',timbrada:'Timbrada',entregada:'Entregada',cobrada:'Cobrada'};
  return `<div class="timeline">${STATUS_FC_FLOW.map((s,i)=>{
    const cls = i<idx?'done':i===idx?'current':'';
    return `<div class="tl-step ${cls}"><div class="tl-dot">${i<idx?'✓':i+1}</div><div class="tl-lbl">${labels[s]}</div></div>`;
  }).join('')}</div>`;
}

function guardarTimbrado(id){

  f.folio_fiscal_sat = folio;
  f.fecha_timbrado = document.getElementById('tb-fecha').value;
  f.xml_path = '/facturas/'+f.numero_factura+'.xml';
  f.pdf_path = '/facturas/'+f.numero_factura+'.pdf';
  f.estado_facturacion = 'timbrada';
  state.selected = id;
  show('factura_cliente');
  state.selected = id;
  render();

function guardarFactura(ocId){
  const oc = findById(ordenes_cliente, ocId);
  const num = document.getElementById('nf-num').value;
  if (!num) { alert('Captura el número de factura.'); return; }
  const sub = parseFloat(document.getElementById('nf-sub').value) || 0;
  const newF = {
    id: 'fc'+(data.factura_cliente.length+100),

    empresa_facturadora_id: oc.empresa_facturadora_id,
    anunciante_id: oc.anunciante_id,

    fecha_entrega_factura: document.getElementById('nf-fe').value || null,
    subtotal_factura: sub,
    iva_factura: sub * 0.16,

  </div>
  <div class="split">
    <div class="list-pane">
      <table>
        <thead><tr>
          <th style="width:11%">Tipo</th>
          <th style="width:11%">Período</th>
          <th style="width:34%">Descripción</th>
          <th style="width:14%">Orden asociada</th>
          <th style="width:14%" class="td-right">Monto</th>
          <th style="width:16%">Archivo</th>
        </tr></thead>
        <tbody>
          ${items.map(c=>{
            const oc = c.orden_id ? findById(ordenes_cliente, c.orden_id) : null;
            const tipoCls = c.tipo_costo==='nomina'?'b-purple':'b-amber';
            return `<tr class="${state.selected===c.id?'sel':''}" onclick="state.selected='${c.id}';render()">
              <td><span class="badge ${tipoCls}">${c.tipo_costo==='nomina'?'Nómina':'Overhead'}</span></td>
              <td class="td-mono">${c.periodo_contable}</td>
              <td class="td-main">${c.descripcion_costo}</td>
              <td class="td-mono" style="font-size:11px">${oc?oc.folio_orden:'<span style="color:var(--text3)">General</span>'}</td>
              <td class="td-right td-mono" style="font-weight:500">${fmt(c.monto_costo)}</td>
              <td class="td-2" style="font-size:11px">${c.archivo_nombre||'<span style="color:var(--text3)">—</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane" id="detail-pane">${sel ? `
      <div class="dh">
        <div class="dh-row">
          <div>
            <div class="dh-name">${sel.descripcion_costo}</div>
            <div class="dh-sub"><span class="badge ${sel.tipo_costo==='nomina'?'b-purple':'b-amber'}">${sel.tipo_costo==='nomina'?'Nómina':'Overhead'}</span><span class="td-mono" style="font-size:11px;color:var(--text3)">${sel.periodo_contable}</span></div>
          </div>
          <button class="btn btn-sm">Editar</button>
        </div>
      </div>
      <div class="db">
        <div class="sec">Datos</div>
        <div class="fl">Tipo</div><div class="fv">${sel.tipo_costo==='nomina'?'Nómina (formato NOI)':'Overhead (libre)'}</div>
        <div class="fl">Período contable</div><div class="fv mono">${sel.periodo_contable}</div>
        <div class="fl">Orden asociada</div><div class="fv">${sel.orden_id ? (findById(ordenes_cliente,sel.orden_id)?.folio_orden||'—') : '<span class="muted">General del período</span>'}</div>
        <div class="sec">Monto</div>
        <div class="fv mono big" style="color:var(--blue-text)">${fmtFull(sel.monto_costo)}</div>
        ${sel.archivo_nombre?`<div class="sec">Archivo de respaldo</div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:12px">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="1" width="8" height="12" rx="1.2" stroke="currentColor" stroke-width="1.1"/></svg>
          ${sel.archivo_nombre}
        </div>`:''}
      </div>
    ` : emptyDetail('Selecciona un costo')}</div>
  </div>`;
};
 
function newCA(){ alert('Formulario de captura de costo adicional: tipo (nómina/overhead), período, descripción, monto, archivo opcional.'); }
 
/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
