<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--surface3:#e6e5de;
  --border:#e0dfd8;--border-med:#c8c7bf;--border-strong:#b0afa8;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#633806;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --gray:#5C5C58;--gray-bg:#F1EFE8;--gray-text:#444441;--gray-dark:#3D3D3A;
  --r:8px;--rl:12px;
  --font:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Consolas',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
 
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.02em}
.logo span{color:var(--purple)}
.fase-tag{font-size:11px;font-family:var(--mono);background:var(--gray-bg);color:var(--gray-text);padding:3px 10px;border-radius:20px;font-weight:500}
.header-spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gray-bg);color:var(--gray-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
 
.app-body{flex:1;display:flex;min-height:0;overflow:hidden}
 
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:14px 0}
.side-section{margin-bottom:18px}
.side-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.side-item{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--gray-dark);background:var(--gray-bg);border-left-color:var(--gray-dark);font-weight:500}
.side-icon{width:14px;height:14px;flex-shrink:0;opacity:.8}
 
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
 
.cat-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:16px}
.cat-title{font-size:18px;font-weight:600}
.cat-sub{font-size:12px;color:var(--text3);margin-top:3px;max-width:820px}
 
.period-selector{display:flex;align-items:center;gap:8px}
.period-selector select{height:34px;padding:0 11px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface);font-family:var(--mono);font-size:12px;color:var(--text);cursor:pointer;outline:none}
.period-selector select:focus{border-color:var(--gray-dark)}
 
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.fp{height:28px;padding:0 13px;border-radius:20px;border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.fp:hover{color:var(--text);border-color:var(--border-strong)}
.fp.active{background:var(--gray-bg);border-color:var(--gray);color:var(--gray-dark);font-weight:500}
.tb-spacer{flex:1}
 
.dashboard{flex:1;overflow:auto;padding:18px 22px}
 
/* KPI cards arriba */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;position:relative}
.kpi.accent{border-left:3px solid var(--gray-dark)}
.kpi-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--text);line-height:1.1}
.kpi-val.good{color:var(--green-text)}
.kpi-val.bad{color:var(--red-text)}
.kpi-val.warn{color:var(--amber-text)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:5px}
.kpi-trend{font-family:var(--mono);font-weight:600;font-size:11px;padding:1px 5px;border-radius:6px}
.kpi-trend.up{background:var(--green-bg);color:var(--green-text)}
.kpi-trend.down{background:var(--red-bg);color:var(--red-text)}
.kpi-trend.flat{background:var(--surface3);color:var(--text2)}
 
/* Section card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title-sub{font-size:11px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}
 
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
 
/* P&L Table */
.pl-table{width:100%;border-collapse:collapse;font-size:13px}
.pl-table td{padding:7px 0;border-bottom:1px dashed var(--border)}
.pl-table tr.sec-header td{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding-top:14px;padding-bottom:5px;border-bottom:1px solid var(--text3)}
.pl-table tr.sec-header td:first-child{color:var(--gray-dark)}
.pl-table tr.line td:first-child{padding-left:18px;color:var(--text2)}
.pl-table tr.line td:last-child{font-family:var(--mono);text-align:right}
.pl-table tr.subtotal td{font-weight:600;border-bottom:none;padding-top:8px;padding-bottom:8px}
.pl-table tr.subtotal td:last-child{font-family:var(--mono);text-align:right;border-top:1px solid var(--border-med)}
.pl-table tr.total td{font-weight:700;font-size:14px;padding-top:11px;padding-bottom:11px;border-top:2px solid var(--text);border-bottom:2px solid var(--text)}
.pl-table tr.total td:last-child{font-family:var(--mono);text-align:right;font-size:16px}
.pl-neg{color:var(--red-text)}
.pl-pos{color:var(--green-text)}
 
/* Bar chart */
.chart-bar{display:flex;align-items:flex-end;justify-content:space-between;height:160px;gap:10px;padding:8px 0 0}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:default;position:relative}
.chart-bar-stack{width:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
.chart-bar-fill{width:80%;background:var(--gray-dark);border-radius:3px 3px 0 0;position:relative;transition:opacity .15s}
.chart-bar-fill:hover{opacity:.85}
.chart-bar-fill.pos{background:var(--green-text)}
.chart-bar-fill.neg{background:var(--red-text)}
.chart-bar-fill.muted{background:var(--gray)}
.chart-col-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);font-weight:500}
.chart-col-val{font-size:10px;color:var(--text2);font-family:var(--mono);font-weight:600;position:absolute;top:-2px;left:50%;transform:translate(-50%,-100%)}
 
/* Horizontal bar (rankings) */
.hbar-row{display:grid;grid-template-columns:170px 1fr 100px;gap:10px;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
.hbar-row:last-child{border-bottom:none}
.hbar-lbl{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-bg{height:18px;background:var(--surface2);border-radius:3px;position:relative;overflow:hidden}
.hbar-fill{height:100%;background:var(--gray-dark);border-radius:3px}
.hbar-fill.good{background:var(--green-text)}
.hbar-fill.warn{background:var(--amber)}
.hbar-fill.danger{background:var(--red-text)}
.hbar-val{font-family:var(--mono);font-size:12px;text-align:right;font-weight:600}
 
/* Table reportes */
.r-table{width:100%;border-collapse:collapse;font-size:13px}
.r-table thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.r-table tbody td{padding:10px 14px;border-bottom:1px solid var(--border)}
.r-table tbody tr:hover td{background:var(--surface2)}
.r-table .td-right{text-align:right;font-family:var(--mono)}
.r-table .td-center{text-align:center}
.r-table .td-mono{font-family:var(--mono);font-size:12px;color:var(--text2)}
 
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-purple{background:var(--purple-bg);color:var(--purple-text)}
.b-teal{background:var(--teal-bg);color:var(--teal-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
 
.btn{height:34px;padding:0 14px;border-radius:var(--r);border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn-sm{height:28px;padding:0 11px;font-size:12px}
.btn-dark{background:var(--gray-dark);border-color:var(--gray-dark);color:#fff}
.btn-dark:hover{background:#2c2c2a;color:#fff}
 
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
</style>
</head>

// Calcular utilidades
periodos.forEach(p=>{

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
function fmt(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtK(n){
  const v = Math.abs(Number(n));
  if (v>=1_000_000) return '$'+(n/1_000_000).toFixed(2)+'M';
  if (v>=1000) return '$'+(n/1000).toFixed(0)+'K';
  return '$'+Number(n||0).toLocaleString('es-MX');
}
function fmtPct(n){return Number(n||0).toFixed(n%1===0?0:1)+'%'}
function trendStr(curr, prev){
  if (!prev) return {pct:0, dir:'flat', txt:'—'};
  const pct = ((curr - prev) / Math.abs(prev)) * 100;
  return {pct, dir: pct>1?'up':pct<-1?'down':'flat', txt: (pct>=0?'+':'')+pct.toFixed(1)+'%'};
}
 
let state = {view:'estado_resultados', periodo:'2025-05'};
 
function show(view){
  state.view = view;
  document.querySelectorAll('.side-item').forEach(el=>el.classList.toggle('active', el.dataset.view===view));
  render();
}
 
function setPeriodo(p){
  state.periodo = p;
  render();
}
 
function render(){
  const main = document.getElementById('main');
  const r = renderers[state.view];
  main.innerHTML = r ? r() : '<div style="padding:40px;color:var(--text3)">Vista no implementada.</div>';

      <!-- Composición de costos -->

          <div class="card-title">Composición de costos<span class="card-title-sub">% del cobrado</span></div>

              {label:'Overhead', val:p.costo_overhead, cls:''},

            const max = Math.max(...costRows.map(r=>r.val));

              const pct = (r.val/p.ingresos_cobrados)*100;
              const barPct = (r.val/max)*100;

                <div class="hbar-lbl">${r.label}</div>

          </div>

    </div>
 
    <!-- Tendencia mensual -->
    <div class="card">

        ${chartBars.map(b=>{

            <div class="chart-bar-stack" title="${b.periodo}: ${fmt(b.valor)}">

          }).join('')}

      </table>
    </div>
 
  </div>`;
};

          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2)">
            <span>Crítico (+90d)</span>
            <span class="td-mono" style="color:var(--red-text);font-weight:600">${fmtK(225_000)} (${fmtPct(225_000/totalPorCobrar*100)})</span>
          </div>
        </div>
      </div>
 
      <div class="card">
        <div class="card-title">Cobranza por cliente<span class="card-title-sub">comportamiento</span></div>
        <table class="r-table">
          <thead><tr><th>Anunciante</th><th class="td-right">Por cobrar</th><th class="td-right">Vencido</th><th class="td-center">DSO</th></tr></thead>
          <tbody>
            ${cobranza_por_cliente.map(c=>`<tr>
              <td class="td-main" style="font-weight:500">${c.anunciante}</td>
              <td class="td-right">${fmtK(c.por_cobrar)}</td>
              <td class="td-right" style="color:${c.vencido>0?'var(--red-text)':'var(--text3)'};font-weight:${c.vencido>0?600:400}">${c.vencido>0?fmtK(c.vencido):'—'}</td>
              <td class="td-center" style="color:${c.dias_prom>60?'var(--red-text)':c.dias_prom>45?'var(--amber-text)':'var(--text2)'};font-family:var(--mono);font-size:12px">${c.dias_prom}d</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
 
    <div class="card">
      <div class="card-title">Cobrado vs facturado por mes<span class="card-title-sub">ratio de cobranza</span></div>
      <div class="chart-bar">
        ${periodos.map(p=>{
          const max = Math.max(...periodos.map(x=>x.ingresos_facturados));
          const pctF = (p.ingresos_facturados/max)*100;
          const pctC = (p.ingresos_cobrados/max)*100;
          return `<div class="chart-col">
            <div style="display:flex;align-items:flex-end;width:100%;height:100%;gap:4px;justify-content:center">
              <div style="width:35%;background:var(--gray);height:${pctF}%;border-radius:3px 3px 0 0;position:relative">
                <span style="font-size:9px;position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-family:var(--mono);color:var(--text3);font-weight:600">${fmtK(p.ingresos_facturados)}</span>
              </div>
              <div style="width:35%;background:var(--green-text);height:${pctC}%;border-radius:3px 3px 0 0"></div>
            </div>
            <div class="chart-col-lbl">${p.periodo.substring(5)}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;justify-content:center;gap:18px;font-size:11px;color:var(--text3);margin-top:14px;padding-top:10px;border-top:1px dashed var(--border)">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--gray)"></span>Facturado</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--green-text)"></span>Cobrado</span>
      </div>
    </div>
 
  </div>`;
};
 
/* ════════════════════════════════════════════════
   DASHBOARD OPERATIVO
════════════════════════════════════════════════ */
renderers.dash_operativo = () => {
  const totalSpotsOrd = cumplimiento_por_estacion.reduce((s,e)=>s+e.ordenado,0);
  const totalSpotsEj = cumplimiento_por_estacion.reduce((s,e)=>s+e.ejecutado,0);
  const cumplGral = (totalSpotsEj/totalSpotsOrd)*100;
  const totalInc = incidencias_por_afiliado.reduce((s,i)=>s+i.total,0);
 
  const maxInc = Math.max(...incidencias_por_afiliado.map(i=>i.total));
 
  return `
  <div class="cat-header">
    <div>
      <div class="cat-title">Dashboard operativo</div>
      <div class="cat-sub">Cumplimiento de transmisión, incidencias por afiliado y eficiencia operativa.</div>
    </div>
    <div class="period-selector">
      <select><option>YTD 2025</option><option>Junio 2025</option><option>Mayo 2025</option></select>
      <button class="btn btn-sm">⬇ Exportar</button>
    </div>
  </div>
 
  <div class="dashboard">
 
    <div class="kpi-grid">
      <div class="kpi accent">
        <div class="kpi-lbl">Cumplimiento general</div>
        <div class="kpi-val ${cumplGral>=98?'good':cumplGral>=95?'warn':'bad'}">${fmtPct(cumplGral)}</div>
        <div class="kpi-sub">${totalSpotsEj.toLocaleString()} de ${totalSpotsOrd.toLocaleString()} spots</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Spots transmitidos YTD</div>
        <div class="kpi-val">${totalSpotsEj.toLocaleString()}</div>
        <div class="kpi-sub">en 14 estaciones</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Incidencias YTD</div>
        <div class="kpi-val warn">${totalInc}</div>
        <div class="kpi-sub">${fmtPct(totalInc/(totalSpotsOrd/100)*1)}‰ tasa</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Afiliados activos</div>
        <div class="kpi-val">${incidencias_por_afiliado.length+2}</div>
        <div class="kpi-sub">6 con operación regular</div>
      </div>
    </div>
 
    <div class="grid2">
      <div class="card">
        <div class="card-title">Cumplimiento por estación<span class="card-title-sub">spots transmitidos / ordenados</span></div>
        <table class="r-table">
          <thead><tr><th>Estación</th><th class="td-right">Ordenado</th><th class="td-right">Ejecutado</th><th class="td-center">% Cumpl.</th></tr></thead>
          <tbody>
            ${cumplimiento_por_estacion.map(e=>{
              const cls = e.pct>=99?'var(--green-text)':e.pct>=97?'var(--text)':e.pct>=95?'var(--amber-text)':'var(--red-text)';
              return `<tr>
                <td class="td-main">${e.estacion}</td>
                <td class="td-right">${e.ordenado.toLocaleString()}</td>
                <td class="td-right">${e.ejecutado.toLocaleString()}</td>
                <td class="td-center" style="color:${cls};font-weight:600;font-family:var(--mono)">${fmtPct(e.pct)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
 
      <div class="card">
        <div class="card-title">Incidencias por afiliado<span class="card-title-sub">YTD 2025</span></div>
        ${incidencias_por_afiliado.map(i=>`
          <div class="hbar-row" style="grid-template-columns:170px 1fr 60px">
            <div class="hbar-lbl">${i.afiliado}<div style="font-size:10px;color:var(--text3);font-weight:400">Faltantes ${i.faltantes} · Horario ${i.cambio_horario} · Fecha ${i.cambio_fecha}</div></div>
            <div class="hbar-bg"><div class="hbar-fill ${i.tasa_pct>10?'danger':i.tasa_pct>7?'warn':''}" style="width:${(i.total/maxInc)*100}%"></div></div>
            <div class="hbar-val">${i.total}</div>
          </div>
        `).join('')}
        <div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);font-size:11px;color:var(--text3)">
          Tasa = incidencias / OE totales del afiliado. Por encima de 10% activa revisión.
        </div>
      </div>
    </div>
 
    <div class="card">
      <div class="card-title">Composición de incidencias YTD</div>
      ${(() => {
        const tipos = [
          {label:'Faltante',        count: incidencias_por_afiliado.reduce((s,i)=>s+i.faltantes,0), cls:'danger'},
          {label:'Cambio horario',  count: incidencias_por_afiliado.reduce((s,i)=>s+i.cambio_horario,0), cls:''},
          {label:'Cambio fecha',    count: incidencias_por_afiliado.reduce((s,i)=>s+i.cambio_fecha,0), cls:'warn'},
        ];
        const max = Math.max(...tipos.map(t=>t.count));
        return tipos.map(t=>`
          <div class="hbar-row">
            <div class="hbar-lbl">${t.label}</div>
            <div class="hbar-bg"><div class="hbar-fill ${t.cls}" style="width:${(t.count/max)*100}%"></div></div>
            <div class="hbar-val">${t.count} <span style="color:var(--text3);font-size:11px;font-weight:400">${fmtPct(t.count/totalInc*100)}</span></div>
          </div>
        `).join('');
      })()}
    </div>
 
  </div>`;
};
 
/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
