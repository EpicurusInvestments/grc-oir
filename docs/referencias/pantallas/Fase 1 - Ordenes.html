<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GRC-OIR — Fase 1: Órdenes de transmisión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--surface3:#e6e5de;
  --border:#e0dfd8;--border-med:#c8c7bf;--border-strong:#b0afa8;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-border:#AFA9EC;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;--teal-border:#5DCAA5;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#FAC775;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --r:8px;--rl:12px;
  --font:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Consolas',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.02em}
.logo span{color:var(--purple)}
.fase-tag{font-size:11px;font-family:var(--mono);background:var(--teal-bg);color:var(--teal-text);padding:3px 10px;border-radius:20px;font-weight:500}
.header-spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal-bg);color:var(--teal-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

.app-body{flex:1;display:flex;min-height:0;overflow:hidden}

/* Sidebar */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:14px 0}
.side-section{margin-bottom:18px}
.side-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.side-item{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--teal);background:var(--teal-bg);border-left-color:var(--teal);font-weight:500}
.side-icon{width:14px;height:14px;flex-shrink:0;opacity:.8}
.side-count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:8px}
.side-item.active .side-count{background:#fff;color:var(--teal-text)}
.side-count.urgent{background:var(--red-bg);color:var(--red-text)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.cat-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:16px}
.cat-title{font-size:18px;font-weight:600}
.cat-sub{font-size:12px;color:var(--text3);margin-top:3px;max-width:780px}

.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.search{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 12px;font-size:13px;font-family:var(--font);color:var(--text);width:240px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--teal)}
.search::placeholder{color:var(--text3)}
.sel-f{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 10px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;cursor:pointer}
.sel-f:focus{border-color:var(--teal)}
.fp{height:28px;padding:0 13px;border-radius:20px;border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.fp:hover{color:var(--text);border-color:var(--border-strong)}
.fp.active{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal-text);font-weight:500}
.tb-spacer{flex:1}
.tb-count{font-size:12px;color:var(--text3);font-family:var(--mono)}

.split{display:flex;flex:1;overflow:hidden;min-height:0}
.list-pane{flex:1;overflow:auto;background:var(--surface)}
.detail-pane{width:480px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);letter-spacing:.05em;text-transform:uppercase;position:sticky;top:0;white-space:nowrap;z-index:1}
tbody td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody tr.sel td{background:var(--teal-bg)}
.td-main{font-weight:500;color:var(--text)}
.td-2{color:var(--text2)}
.td-mono{font-family:var(--mono);font-size:12px;color:var(--text2)}
.td-right{text-align:right}
.td-center{text-align:center}

.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-purple{background:var(--purple-bg);color:var(--purple-text)}
.b-teal{background:var(--teal-bg);color:var(--teal-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
.b-dark{background:var(--text);color:#fff}

/* Status-specific badges (estados raíz numerados 1-5) */
.root-st-1{background:#FCEBEB;color:#791F1F}
.root-st-2{background:#E6F1FB;color:#0C447C}
.root-st-3{background:#E1F5EE;color:#085041}
.root-st-4{background:#EEEDFE;color:#3C3489;font-weight:600}
.root-st-5{background:#181816;color:#fff}
.root-st-cancel{background:#F1EFE8;color:#9c9c96}

/* Status-specific badges por enum (incluye sub-estados) */
.st-orden_cliente_sin_vobo{background:#FCEBEB;color:#791F1F}
.st-orden_cliente_con_vobo{background:#FAEEDA;color:#633806}
.st-orden_interna{background:#E6F1FB;color:#0C447C}
.st-orden_cerrada{background:#E1F5EE;color:#085041}
.st-facturada_archivo_plano{background:#EEEDFE;color:#3C3489}
.st-facturada_timbrada{background:#EEEDFE;color:#3C3489;font-weight:600}
.st-cobrada{background:#181816;color:#fff}
.st-cancelada{background:#F1EFE8;color:#9c9c96}
/* Sub-estados de OI */
.st-asignada_afiliado{background:#E6F1FB;color:#0C447C}
.st-programados_conciliados{background:#FAEEDA;color:#633806}
.st-reales_conciliados{background:#E1F5EE;color:#085041}

.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;padding:32px;text-align:center}
.d-icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-med);display:flex;align-items:center;justify-content:center;color:var(--text3)}
.dh{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.dh-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.dh-name{font-size:16px;font-weight:600;color:var(--text)}
.dh-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.db{flex:1;overflow-y:auto;padding:14px 18px}

.sec{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px}
.sec:first-child{margin-top:0}
.sec-action{font-size:11px;color:var(--teal);cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0}
.sec-action:hover{text-decoration:underline}

.fl{font-size:11px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.fl-required::after{content:'*';color:var(--red-text);margin-left:2px}
.fl-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.fl-tag.cat{background:var(--purple-bg);color:var(--purple-text)}
.fl-tag.her{background:var(--amber-bg);color:var(--amber-text)}
.fl-tag.calc{background:var(--blue-bg);color:var(--blue-text)}
.fl-tag.der{background:#F1EFE8;color:#5F5E5A}
.fv{font-size:13px;color:var(--text);margin-bottom:11px;min-height:18px}
.fv.mono{font-family:var(--mono);font-size:12px}
.fv.muted{color:var(--text2)}
.fv.link{color:#185FA5;cursor:pointer}
.fv.link:hover{text-decoration:underline}
.fv.big{font-size:18px;font-weight:600}
.fi{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;transition:border-color .15s}
.fi:focus{border-color:var(--teal);background:var(--surface)}
.fi:read-only{background:var(--surface3);color:var(--text2);cursor:not-allowed}
.fsel{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 9px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;cursor:pointer}
.fsel:focus{border-color:var(--teal);background:var(--surface)}
.ftxt{width:100%;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:8px 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;resize:vertical;min-height:60px}
.ftxt:focus{border-color:var(--teal);background:var(--surface)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

.df{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--surface)}

.btn{height:34px;padding:0 14px;border-radius:var(--r);border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-sm{height:28px;padding:0 11px;font-size:12px}
.btn-xs{height:24px;padding:0 10px;font-size:11px}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-teal:hover{background:#0d5e49;color:#fff}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-purple:hover{background:#4840a0;color:#fff}
.btn-amber{background:#BA7517;border-color:#BA7517;color:#fff}
.btn-amber:hover{background:#a06412;color:#fff}
.btn-dark{background:var(--text);border-color:var(--text);color:#fff}
.btn-dark:hover{background:#2c2c2a;color:#fff}

/* Timeline */
.timeline{display:flex;align-items:center;margin:8px 0 14px;padding:8px 0}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;font-size:10px}
.tl-step:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:1.5px;background:var(--border-med);z-index:0}
.tl-step.done:not(:last-child)::after{background:var(--teal)}
.tl-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-med);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;z-index:1;color:var(--text3)}
.tl-step.done .tl-dot{background:var(--teal);border-color:var(--teal);color:#fff}
.tl-step.current .tl-dot{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 0 0 3px var(--purple-bg)}
.tl-lbl{margin-top:5px;color:var(--text3);text-align:center;font-size:9px;line-height:1.2;max-width:60px}
.tl-step.done .tl-lbl{color:var(--teal-text)}
.tl-step.current .tl-lbl{color:var(--purple-text);font-weight:600}

/* OrdenInterna row inside OrdenCliente detail */
.oe-row{border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;font-size:13px;cursor:pointer;transition:all .12s}
.oe-row:hover{border-color:var(--border-med);background:var(--surface2)}
.oe-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px}
.oe-folio{font-family:var(--mono);font-size:11px;color:var(--text2);font-weight:500}
.oe-station{font-weight:600;color:var(--text)}
.oe-meta{display:flex;gap:11px;font-size:11px;color:var(--text2);flex-wrap:wrap;align-items:center}
.oe-meta span{display:inline-flex;align-items:center;gap:4px}
.oe-meta strong{font-weight:600;color:var(--text);font-family:var(--mono)}

/* Spots indicator */
.spots-bar{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:var(--mono)}
.spots-num{color:var(--text)}
.spots-faltantes{color:var(--red-text);font-weight:600}
.spots-completos{color:var(--green-text);font-weight:600}

/* Metric cards */
.mc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px}
.mc{background:var(--surface2);border-radius:var(--r);padding:10px 12px}
.mc-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.03em;text-transform:uppercase;font-weight:600}
.mc-val{font-size:17px;font-weight:600;font-family:var(--mono);color:var(--text)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* Heredado section */
.heredado-block{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);padding:11px 13px;margin-bottom:14px;font-size:12px}
.heredado-title{font-size:10px;font-weight:600;color:var(--amber-text);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.heredado-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px}
.heredado-row{display:flex;flex-direction:column}
.heredado-lbl{font-size:10px;color:var(--amber-text);opacity:.8}
.heredado-val{font-size:12px;color:var(--text)}

/* Diff indicator (for verification) */
.diff-box{background:var(--red-bg);border:1px solid #F5C2C2;border-radius:var(--r);padding:10px 12px;margin-bottom:11px}
.diff-box.ok{background:var(--green-bg);border-color:#A8D585}
.diff-row{display:flex;align-items:center;gap:10px;font-size:12px}
.diff-val{font-family:var(--mono);font-size:15px;font-weight:600}

/* ── New Order form (Phase 1 entry point) ── */
.form-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:14px}
.form-block-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-block-title .fb-icon{width:22px;height:22px;border-radius:6px;background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.form-block-sub{font-size:11px;color:var(--text3);margin-top:-10px;margin-bottom:14px;line-height:1.4}

/* ── Info panels (right column on new-order form) ── */
.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 14px;font-size:12px}
.info-panel-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-panel.cat{background:linear-gradient(180deg,var(--purple-bg) 0%,var(--surface) 60%);border-color:var(--purple-border)}
.info-panel.cat .info-panel-title{color:var(--purple-text)}
.info-panel.flow{background:var(--surface);border-color:var(--border)}
.info-panel.flow .info-panel-title{color:var(--text)}

.cat-list{display:flex;flex-direction:column;gap:6px}
.cat-list-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--border)}
.cat-list-item:last-child{border-bottom:0}
.cat-list-item .cli-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0}
.cat-list-item.opt .cli-dot{background:var(--border-strong)}
.cat-list-item .cli-name{flex:1;color:var(--text)}
.cat-list-item.opt .cli-name{color:var(--text2)}
.cat-list-item .cli-tag{font-size:9px;color:var(--text3);font-family:var(--mono)}

.flow-step{position:relative;padding-left:24px;padding-bottom:14px;font-size:11px}
.flow-step:not(:last-child)::before{content:'';position:absolute;left:8px;top:14px;bottom:0;width:1.5px;background:var(--border)}
.flow-step .fs-dot{position:absolute;left:3px;top:2px;width:13px;height:13px;border-radius:50%;border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:600}
.flow-step.ph1 .fs-dot{background:var(--teal)}
.flow-step.ph2 .fs-dot{background:#2C6FBE}
.flow-step.ph3 .fs-dot{background:#BA7517}
.flow-step .fs-when{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.flow-step.ph1 .fs-when{color:var(--teal-text)}
.flow-step.ph2 .fs-when{color:var(--blue-text)}
.flow-step.ph3 .fs-when{color:var(--amber-text)}
.flow-step ul{list-style:none;padding:0;margin:0}
.flow-step ul li{position:relative;padding:2px 0 2px 10px;color:var(--text2);font-size:11px;line-height:1.4}
.flow-step ul li::before{content:'→';position:absolute;left:0;color:var(--text3);font-size:10px}
.flow-step ul li strong{color:var(--text);font-weight:500}

.derivado-hint{display:inline-block;font-size:10px;color:var(--text3);margin-left:6px;font-style:italic}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">GRC<span>·</span>OIR</div>
  <div class="fase-tag">FASE 1 · ÓRDENES</div>
  <div class="header-spacer"></div>
  <div class="user-chip">
    <div class="user-avatar">VG</div>
    <span>Ventas · victor.garcia</span>
  </div>
</header>

<div class="app-body">

  <aside class="sidebar">
    <div class="side-section">
      <div class="side-title">Flujo principal</div>
      <div class="side-item active" data-view="orden_cliente" onclick="show('orden_cliente')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 6h6M5 9h6M5 12h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Órdenes del cliente <span class="side-count" id="cnt-oc">0</span>
      </div>
      <div class="side-item" data-view="orden_estacion" onclick="show('orden_estacion')">
        <svg class="side-icon" viewBox="0 0 16 16" fill="none"><path d="M2 12V4l4 4 4-4 4 4v4" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M2 14h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Órdenes internas <span class="side-count" id="cnt-oe">0</span>

/* ─────────────────────────────────────────────────────────────
   Helpers de periodo_transmision (estructura desagregada de OI)
   Cada OI tiene un array de filas {fecha, hora_inicio, hora_termino, spots_diarios}.
   El día de la semana (LUNES, MARTES...) se deriva de la fecha.
   Los campos planos legados (fecha_transmision, hora_inicio, spots_solicitados/asignados)
   se derivan de aquí; estos helpers son la fuente de verdad.
   ───────────────────────────────────────────────────────────── */
const DIA_SEMANA = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
function diaDeFecha(fechaIso){
  if (!fechaIso) return '';
  // Construir con UTC para evitar shift por zona horaria
  const [y,m,d] = fechaIso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  return DIA_SEMANA[dt.getUTCDay()];
}
function oiTotalSpots(oe){
  if (!Array.isArray(oe?.periodo_transmision)) return oe?.spots_solicitados || 0;
  return oe.periodo_transmision.reduce((s,p)=>s+(p.spots_diarios||0), 0);
}
function oiPrimeraFecha(oe){
  if (!Array.isArray(oe?.periodo_transmision) || !oe.periodo_transmision.length) return oe?.fecha_transmision || '';
  return oe.periodo_transmision.map(p=>p.fecha).sort()[0];
}
function oiUltimaFecha(oe){
  if (!Array.isArray(oe?.periodo_transmision) || !oe.periodo_transmision.length) return oe?.fecha_transmision || '';
  return oe.periodo_transmision.map(p=>p.fecha).sort().reverse()[0];
}
function oiVentanaTipica(oe){
  if (!Array.isArray(oe?.periodo_transmision) || !oe.periodo_transmision.length) {
    return { inicio: oe?.hora_inicio||'', termino: oe?.hora_fin||'' };
  }
  const p0 = oe.periodo_transmision[0];
  return { inicio: p0.hora_inicio||'', termino: p0.hora_termino||'' };
}
function oiImporte(oe){
  return oiTotalSpots(oe) * (oe?.precio_spot || 0);
}
function oiPeriodoTexto(oe){
  if (!Array.isArray(oe?.periodo_transmision) || !oe.periodo_transmision.length) {
    return oe?.fecha_transmision || '—';
  }
  const f0 = oiPrimeraFecha(oe);
  const fN = oiUltimaFecha(oe);
  const n = oe.periodo_transmision.length;
  if (f0 === fN) return `${f0} (1 día)`;
  return `${f0} → ${fN} (${n} días)`;
}

function timelineOC(current){
  // Stepper de 5 estados raíz (1..5). El sub-estado actual se muestra debajo del paso vigente.
  const root = rootState(current) || 0;
  const sub = STATUS_LABELS[current] || '';
  // Si el estado raíz es 1 o 4 (tienen sub-estados), tomamos el detalle del label
  const subLabel = (root===1 || root===4) ? sub : '';
  return `<div class="timeline">${[1,2,3,4,5].map(r => {
    const cls = r<root?'done':r===root?'current':'';
    return `<div class="tl-step ${cls}"><div class="tl-dot">${r<root?'✓':r}</div><div class="tl-lbl">${ROOT_LABEL[r]}${r===root && subLabel?`<div style="font-size:9px;color:var(--text3);font-weight:500;margin-top:1px">${subLabel}</div>`:''}</div></div>`;
  }).join('')}</div>`;
}

  return `
  <div class="cat-header">
    <div>
      <div class="cat-title">Órdenes del cliente</div>

    <input class="search" placeholder="Buscar folio, anunciante, ref…" value="${state.search}" oninput="state.search=this.value;render()">

    <button class="fp ${state.filter==='activas'?'active':''}" onclick="state.filter='activas';render()">Activas</button>
    <button class="fp ${state.filter==='listas_cerrar'?'active':''}" onclick="state.filter='listas_cerrar';render()">Listas para cerrar</button>
    <button class="fp ${state.filter==='listas_facturar'?'active':''}" onclick="state.filter='listas_facturar';render()">Listas para facturar</button>
    <div class="tb-spacer"></div>
    <span class="tb-count">${items.length} de ${data.orden_cliente.length}</span>
  </div>
  <div class="split">
    <div class="list-pane">
      <table>
        <thead><tr>
          <th style="width:11%">Folio</th>
          <th style="width:18%">Anunciante</th>
          <th style="width:14%">Agencia / Vendedor</th>
          <th style="width:16%">Producto / Marca</th>
          <th style="width:11%">Campaña</th>
          <th style="width:10%" class="td-right">Total</th>
          <th style="width:7%" class="td-center">OI</th>
          <th style="width:13%" class="td-center">Estado</th>
        </tr></thead>
        <tbody>
          ${items.map(o=>{
            const an = findRef('anunciante', o.anunciante_id);
            const ag = o.agencia_id ? findRef('agencia', o.agencia_id) : null;
            const ve = findRef('vendedor', o.vendedor_principal_id);
            const mar = o.marca_id ? findRef('marca', o.marca_id) : null;
            const oeCount = data.orden_interna.filter(x=>x.orden_id===o.id).length;
            const subtotal = (o.total_spots||0) * (o.precio_unitario||0);
            const total = subtotal * 1.16;
            const root = rootState(o.estatus_orden);
            return `<tr class="${state.selected===o.id?'sel':''}" onclick="state.selected='${o.id}';render()">
              <td><div class="td-mono">${o.folio_orden}</div><div style="font-size:10px;color:var(--text3);margin-top:1px">${o.numero_orden_cliente}</div></td>
              <td class="td-main">${an?an.nombre_comercial:'—'}</td>
              <td class="td-2"><div style="font-size:12px">${ag?ag.nombre_agencia:'<span style="color:var(--text3)">Sin agencia</span>'}</div><div style="font-size:10px;color:var(--text3);margin-top:1px">${ve?ve.nombre_vendedor:'—'}</div></td>
              <td class="td-2"><div style="font-size:12px">${mar?mar.nombre_marca:'—'}</div><div style="font-size:10px;color:var(--text3);margin-top:1px">${o.producto||''}</div></td>
              <td class="td-mono" style="font-size:11px">${o.fecha_inicio_campania.substring(5)} → ${o.fecha_fin_campania.substring(5)}</td>
              <td class="td-right td-mono" style="font-weight:500">${fmt(total)}</td>
              <td class="td-center td-2">${oeCount}</td>
              <td class="td-center"><span class="badge root-st-${root||'cancel'}" title="${STATUS_LABELS[o.estatus_orden]}">${root?`${root} · ${ROOT_LABEL[root]}`:'Cancelada'}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane" id="detail-pane">${sel ? renderOCDetail(sel) : emptyDetail('Selecciona una orden para ver sus datos y órdenes internas')}</div>
  </div>`;
};

function renderOCDetail(o){
  const an = findRef('anunciante', o.anunciante_id);
  const ag = o.agencia_id ? findRef('agencia', o.agencia_id) : null;
  const ve = findRef('vendedor', o.vendedor_principal_id);
  const ve2 = o.vendedor_secundario_id ? findRef('vendedor', o.vendedor_secundario_id) : null;
  const ef = findRef('empresa_facturadora', o.empresa_facturadora_id);
  const mar = o.marca_id ? findRef('marca', o.marca_id) : null;
  const c = o.contrato_id ? findRef('contrato', o.contrato_id) : null;
  const categ = o.categoria_id ? findRef('categoria', o.categoria_id) : null;
  const oes = data.orden_interna.filter(x=>x.orden_id===o.id);
  const subtotal = (o.total_spots||0) * (o.precio_unitario||0);
  const iva = subtotal * 0.16;
  const total = subtotal + iva;

  const allClosed = oes.length>0 && oes.every(x=>x.estatus==='reales_conciliados');
  const canClose = o.estatus_orden==='orden_interna' && allClosed;
  // ¿Esta OC ya tiene Vo.Bo. (PO §2)? Si está en 1.1 aún no pueden generarse OI.
  const ocConVobo = o.estatus_orden !== 'orden_cliente_sin_vobo';
  const blockReasonOE = ocConVobo ? '' : 'Esta ODC todavía no tiene Vo.Bo. de revisión (PO §2). No se pueden generar órdenes internas hasta que comercial complete el checklist.';

  return `
    <div class="dh">
      <div class="dh-row">
        <div>
          <div class="dh-name">${o.folio_orden}</div>
          <div class="dh-sub">
            <span class="badge st-${o.estatus_orden}">${STATUS_LABELS[o.estatus_orden]}</span>
            ${an?`<span class="badge b-blue">${an.nombre_comercial}</span>`:''}
            ${ag?`<span class="badge b-purple">${ag.nombre_agencia}</span>`:'<span class="badge b-amber">Sin agencia</span>'}
          </div>
        </div>
        <button class="btn btn-sm" onclick="editOC('${o.id}')">Editar</button>
      </div>
    </div>
    <div class="db">
      ${timelineOC(o.estatus_orden)}

      <div class="mc-row">
        <div class="mc"><div class="mc-lbl">Spots</div><div class="mc-val">${o.total_spots}</div></div>
        <div class="mc"><div class="mc-lbl">Precio unit.</div><div class="mc-val">${fmt(o.precio_unitario)}</div></div>
        <div class="mc"><div class="mc-lbl">Total c/IVA</div><div class="mc-val" style="color:var(--purple-text)">${fmt(total)}</div></div>
      </div>

      ${(() => {
        const totalAsignado = oes.reduce((s,oe)=>s + oiTotalSpots(oe), 0);
        const porAsignar = (o.total_spots||0) - totalAsignado;
        const pctAsignado = o.total_spots>0 ? Math.min(100, (totalAsignado/o.total_spots)*100) : 0;
        const sobreAsignado = totalAsignado > o.total_spots;
        return `
        <div style="background:${sobreAsignado?'var(--red-bg)':pctAsignado===100?'var(--green-bg)':'var(--surface2)'};border-radius:var(--rl);padding:11px 13px;margin-bottom:14px;border:1px solid ${sobreAsignado?'#F5C2C2':pctAsignado===100?'#A8D585':'var(--border)'}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">📊 Distribución de spots por estación</span>
            <span style="font-size:10px;color:var(--text3)">${oes.length} ${oes.length===1?'estación':'estaciones'}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
            <div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600">Total orden</div>
              <div style="font-family:var(--mono);font-size:18px;font-weight:600">${o.total_spots}</div>
            </div>
            <div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600">Asignados</div>
              <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:${sobreAsignado?'var(--red-text)':pctAsignado===100?'var(--green-text)':'var(--teal-text)'}">${totalAsignado}${sobreAsignado?' ⚠':''}</div>
            </div>
            <div>
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600">Por asignar</div>
              <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:${porAsignar<0?'var(--red-text)':porAsignar===0?'var(--green-text)':'var(--amber-text)'}">${porAsignar}</div>
            </div>
          </div>
          <div style="height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;position:relative">
            <div style="height:100%;background:${sobreAsignado?'var(--red-text)':pctAsignado===100?'var(--green-text)':'var(--teal)'};width:${pctAsignado}%;transition:width .3s"></div>
          </div>
          <div style="font-size:10px;color:${sobreAsignado?'var(--red-text)':pctAsignado===100?'var(--green-text)':'var(--text3)'};margin-top:5px;text-align:center;font-weight:${pctAsignado===100||sobreAsignado?'600':'400'}">
            ${porAsignar>0?`faltan ${porAsignar} spots por asignar`:porAsignar===0?'✓ 100% asignado':`⚠ excedente de ${Math.abs(porAsignar)} spots`}
          </div>
        </div>`;
      })()}

      <div class="sec">Datos comerciales</div>
      <div class="r2">
        <div><div class="fl">No. orden cliente</div><div class="fv mono">${o.numero_orden_cliente}</div></div>
        <div><div class="fl">Fecha venta</div><div class="fv mono">${o.fecha_venta}</div></div>
      </div>
      <div class="fl">Vendedor principal ${ve2?'/ secundario':''}</div>
      <div class="fv">${ve?ve.nombre_vendedor:'—'}${ve2?` <span style="color:var(--text3)">/ ${ve2.nombre_vendedor}</span>`:''}</div>
      <div class="fl">Empresa facturadora</div>
      <div class="fv">${ef?ef.nombre_empresa:'—'}</div>
      <div class="r2">
        <div><div class="fl">Contrato</div><div class="fv">${c?c.nombre_contrato:'<span style="color:var(--text3)">Sin contrato</span>'}</div></div>
        <div><div class="fl">Categoría</div><div class="fv">${categ?categ.nombre_categoria:'—'}</div></div>
      </div>

      ${(() => {
        const ag2 = o.agencia_id ? findRef('agencia', o.agencia_id) : null;
        const isFr = ['orden_cerrada','facturada','cobrada'].includes(o.estatus_orden);
        const rows = [];
        if (o.vendedor_principal_id){
          const cur = o.porcentaje_comision_vendedor_principal_snap;
          const def = findRef('vendedor', o.vendedor_principal_id).porcentaje_comision_default;
          rows.push({lbl:'Vendedor principal', cur, def, monto: cur!=null ? total*cur/100 : null});
        }
        if (o.vendedor_secundario_id){
          const cur = o.porcentaje_comision_vendedor_secundario_snap;
          const def = findRef('vendedor', o.vendedor_secundario_id).porcentaje_comision_default;
          rows.push({lbl:'Vendedor secundario', cur, def, monto: cur!=null ? total*cur/100 : null});
        }
        if (o.agencia_id){
          const cur = o.porcentaje_comision_agencia_snap;
          const def = ag2.porcentaje_comision_agencia_default;
          rows.push({lbl:'Agencia', cur, def, monto: cur!=null ? total*cur/100 : null});
        }
        if (rows.length===0) return '';
        const bgColor = isFr ? 'var(--amber-bg)' : 'var(--surface2)';
        const brColor = isFr ? 'var(--amber-border)' : 'var(--border)';
        return `
        <div class="sec">% Comisiones (snapshot)
          ${isFr ? '<span style="font-size:10px;color:var(--amber-text);font-weight:500">🔒 Congelado</span>' : '<span style="font-size:10px;color:var(--text3);font-weight:400">Editable hasta el cierre</span>'}
        </div>
        <div style="background:${bgColor};border:1px solid ${brColor};border-radius:var(--r);padding:9px 11px;margin-bottom:11px">
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead><tr style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em">
              <th style="text-align:left;padding:2px 0;font-weight:600">Beneficiario</th>
              <th style="text-align:right;padding:2px 0;font-weight:600">% Snap</th>
              <th style="text-align:right;padding:2px 0;font-weight:600">Default cat.</th>
              <th style="text-align:right;padding:2px 0;font-weight:600">Monto</th>
            </tr></thead>
            <tbody>
              ${rows.map(r=>{
                const over = r.cur!=null && Math.abs(r.cur - r.def) > 0.01;
                return `<tr>
                  <td style="padding:3px 0;color:var(--text)">${r.lbl}</td>
                  <td style="padding:3px 0;text-align:right;font-family:var(--mono);font-weight:600;color:${over?'var(--amber-text)':'var(--text)'}">${r.cur!=null?r.cur+'%':'<span style="color:var(--text3)">—</span>'}${over?' *':''}</td>
                  <td style="padding:3px 0;text-align:right;font-family:var(--mono);color:var(--text3)">${r.def}%</td>
                  <td style="padding:3px 0;text-align:right;font-family:var(--mono);color:var(--purple-text)">${r.monto!=null?fmt(r.monto):'—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
          ${rows.some(r=>r.cur!=null && Math.abs(r.cur - r.def) > 0.01) ? '<div style="font-size:10px;color:var(--amber-text);margin-top:5px;font-style:italic">* override del default del catálogo (pactado distinto en esta venta)</div>':''}
        </div>`;
      })()}

      <div class="sec">Producto</div>
      <div class="r2">
        <div><div class="fl">Marca</div><div class="fv">${mar?mar.nombre_marca:'<span style="color:var(--text3)">—</span>'}</div></div>
        <div><div class="fl">Producto específico</div><div class="fv">${o.producto||'—'}</div></div>
      </div>
      <div class="r2">
        <div><div class="fl">Duración spot</div><div class="fv mono">${o.duracion_spot}</div></div>
        <div><div class="fl">Total spots</div><div class="fv mono">${o.total_spots}</div></div>
      </div>

      <div class="sec">Campaña</div>
      <div class="r2">
        <div><div class="fl">Inicio</div><div class="fv mono">${o.fecha_inicio_campania}</div></div>
        <div><div class="fl">Fin</div><div class="fv mono">${o.fecha_fin_campania}</div></div>
      </div>
      <div class="fl">Dirección facturación <span class="fl-tag her">Heredado de anunciante</span></div>
      <div class="fv">${o.direccion_facturacion||'—'}</div>

      <div class="sec">Montos</div>
      <div class="r2">
        <div><div class="fl">Subtotal <span class="fl-tag calc">Calc</span></div><div class="fv mono">${fmtFull(subtotal)}</div></div>
        <div><div class="fl">IVA <span class="fl-tag calc">Calc</span></div><div class="fv mono">${fmtFull(iva)}</div></div>
      </div>
      <div class="fl">Total <span class="fl-tag calc">Calc</span></div>
      <div class="fv mono big" style="color:var(--purple-text)">${fmtFull(total)}</div>

      <div class="sec">Condiciones especiales</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:11px">
        ${o.facturacion_directa_cliente?'<span class="badge b-amber">Facturación directa al cliente</span>':'<span class="badge b-gray">Vía agencia</span>'}
        ${o.afiliado_factura_directo_al_cliente?'<span class="badge b-red">Afiliado factura al cliente</span>':''}
      </div>
      ${o.observaciones_predefinidas?`<div class="fl">Obs. predefinidas</div><div class="fv muted">${o.observaciones_predefinidas}</div>`:''}
      ${o.observaciones_libres?`<div class="fl">Obs. libres</div><div class="fv muted">${o.observaciones_libres}</div>`:''}

      <div class="sec">Órdenes internas (${oes.length})
        ${ocConVobo
          ? `<span class="sec-action" onclick="newOEFromOC('${o.id}')">+ Asignar más estaciones</span>`
          : `<span class="sec-action" style="opacity:.4;cursor:not-allowed" title="${blockReasonOE}">+ Asignar más estaciones (bloqueado)</span>`
        }
      </div>
      ${!ocConVobo ? `<div style="background:#FFF7E6;border:1px solid #F5D896;border-radius:6px;padding:10px 12px;margin:6px 0 10px;font-size:11.5px;color:#7A4500;line-height:1.5"><strong>⚠ Pendiente de Vo.Bo.</strong><br>${blockReasonOE} <a href="javascript:editOC('${o.id}')" style="color:#7A4500;text-decoration:underline">Abrir checklist →</a></div>` : ''}
      ${oes.length===0 ? '<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin órdenes internas todavía. Crea una o varias asignaciones para distribuir los spots entre estaciones.</div>' :
        oes.map(oe=>{
          const est = findRef('estacion', oe.estacion_id);
          const af = est ? findRef('afiliado', est.afiliado_id) : null;
          const pl = findRef('plaza', oe.plaza_id);
          const fal = (oe.spots_solicitados - oe.spots_asignados) || 0;
          const importe = oiImporte(oe);
          const totalSpots = oiTotalSpots(oe);
          const ventana = oiVentanaTipica(oe);
          const inc = (data.incidencia||[]).filter(i=>i.orden_interna_id===oe.id);
          // Badge de incidencias si la OI está en 2.3 y tiene incidencias
          let incBadge = '';
          if (oe.estatus==='reales_conciliados' && inc.length>0){
            incBadge = `<span class="badge b-amber" style="font-size:9px" title="${inc.length} incidencia${inc.length===1?'':'s'}">⚠ ${inc.length} inc.</span>`;
          }
          return `<div class="oe-row" onclick="show('orden_estacion');state.selected='${oe.id}';setTimeout(render,10)">
            <div class="oe-head">
              <div>
                <span class="oe-folio">${oe.folio_orden_interna}</span>
                <span class="oe-station" style="margin-left:6px">${est?est.nombre_estacion:'?'}</span>
                <span style="color:var(--text3);font-size:11px;margin-left:5px">${pl?pl.nombre_plaza:''}</span>
              </div>
              <div style="display:flex;gap:4px;align-items:center">
                ${incBadge}
                <span class="badge st-${oe.estatus}">${STATUS_LABELS[oe.estatus]}</span>
              </div>
            </div>
            <div class="oe-meta">
              <span><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="2" width="9" height="8" rx="1" stroke="currentColor" stroke-width="1.1"/><path d="M1 4h9M3 1v2M8 1v2" stroke="currentColor" stroke-width="1.1"/></svg> ${oiPeriodoTexto(oe)}</span>
              <span>${ventana.inicio}–${ventana.termino}</span>
              <span class="spots-bar"><strong>${totalSpots}</strong> spots</span>
              <span style="margin-left:auto">${fmt(importe)}</span>
            </div>
          </div>`;
        }).join('')
      }
    </div>
    <div class="df">
      ${canClose ? '<button class="btn btn-amber btn-sm" onclick="cerrarOC(\''+o.id+'\')">Cerrar orden →</button>' : ''}
      ${o.estatus_orden==='orden_cerrada' ? `<button class="btn btn-purple btn-sm" onclick="generarArchivoPlano('${o.id}')">Generar archivo plano (4.1) →</button>` : ''}
      ${o.estatus_orden==='facturada_archivo_plano' ? `<button class="btn btn-sm" onclick="generarArchivoPlano('${o.id}')" title="Regenerar archivo plano con los datos guardados">↻ Regenerar archivo plano</button>` : ''}
      ${o.estatus_orden==='facturada_archivo_plano' ? `<button class="btn btn-purple btn-sm" onclick="cargarTimbrado('${o.id}')">Cargar CFDI timbrado (4.2) →</button>` : ''}
      ${o.estatus_orden==='facturada_timbrada' ? `<button class="btn btn-sm" onclick="cargarTimbrado('${o.id}')" title="Editar UUID o reemplazar archivos del CFDI">↻ Editar timbrado</button>` : ''}
      ${!ocConVobo
        ? `<button class="btn btn-teal btn-sm" onclick="editOC('${o.id}')">→ Dar Vo.Bo. (abrir checklist)</button>`
        : ''
      }
      ${ocConVobo
        ? `<button class="btn btn-teal btn-sm" onclick="newOEFromOC('${o.id}')">+ Asignar estaciones</button>`
        : `<button class="btn btn-sm" disabled title="${blockReasonOE}" style="opacity:.5;cursor:not-allowed">+ Asignar estaciones</button>`
      }
    </div>`;
}

/* ════════════════════════════════════════════════
   FORMULARIO: NUEVA / EDITAR ORDEN DEL CLIENTE
   Pantalla completa. Punto de entrada del flujo operativo.
   Diseñado para que los desarrolladores vean en una sola vista:
    · los catálogos que se amarran desde esta etapa
    · los procesos/registros que esta orden detona en otras fases
════════════════════════════════════════════════ */

// Catálogos auxiliares (no estaban en `cat` — pequeños ENUMs/dicts del modelo)
const DURACIONES_SPOT = ['10s','15s','20s','30s','40s','45s','60s','90s'];
const OBS_PREDEFINIDAS = [
  'Sujeto a disponibilidad de horarios prime',
  'No combinable con otros descuentos',
  'Tarifa especial por campaña anual',
  'Sin restricción de horario',
  'Solo lunes a viernes',
];

function newOrdenCliente(){
  state.view = 'orden_cliente';
  state.selected = null;
  document.querySelectorAll('.side-item').forEach(el=>el.classList.toggle('active', el.dataset.view==='orden_cliente'));
  document.getElementById('main').innerHTML = renderOCForm(null);
  updateCounts();
  setTimeout(()=>{ initOCFormBadges(); updateOCDerivados(); }, 0);
}

function editOC(id){
  state.view = 'orden_cliente';
  state.selected = id;
  document.querySelectorAll('.side-item').forEach(el=>el.classList.toggle('active', el.dataset.view==='orden_cliente'));
  document.getElementById('main').innerHTML = renderOCForm(id);
  updateCounts();
  setTimeout(()=>{ initOCFormBadges(); updateOCDerivados(); }, 0);
}

/* Inicializa los badges de override de los snapshots según los valores cargados */
function initOCFormBadges(){
  ['vp','vs','ag'].forEach(which=>{
    if (document.getElementById('oc-'+which+'-pct')) markSnapOverride(which);
  });
  updateChecklistState();
}

/* ─────────────────────────────────────────────────────────────
   Checklist de revisión PO §2 — re-evalúa cada vez que el
   usuario marca/desmarca un ítem. Habilita o deshabilita el
   botón "Dar Vo.Bo. y capturar →".
   ───────────────────────────────────────────────────────────── */
function updateChecklistState(){
  const listEl = document.getElementById('oc-chk-list');
  if (!listEl) return;
  const checks = listEl.querySelectorAll('input[type=checkbox][data-chk]');
  const total = checks.length;
  let done = 0;
  checks.forEach(c=>{ if (c.checked) done++; });
  const progEl = document.getElementById('oc-chk-progress');
  if (progEl) progEl.textContent = `${done}/${total}`;
  const statusEl = document.getElementById('oc-chk-status');
  const btn = document.getElementById('oc-save-vobo');
  if (done === total){
    if (statusEl){
      statusEl.style.background = '#E8F5F4';
      statusEl.style.borderColor = 'var(--teal)';
      statusEl.style.color = 'var(--teal-text)';
      statusEl.style.fontWeight = '600';
      statusEl.textContent = '✓ ODC lista para Vo.Bo.';
    }
    if (btn){
      btn.disabled = false;
      btn.removeAttribute('title');
    }
  } else {
    if (statusEl){
      statusEl.style.background = '#fff';
      statusEl.style.borderColor = 'var(--border)';
      statusEl.style.color = 'var(--text2)';
      statusEl.style.fontWeight = '500';
      statusEl.textContent = `Faltan ${total-done} ítem${total-done===1?'':'s'} por palomear`;
    }
    if (btn){
      btn.disabled = true;
      btn.setAttribute('title', 'Completa el checklist de revisión PO §2 para dar Vo.Bo.');
    }
  }
}

/* Recolecta el checklist desde el DOM, devuelve objeto {key:bool} */
function collectChecklist(){
  const out = {};
  document.querySelectorAll('#oc-chk-list input[type=checkbox][data-chk]').forEach(c=>{
    out[c.dataset.chk] = c.checked;
  });
  return out;
}

/* Cuando el usuario elige vendedor: si el snapshot está vacío, lo prefila con el default del catálogo */
function onVendedorChange(which){
  const selId = document.getElementById('oc-'+which).value;
  const pctEl = document.getElementById('oc-'+which+'-pct');
  if (!selId){
    pctEl.value = '';
    document.getElementById('oc-'+which+'-badge').textContent = '';
  } else {
    const vR = findRef('vendedor', selId);
    // Solo prefila si está vacío; respeta override existente
    if (pctEl.value === '' || pctEl.value === null){
      pctEl.value = vR.porcentaje_comision_default;
      document.getElementById('oc-'+which+'-badge').textContent = 'del catálogo';
      document.getElementById('oc-'+which+'-badge').style.color = 'var(--text3)';
    }
  }
  updateOCDerivados();
}

/* Cuando el usuario elige agencia: idéntica lógica al snapshot */
function onAgenciaChange(){
  const selId = document.getElementById('oc-ag').value;
  const pctEl = document.getElementById('oc-ag-pct');
  if (!selId){
    pctEl.value = '';
    document.getElementById('oc-ag-badge').textContent = '';
  } else {
    const aR = findRef('agencia', selId);
    if (pctEl.value === '' || pctEl.value === null){
      pctEl.value = aR.porcentaje_comision_agencia_default;
      document.getElementById('oc-ag-badge').textContent = 'del catálogo';
      document.getElementById('oc-ag-badge').style.color = 'var(--text3)';
    }
  }
  updateOCDerivados();
}

/* Cuando el usuario sobreescribe a mano un %, marcar el badge como "override" */
function markSnapOverride(which){
  const pctEl = document.getElementById('oc-'+which+'-pct');
  const badge = document.getElementById('oc-'+which+'-badge');
  let catDefault = null;
  if (which==='ag'){
    const ag = document.getElementById('oc-ag').value;
    if (ag) catDefault = findRef('agencia', ag).porcentaje_comision_agencia_default;
  } else {
    const v = document.getElementById('oc-'+which).value;
    if (v) catDefault = findRef('vendedor', v).porcentaje_comision_default;
  }
  const val = parseFloat(pctEl.value);
  if (catDefault===null || isNaN(val)){
    badge.textContent = '';
  } else if (Math.abs(val - catDefault) < 0.01){
    badge.textContent = 'del catálogo';
    badge.style.color = 'var(--text3)';
  } else {
    badge.textContent = `override (cat: ${catDefault}%)`;
    badge.style.color = 'var(--amber-text)';
    badge.style.fontWeight = '500';
  }
  updateOCDerivados();
}

/* Recalcula derivados (año, mes, días, subtotal, IVA, total) y refresca info de comisiones */
function updateOCDerivados(){
  const fv = document.getElementById('oc-fv')?.value;
  const fi = document.getElementById('oc-fi')?.value;
  const ff = document.getElementById('oc-ff')?.value;
  const ts = parseFloat(document.getElementById('oc-ts')?.value) || 0;
  const pu = parseFloat(document.getElementById('oc-pu')?.value) || 0;
  if (fv){
    const d = new Date(fv);
    const a = document.getElementById('oc-anio');
    const m = document.getElementById('oc-mes');
    if (a) a.textContent = d.getFullYear();
    if (m) m.textContent = String(d.getMonth()+1).padStart(2,'0');
  }
  if (fi && ff){
    const d1 = new Date(fi), d2 = new Date(ff);
    const days = Math.floor((d2-d1)/86400000) + 1;
    const dEl = document.getElementById('oc-dias');
    if (dEl) dEl.value = days>0 ? days+' días' : '—';
  }
  const sub = ts*pu;
  const iva = sub*0.16;
  const tot = sub+iva;
  const sEl = document.getElementById('oc-sub');
  const iEl = document.getElementById('oc-iva');
  const tEl = document.getElementById('oc-tot');
  if (sEl) sEl.textContent = fmtFull(sub);
  if (iEl) iEl.textContent = fmtFull(iva);
  if (tEl) tEl.textContent = fmtFull(tot);

  // Estimado de comisiones usando los snapshots actuales (no el catálogo).
  // OJO: fórmula del modelo = OC.total × %snap. Mantenemos esa base aquí.
  const vpId  = document.getElementById('oc-vp')?.value;
  const vsId  = document.getElementById('oc-vs')?.value;
  const agId  = document.getElementById('oc-ag')?.value;
  const vpPct = parseFloat(document.getElementById('oc-vp-pct')?.value);
  const vsPct = parseFloat(document.getElementById('oc-vs-pct')?.value);
  const agPct = parseFloat(document.getElementById('oc-ag-pct')?.value);
  const info = [];
  if (vpId && !isNaN(vpPct)){
    info.push(`<strong>Comisión vendedor principal</strong> (${vpPct}%): <span style="color:var(--text)">${fmtFull(tot*vpPct/100)}</span>`);
  }
  if (vsId && !isNaN(vsPct)){
    info.push(`<strong>Comisión vendedor secundario</strong> (${vsPct}%): <span style="color:var(--text)">${fmtFull(tot*vsPct/100)}</span>`);
  }
  if (agId && !isNaN(agPct)){
    info.push(`<strong>Comisión agencia</strong> (${agPct}%): <span style="color:var(--text)">${fmtFull(tot*agPct/100)}</span>`);
  }
  const vi = document.getElementById('oc-vendedor-info');
  if (vi){
    vi.innerHTML = info.length
      ? `<div style="background:var(--blue-bg);color:var(--blue-text);padding:9px 11px;border-radius:6px;line-height:1.7;font-size:11px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px">Estimación con los % snapshot actuales · Base: OC.total c/IVA</div>${info.join('<br>')}<br><span style="font-size:10px;opacity:.7">La Requisición se calculará con estos % congelados al cerrar la orden, no con el catálogo vigente.</span></div>`
      : '';
  }
}

/* Cuando cambia el anunciante: sugerir agencia, prefijar dirección de facturación */
function onAnuncianteChange(){
  const anId = document.getElementById('oc-an').value;
  if (!anId) return;
  const an = findRef('anunciante', anId);
  // Sugerir agencia
  if (an.agencia_id){
    const agSel = document.getElementById('oc-ag');
    if (!agSel.value) agSel.value = an.agencia_id;
  }
  // Sugerir dirección
  const dirEl = document.getElementById('oc-dir');
  if (!dirEl.value){
    dirEl.value = an.nombre_fiscal + (an.rfc_anunciante ? ' · RFC ' + an.rfc_anunciante : '');
  }
  updateOCDerivados();
}

/* Persistencia */
function saveOC(existingId, estatusOrEdit){
  // Lectura de campos
  const num = document.getElementById('oc-num').value.trim();
  const fv  = document.getElementById('oc-fv').value;
  const ef  = document.getElementById('oc-ef').value;
  const vp  = document.getElementById('oc-vp').value;
  const an  = document.getElementById('oc-an').value;
  const fi  = document.getElementById('oc-fi').value;
  const ff  = document.getElementById('oc-ff').value;
  const ts  = parseInt(document.getElementById('oc-ts').value) || 0;
  const pu  = parseFloat(document.getElementById('oc-pu').value) || 0;

  // Validación mínima
  const missing = [];
  if (!num) missing.push('No. orden cliente');
  if (!fv)  missing.push('Fecha de venta');
  if (!ef)  missing.push('Empresa facturadora');
  if (!vp)  missing.push('Vendedor principal');
  if (!an)  missing.push('Anunciante');
  if (!fi)  missing.push('Fecha inicio campaña');
  if (!ff)  missing.push('Fecha fin campaña');
  if (!ts || ts<1) missing.push('Total spots');
  if (!pu || pu<=0) missing.push('Precio unitario');
  if (missing.length){
    alert('Faltan campos obligatorios:\n· ' + missing.join('\n· '));
    return;
  }
  if (new Date(ff) < new Date(fi)){
    alert('La fecha de fin de campaña no puede ser anterior a la de inicio.');
    return;
  }

  // Construcción del registro
  const payload = {
    numero_orden_cliente: num,
    fecha_venta: fv,
    empresa_facturadora_id: ef,
    vendedor_principal_id: vp,
    vendedor_secundario_id: document.getElementById('oc-vs').value || null,
    anunciante_id: an,
    agencia_id: document.getElementById('oc-ag').value || null,
    contrato_id: document.getElementById('oc-co').value || null,
    marca_id: document.getElementById('oc-mc').value || null,
    categoria_id: document.getElementById('oc-cat').value || null,
    producto: document.getElementById('oc-pr').value.trim(),
    direccion_facturacion: document.getElementById('oc-dir').value.trim(),
    facturacion_directa_cliente: document.getElementById('oc-fdc').checked,
    afiliado_factura_directo_al_cliente: document.getElementById('oc-afdc').checked,
    fecha_inicio_campania: fi,
    fecha_fin_campania: ff,
    duracion_spot: document.getElementById('oc-du').value,
    total_spots: ts,
    precio_unitario: pu,
    // Snapshots (Issue #1) — convertimos '' → null
    porcentaje_comision_vendedor_principal_snap:  parseFloat(document.getElementById('oc-vp-pct').value) || null,
    porcentaje_comision_vendedor_secundario_snap: parseFloat(document.getElementById('oc-vs-pct').value) || null,
    porcentaje_comision_agencia_snap:             parseFloat(document.getElementById('oc-ag-pct').value) || null,
    observaciones_predefinidas: document.getElementById('oc-obp').value,
    observaciones_libres: document.getElementById('oc-obl').value.trim(),
    // Recepción ODC (PO §2) — Punto 1
    distribucion_pauta: document.getElementById('oc-dist')?.value.trim() || '',
    horario_solicitado: document.getElementById('oc-hor')?.value.trim() || '',
    odc_pdf_ref: document.getElementById('oc-pdfref')?.value.trim() || '',
    audio_spot_ref: document.getElementById('oc-audioref')?.value.trim() || '',
    revision_checklist: collectChecklist(),
  };

  if (existingId){
    // Edición: preservar id, folio, estatus y created_by
    const oc = findById(data.orden_cliente, existingId);
    // Si la orden está congelada y se cambiaron snapshots, registrar audit
    const FROZEN = ['orden_cerrada','facturada','cobrada'];
    if (FROZEN.includes(oc.estatus_orden)){
      ['porcentaje_comision_vendedor_principal_snap','porcentaje_comision_vendedor_secundario_snap','porcentaje_comision_agencia_snap'].forEach(k=>{
        if (oc[k] !== payload[k]) logSensitiveChange('OrdenCliente', oc.id, k, oc[k], payload[k]);
      });
    }
    Object.assign(oc, payload);
    alert('✓ Orden actualizada: ' + oc.folio_orden);
    state.selected = existingId;
  } else {
    // Creación: nuevo folio y estatus iniciales
    const year = new Date(fv).getFullYear();
    const nextNum = String(data.orden_cliente.length + 41).padStart(4,'0');
    const folio = `OC-${year}-${nextNum}`;
    const newId = 'oc' + (data.orden_cliente.length + 100);
    const newRec = {
      id: newId,
      folio_orden: folio,
      ...payload,
      estatus_orden: estatusOrEdit, // 'recibida' o 'capturada'
      estatus_pago_afiliado: 'pendiente',
      estatus_pago_agencia: estatusOrEdit==='orden_cliente_sin_vobo' ? 'na' : 'pendiente',
      created_by: 've2',
      created_at: new Date().toISOString().substring(0,10)
    };
    data.orden_cliente.push(newRec);
    state.selected = newId;
    alert(`✓ Orden ${folio} creada con estatus "${STATUS_LABELS[estatusOrEdit]}".`);
  }

  state.view = 'orden_cliente';
  state.filter = 'all';
  state.search = '';
  render();
}

// PASO G — CIERRE DE OC (transición a estado 3)
// ════════════════════════════════════════════════════════════════
// Pantalla full-screen donde el operador:
//  1) Carga ODC cerrada del cliente (opcional)
//  2) Carga Carta de Conciliación firmada (opcional)
//  3) Confirma el cierre
// Al cerrar: congela snapshots de comisión, deja registro de qué
// documentos faltaron (si alguno), y la OC pasa a 'orden_cerrada'.

function cerrarOC(id){
  const o = findById(data.orden_cliente, id);
  if (!o){ alert('OC no encontrada'); return; }
  // Pre-condición: todas las OI hijas en 2.3
  const oes = data.orden_interna.filter(x=>x.orden_id===o.id);
  if (oes.length === 0){
    alert('Esta OC todavía no tiene órdenes internas. No se puede cerrar.');
    return;
  }
  if (!oes.every(x=>x.estatus==='reales_conciliados')){
    alert('Para cerrar la OC todas sus órdenes internas deben estar en sub-estado 2.3 (Reales conciliados).');
    return;
  }
  window._cierreForm = null;
  state.formMode = 'oc_cierre';
  state.formOcId = id;
  render();
}

function renderCierreOCForm(oc){
  const an = findRef('anunciante', oc.anunciante_id);
  const ag = oc.agencia_id ? findRef('agencia', oc.agencia_id) : null;
  const ve = findRef('vendedor', oc.vendedor_principal_id);
  const vs = oc.vendedor_secundario_id ? findRef('vendedor', oc.vendedor_secundario_id) : null;
  const ef = findRef('empresa_facturadora', oc.empresa_facturadora_id);
  const oes = data.orden_interna.filter(x=>x.orden_id===oc.id);

  // Init de form state
  if (!window._cierreForm || window._cierreForm.ocId !== oc.id){
    window._cierreForm = {
      ocId: oc.id,
      odc_cerrada_nombre: oc.odc_cerrada_ref || '',
      odc_cerrada_dataurl: oc.odc_cerrada_dataurl || null,
      odc_cerrada_tipo: oc.odc_cerrada_tipo || null,
      cc_nombre: oc.carta_conciliacion_ref || '',
      cc_dataurl: oc.carta_conciliacion_dataurl || null,
      cc_tipo: oc.carta_conciliacion_tipo || null,
      confirmado: false
    };
  }

  // Asegurar snapshots de comisión: si alguno está vacío, jalarlo del catálogo (último momento)
  const fixes = [];
  if (oc.vendedor_principal_id && (oc.porcentaje_comision_vendedor_principal_snap===null || oc.porcentaje_comision_vendedor_principal_snap===undefined)){
    const v = findRef('vendedor', oc.vendedor_principal_id);
    if (v) { oc.porcentaje_comision_vendedor_principal_snap = v.porcentaje_comision_default; fixes.push(`Vendedor principal · ${v.porcentaje_comision_default}% (del catálogo)`); }
  }
  if (oc.vendedor_secundario_id && (oc.porcentaje_comision_vendedor_secundario_snap===null || oc.porcentaje_comision_vendedor_secundario_snap===undefined)){
    const v = findRef('vendedor', oc.vendedor_secundario_id);
    if (v) { oc.porcentaje_comision_vendedor_secundario_snap = v.porcentaje_comision_default; fixes.push(`Vendedor secundario · ${v.porcentaje_comision_default}% (del catálogo)`); }
  }
  if (oc.agencia_id && (oc.porcentaje_comision_agencia_snap===null || oc.porcentaje_comision_agencia_snap===undefined)){
    const a = findRef('agencia', oc.agencia_id);
    if (a) { oc.porcentaje_comision_agencia_snap = a.porcentaje_comision_agencia_default; fixes.push(`Agencia · ${a.porcentaje_comision_agencia_default}% (del catálogo)`); }
  }

  // Totales
  const sub = (oc.total_spots||0) * (oc.precio_unitario||0);
  const iva = sub * 0.16;
  const total = sub + iva;

function onOdcCerradaChange(input){
  const f = input.files && input.files[0];
  if (!f) return;
  window._cierreForm.odc_cerrada_nombre = f.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    window._cierreForm.odc_cerrada_dataurl = e.target.result;
    window._cierreForm.odc_cerrada_tipo = f.type;
    const el = document.getElementById('cierre-odc-nombre');
    if (el){ el.textContent = f.name + ' · cargado'; el.style.color = 'var(--text1)'; el.style.fontWeight = '500'; }
    recomputeCierreOCForm();
  };
  reader.readAsDataURL(f);
  const el = document.getElementById('cierre-odc-nombre');
  if (el) el.textContent = f.name + ' · leyendo…';
}

function onCcChange(input){
  const f = input.files && input.files[0];
  if (!f) return;
  window._cierreForm.cc_nombre = f.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    window._cierreForm.cc_dataurl = e.target.result;
    window._cierreForm.cc_tipo = f.type;
    const el = document.getElementById('cierre-cc-nombre');
    if (el){ el.textContent = f.name + ' · cargado'; el.style.color = 'var(--text1)'; el.style.fontWeight = '500'; }
    recomputeCierreOCForm();
  };
  reader.readAsDataURL(f);
  const el = document.getElementById('cierre-cc-nombre');
  if (el) el.textContent = f.name + ' · leyendo…';
}

function recomputeCierreOCForm(){
  const f = window._cierreForm;
  if (!f) return;
  const msgEl = document.getElementById('cierre-validation-msg');
  const btn = document.getElementById('cierre-confirmar-btn');
  if (!btn || !msgEl) return;

  if (!f.confirmado){
    msgEl.innerHTML = '<span style="color:var(--amber-text)">Marca la confirmación para habilitar el cierre.</span>';
    btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed';
    return;
  }

  // Avisos sobre documentos faltantes (no bloqueante)
  const faltantes = [];
  if (!f.odc_cerrada_nombre) faltantes.push('ODC cerrada');
  if (!f.cc_nombre) faltantes.push('Carta de Conciliación');

  if (faltantes.length){
    msgEl.innerHTML = `<span style="color:var(--amber-text)">⚠ Se cerrará sin ${faltantes.join(' ni ')}. Quedará registro de que faltó.</span>`;
  } else {
    msgEl.innerHTML = '<span style="color:var(--green-text)">✓ Documentos cargados. Listo para cerrar.</span>';
  }
  btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = '';
}

function cancelCierreOC(){
  const ocId = window._cierreForm?.ocId;
  window._cierreForm = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = ocId || null;
  setTimeout(render, 10);
}

function confirmarCierreOC(){
  const f = window._cierreForm;
  if (!f || !f.confirmado) return;
  const oc = findById(data.orden_cliente, f.ocId);
  if (!oc) return;

  // Persistir referencias a documentos
  oc.odc_cerrada_ref = f.odc_cerrada_nombre || null;
  oc.odc_cerrada_dataurl = f.odc_cerrada_dataurl || null;
  oc.odc_cerrada_tipo = f.odc_cerrada_tipo || null;
  oc.carta_conciliacion_ref = f.cc_nombre || null;
  oc.carta_conciliacion_dataurl = f.cc_dataurl || null;
  oc.carta_conciliacion_tipo = f.cc_tipo || null;
  oc.documentos_cierre_faltantes = [
    !f.odc_cerrada_nombre ? 'odc_cerrada' : null,
    !f.cc_nombre ? 'carta_conciliacion' : null
  ].filter(Boolean);

  // Cambiar estado y registrar fecha de cierre
  oc.estatus_orden = 'orden_cerrada';
  oc.fecha_cierre = new Date().toISOString().slice(0,10);
  oc.updated_at = oc.fecha_cierre;

  // Audit: congelamiento de snapshots
  if (typeof logSensitiveChange === 'function'){
    logSensitiveChange('OrdenCliente', oc.id, '__freeze_snapshot__', null, {
      vp: oc.porcentaje_comision_vendedor_principal_snap,
      vs: oc.porcentaje_comision_vendedor_secundario_snap,
      ag: oc.porcentaje_comision_agencia_snap,
      doc_faltantes: oc.documentos_cierre_faltantes
    });
  }

  const ocId = oc.id;
  window._cierreForm = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = ocId;
  setTimeout(render, 10);
}

// PASO H — FACTURACIÓN 4.1 · Preparación del archivo plano
// ════════════════════════════════════════════════════════════════
// Acceso: detalle de OC en orden_cerrada → "Generar archivo plano".
// Cinco bloques:
//   1. OC origen (read-only)
//   2. Anunciante / Receptor (editable)
//   3. Datos fiscales SAT (editable)
//   4. Descripción (auto-plantilla, libre edición)
//   5. Totales (read-only, derivados)
// Al guardar: genera .txt descargable + OC pasa a facturada_archivo_plano (4.1).

function generarArchivoPlano(ocId){
  const oc = findById(data.orden_cliente, ocId);
  if (!oc){ alert('OC no encontrada'); return; }
  if (oc.estatus_orden !== 'orden_cerrada' && oc.estatus_orden !== 'facturada_archivo_plano'){
    alert('La OC debe estar en estado 3 (Orden cerrada) o 4.1 (Archivo plano) para generar/regenerar el archivo plano.');
    return;
  }
  window._fac41Form = null;
  state.formMode = 'factura_41';
  state.formOcId = ocId;
  render();
}

// Plantilla automática de descripción
function plantillaDescripcionFactura(oc){
  const oes = data.orden_interna.filter(x => x.orden_id === oc.id);
  const estacionesNombres = [...new Set(oes.map(o => {
    const e = findRef('estacion', o.estacion_id);
    return e ? `${e.nombre_estacion} ${e.frecuencia||''}`.trim() : '';
  }).filter(Boolean))];
  const fmtFechaEsp = (iso) => {
    if (!iso) return '';
    const [y,m,d] = iso.split('-');
    const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
    return `${parseInt(d,10)} DE ${meses[parseInt(m,10)-1]} ${y}`;
  };
  const dur = oc.duracion_spot || '';
  return `MENCIONES ${dur} Y HONORARIOS PAUTAS PUBLICITARIAS EN RADIO DEL ${fmtFechaEsp(oc.fecha_inicio_campania)} AL ${fmtFechaEsp(oc.fecha_fin_campania)} EN LAS EMISORAS ${estacionesNombres.join(', ')}`;
}

function resetDescripcionFactura(){
  const oc = findById(data.orden_cliente, window._fac41Form.ocId);

  const t = document.getElementById('f41-desc');
  if (t) t.value = window._fac41Form.descripcion;
  recomputeFactura41Form();
}

function recomputeFactura41Form(){
  const f = window._fac41Form;
  if (!f) return;
  const errs = [];
  if (!f.rfc_receptor) errs.push('Falta RFC del receptor');
  else if (!/^[A-Z&Ñ]{3,4}\d{6}[A-Z0-9]{3}$/i.test(f.rfc_receptor)) errs.push('RFC con formato inválido');
  if (!f.razon_social_receptor) errs.push('Falta razón social del receptor');
  if (!f.uso_cfdi) errs.push('Falta uso CFDI');
  if (!f.forma_pago) errs.push('Falta forma de pago');
  if (!f.metodo_pago) errs.push('Falta método de pago');
  if (!f.descripcion || f.descripcion.trim().length < 10) errs.push('La descripción debe tener al menos 10 caracteres');

  const msgEl = document.getElementById('f41-validation-msg');
  const btn = document.getElementById('f41-guardar-btn');
  if (!msgEl || !btn) return;
  if (errs.length){
    msgEl.innerHTML = `<span style="color:var(--red-text)">⚠ ${errs[0]}${errs.length>1?` (+${errs.length-1} más)`:''}</span>`;
    btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed';
    btn.title = errs.join('\n');
  } else {
    msgEl.innerHTML = `<span style="color:var(--green-text)">✓ Datos completos · listo para generar archivo plano</span>`;
    btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = ''; btn.title = '';
  }
}

function cancelFactura41(){

// Genera el archivo plano (.txt) y lo descarga.
// Sigue el formato observado en el ejemplo del proyecto (clave-valor con padding).
function construirArchivoPlano(oc, f){
  const ef = findRef('empresa_facturadora', oc.empresa_facturadora_id);
  const sub = (oc.total_spots||0) * (oc.precio_unitario||0);
  const iva = sub * 0.16;
  const total = sub + iva;
  const ahora = new Date();
  const pad2 = (n) => String(n).padStart(2,'0');
  const ts = `${ahora.getFullYear()}-${pad2(ahora.getMonth()+1)}-${pad2(ahora.getDate())} ${pad2(ahora.getHours())}:${pad2(ahora.getMinutes())}:${pad2(ahora.getSeconds())}`;
  // Padding helper (alineado a columna 17 como el ejemplo real)
  const k = (label, value) => `${label.padEnd(17,' ')}${value==null?'':value}\r\n`;
  // Construcción del archivo
  let out = '';
  out += 'XXXINICIO\r\n';
  out += '================ IdDoc\r\n';
  out += k('NumeroInterno', oc.folio_orden.replace(/[^\d]/g,''));
  out += k('Tipo', '33');
  out += k('Serie', 'D');
  out += k('Folio', oc.folio_orden.replace(/[^\d]/g,''));
  out += k('Estado', 'ORIGINAL');
  out += k('FechaEmis', ts);
  out += k('FormaPago', f.metodo_pago||'');
  out += k('MedioPago', f.forma_pago||'');
  out += k('CondPago', f.condicion_pago||'');
  out += k('FechaVenc', ts);
  out += '================ ExEmisor\r\n';
  out += k('RFCEmisor', ef?ef.rfc_empresa:'');
  out += k('NmbEmisor', ef?ef.razon_social_empresa:'');
  out += '================ Receptor\r\n';
  out += k('RFCRecep', f.rfc_receptor||'');
  out += k('NmbRecep', f.razon_social_receptor||'');
  out += k('UsoCFDI', f.uso_cfdi||'');
  out += '================ Detalle\r\n';
  // Descripción puede tener varias líneas: parto en bloques de 80 chars
  const desc = (f.descripcion||'').replace(/\n/g,' ');
  const chunks = [];
  for (let i=0; i<desc.length; i+=80) chunks.push(desc.substring(i, i+80));
  chunks.forEach((c,i)=> out += k(`Descripcion${i+1}`, c));
  out += k('Cantidad', String(oc.total_spots||0));
  out += k('PrecioUnit', String((oc.precio_unitario||0).toFixed(2)));
  out += k('MontoItem', String(sub.toFixed(2)));
  out += '================ Totales\r\n';
  out += k('Subtotal', sub.toFixed(2));
  out += k('IVA', iva.toFixed(2));
  out += k('Total', total.toFixed(2));
  out += 'XXXFIN\r\n';
  return out;
}

function guardarFactura41(){
  const f = window._fac41Form;
  if (!f) return;
  const oc = findById(data.orden_cliente, f.ocId);
  if (!oc) return;

  // Persistir en OC
  oc.rfc_receptor = f.rfc_receptor;
  oc.razon_social_receptor = f.razon_social_receptor;
  oc.uso_cfdi = f.uso_cfdi;
  oc.forma_pago = f.forma_pago;
  oc.metodo_pago = f.metodo_pago;
  oc.condicion_pago = f.condicion_pago;
  oc.descripcion_factura = f.descripcion;
  oc.archivo_plano_generado_at = new Date().toISOString();
  oc.estatus_orden = 'facturada_archivo_plano';
  oc.updated_at = new Date().toISOString().slice(0,10);

  // Generar y descargar el .txt
  const contenido = construirArchivoPlano(oc, f);
  const blob = new Blob([contenido], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${oc.folio_orden}_archivo_plano.txt`;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);

  const ocId = oc.id;
  window._fac41Form = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = ocId;
  setTimeout(render, 10);
}

function onF42XmlChange(input){
  const f = input.files && input.files[0];
  if (!f) return;
  window._fac42Form.xml_nombre = f.name;
  window._fac42Form.xml_tipo = f.type || 'text/xml';
  const reader = new FileReader();
  reader.onload = (e) => {
    window._fac42Form.xml_dataurl = e.target.result;
    const el = document.getElementById('f42-xml-nombre');
    if (el){ el.textContent = f.name + ' · cargado'; el.style.color = 'var(--text1)'; el.style.fontWeight = '500'; }
    recomputeFactura42Form();
    // re-render para mostrar el botón "Ver XML"
    render();
  };
  reader.readAsDataURL(f);
  const el = document.getElementById('f42-xml-nombre');
  if (el) el.textContent = f.name + ' · leyendo…';
}

function onF42PdfChange(input){
  const f = input.files && input.files[0];
  if (!f) return;
  window._fac42Form.pdf_nombre = f.name;
  window._fac42Form.pdf_tipo = f.type || 'application/pdf';
  const reader = new FileReader();
  reader.onload = (e) => {
    window._fac42Form.pdf_dataurl = e.target.result;
    const el = document.getElementById('f42-pdf-nombre');
    if (el){ el.textContent = f.name + ' · cargado'; el.style.color = 'var(--text1)'; el.style.fontWeight = '500'; }
    recomputeFactura42Form();
    render();
  };
  reader.readAsDataURL(f);
  const el = document.getElementById('f42-pdf-nombre');
  if (el) el.textContent = f.name + ' · leyendo…';
}

function verArchivoFac42(tipo){
  const f = window._fac42Form;
  const dataurl = tipo === 'xml' ? f.xml_dataurl : f.pdf_dataurl;
  const nombre = tipo === 'xml' ? f.xml_nombre : f.pdf_nombre;
  if (!dataurl){ alert('Archivo no cargado en esta sesión.'); return; }
  const w = window.open('', '_blank', 'width=900,height=900');
  if (!w){ alert('Habilita popups para previsualizar el archivo.'); return; }
  if (tipo === 'xml'){
    // Decodificar data URL y mostrar como texto pre
    fetch(dataurl).then(r=>r.text()).then(xmlText => {
      w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${nombre}</title>
      <style>body{font-family:Consolas,Monaco,monospace;font-size:11px;padding:16px;line-height:1.5;background:#1e1e1e;color:#d4d4d4} pre{white-space:pre-wrap;word-break:break-all;margin:0} .topbar{background:#252526;color:#fff;padding:10px 14px;margin:-16px -16px 14px;font-family:system-ui;font-size:12px;display:flex;justify-content:space-between;align-items:center} .topbar b{color:#fff} button{background:#3a3a3a;color:#fff;border:0;padding:4px 10px;border-radius:3px;cursor:pointer}</style>
      </head><body><div class="topbar"><span><b>${nombre}</b> · vista previa XML</span><button onclick="window.close()">Cerrar</button></div><pre>${xmlText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></body></html>`);
      w.document.close();
    });
  } else {
    w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${nombre}</title>
    <style>body{margin:0;background:#222} .topbar{background:#252526;color:#fff;padding:10px 14px;font-family:system-ui;font-size:12px;display:flex;justify-content:space-between;align-items:center} .topbar b{color:#fff} button{background:#3a3a3a;color:#fff;border:0;padding:4px 10px;border-radius:3px;cursor:pointer} embed{width:100%;height:calc(100vh - 44px);border:0;display:block}</style>
    </head><body><div class="topbar"><span><b>${nombre}</b> · vista previa PDF</span><button onclick="window.close()">Cerrar</button></div><embed src="${dataurl}" type="application/pdf"></body></html>`);
    w.document.close();
  }
}

function recomputeFactura42Form(){
  const f = window._fac42Form;
  if (!f) return;
  const msgEl = document.getElementById('f42-validation-msg');
  const btn = document.getElementById('f42-guardar-btn');
  if (!msgEl || !btn) return;

  // UUID validación (formato estándar)
  const uuidValido = /^[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}$/i.test(f.uuid_cfdi||'');
  const errs = [];
  if (!f.uuid_cfdi) errs.push('Falta el UUID');
  else if (!uuidValido) errs.push('UUID con formato inválido (debe ser 8-4-4-4-12 hex)');
  if (!f.confirmado) errs.push('Marca la confirmación para avanzar');

  if (errs.length){
    msgEl.innerHTML = `<span style="color:var(--red-text)">⚠ ${errs[0]}${errs.length>1?` (+${errs.length-1} más)`:''}</span>`;
    btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed';
    btn.title = errs.join('\n');
    return;
  }

  // Avisos por archivos faltantes (no bloqueante)
  const faltantes = [];
  if (!f.xml_nombre) faltantes.push('XML');
  if (!f.pdf_nombre) faltantes.push('PDF');
  if (faltantes.length){
    msgEl.innerHTML = `<span style="color:var(--amber-text)">⚠ Se avanzará sin ${faltantes.join(' ni ')}. Quedará registro y podrás cargarlos después.</span>`;
  } else {
    msgEl.innerHTML = `<span style="color:var(--green-text)">✓ UUID válido y archivos cargados · listo para avanzar a 4.2</span>`;
  }
  btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = ''; btn.title = '';
}

function cancelFactura42(){
  const ocId = window._fac42Form?.ocId;
  window._fac42Form = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = ocId || null;
  setTimeout(render, 10);
}

function guardarFactura42(){
  const f = window._fac42Form;
  if (!f || !f.confirmado) return;
  const oc = findById(data.orden_cliente, f.ocId);
  if (!oc) return;

  // Persistir
  oc.uuid_cfdi = f.uuid_cfdi;
  oc.cfdi_xml_ref = f.xml_nombre || null;
  oc.cfdi_xml_dataurl = f.xml_dataurl || null;
  oc.cfdi_xml_tipo = f.xml_tipo || null;
  oc.cfdi_pdf_ref = f.pdf_nombre || null;
  oc.cfdi_pdf_dataurl = f.pdf_dataurl || null;
  oc.cfdi_pdf_tipo = f.pdf_tipo || null;
  oc.cfdi_timbrado_at = new Date().toISOString();
  oc.documentos_timbrado_faltantes = [
    !f.xml_nombre ? 'cfdi_xml' : null,
    !f.pdf_nombre ? 'cfdi_pdf' : null
  ].filter(Boolean);
  oc.estatus_orden = 'facturada_timbrada';
  oc.updated_at = new Date().toISOString().slice(0,10);

  // Audit log si hay logSensitiveChange
  if (typeof logSensitiveChange === 'function'){
    logSensitiveChange('OrdenCliente', oc.id, '__cfdi_timbrado__', null, {
      uuid: oc.uuid_cfdi,
      faltantes: oc.documentos_timbrado_faltantes
    });
  }

  const ocId = oc.id;
  window._fac42Form = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = ocId;
  setTimeout(render, 10);
}
