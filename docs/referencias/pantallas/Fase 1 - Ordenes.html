// FORM DE ORDEN INTERNA (v5) — uno por OI
// ════════════════════════════════════════════════════════════════
// Captura/edita UNA orden interna. Una OI = una estación + un periodo
// de transmisión desagregado. Si se quiere asignar a otra estación,
// se regresa al detalle de la OC y se hace click otra vez en "+ Asignar
// estación". Validación bloqueante: cada fecha del periodo debe estar
// dentro del rango de campaña [fecha_inicio_campania, fecha_fin_campania]
// de la OC padre.

function renderNewOEForm(oc, edit){
  const an = findRef('anunciante', oc.anunciante_id);
  const ag = oc.agencia_id ? findRef('agencia', oc.agencia_id) : null;
  const ve = findRef('vendedor', oc.vendedor_principal_id);
  const categ = oc.categoria_id ? findRef('categoria', oc.categoria_id) : null;
  const cont = oc.contrato_id ? findRef('contrato', oc.contrato_id) : null;

  // Spots ya asignados a OIs existentes (excluyendo la actual si estamos editando)
  const oesExistentes = data.orden_interna.filter(x => x.orden_id===oc.id && (!edit || x.id!==edit.id));
  const spotsYaAsignados = oesExistentes.reduce((s,o)=>s+oiTotalSpots(o),0);
  const spotsDisponibles = (oc.total_spots||0) - spotsYaAsignados;

  // Estado inicial de la sesión (vive en una global "newOE" para sobrevivir re-renders)
  if (!window._oiForm || window._oiForm.ocId !== oc.id || window._oiForm.editId !== (edit?.id||null)) {
    window._oiForm = {
      ocId: oc.id,
      editId: edit?.id || null,
      estacion_id: edit?.estacion_id || '',
      precio_spot: edit?.precio_spot || '',
      observaciones: edit?.observaciones_estacion || '',
      periodo: (edit?.periodo_transmision || []).map(p => ({...p}))
    };
  }

  return `
    <div class="cat-header">
      <div>
        <div class="cat-title">${edit?'Editar':'Nueva'} orden interna · ${oc.folio_orden}</div>
        <div class="cat-sub">Una orden interna = una estación + su periodo de transmisión. Los datos comerciales se heredan de la OC. La <strong>tarifa estación</strong> se negocia con el afiliado; el <strong>% OIR</strong> se calcula automáticamente. Captura el desagregado del periodo día por día — las fechas deben caer dentro del rango de campaña de la OC.</div>
      </div>
      <button class="btn btn-sm" onclick="cancelOIForm()">← Volver a la orden</button>
    </div>

    <div style="flex:1;overflow:auto;background:var(--surface);padding:18px 24px">
      <div style="max-width:920px;margin:0 auto">

        <!-- Zona heredada -->
        <div class="heredado-block">
          <div class="heredado-title"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5l3 3 4-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Datos heredados de la orden cliente</div>
          <div class="heredado-grid">
            <div class="heredado-row"><span class="heredado-lbl">Orden origen</span><span class="heredado-val mono">${oc.folio_orden}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Anunciante</span><span class="heredado-val">${an?an.nombre_comercial:'—'}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Agencia</span><span class="heredado-val">${ag?ag.nombre_agencia:'Sin agencia'}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Vendedor</span><span class="heredado-val">${ve?ve.nombre_vendedor:'—'}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Producto</span><span class="heredado-val">${oc.producto||'—'}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Categoría</span><span class="heredado-val">${categ?categ.nombre_categoria:'—'}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Contrato</span><span class="heredado-val">${cont?cont.numero_contrato:'Sin contrato'}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Duración spot</span><span class="heredado-val mono">${oc.duracion_spot}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Rango campaña</span><span class="heredado-val mono">${oc.fecha_inicio_campania} → ${oc.fecha_fin_campania}</span></div>
            <div class="heredado-row"><span class="heredado-lbl">Tarifa cliente</span><span class="heredado-val mono">${fmt(oc.precio_unitario)}</span></div>
          </div>
        </div>

        <!-- Balance dinámico -->
        <div id="oi-balance" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:13px 16px;margin-bottom:14px">
          <div id="oi-balance-content"></div>
        </div>

        <!-- Datos de la OI -->
        <div class="sec" style="margin-top:18px">Datos de la orden interna</div>
        <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px">
          <div>
            <div class="fl fl-required">Estación destino</div>
            <select id="oi-estacion" onchange="onOIEstacionChange()" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font)">
              <option value="">— Selecciona estación —</option>
              ${cat.estacion.filter(e=>e.activo!==false).map(e=>{
                const af = findRef('afiliado', e.afiliado_id);
                const pl = findRef('plaza', e.plaza_id);
                return `<option value="${e.id}" ${window._oiForm.estacion_id===e.id?'selected':''}>${e.nombre_estacion} · ${e.frecuencia} · ${pl?pl.nombre_plaza:''} · ${af?af.nombre_afiliado:''}</option>`;
              }).join('')}
            </select>
          </div>
          <div>
            <div class="fl fl-required">Tarifa estación <span class="fl-tag">MXN/spot</span></div>
            <input type="number" id="oi-precio" value="${window._oiForm.precio_spot}" min="0" oninput="onOIPrecioChange()" placeholder="ej. 7500" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--mono);font-size:13px">
          </div>
        </div>

        <div style="margin-bottom:14px">
          <div class="fl">Observaciones operativas</div>
          <input type="text" id="oi-obs" value="${(window._oiForm.observaciones||'').replace(/"/g,'&quot;')}" oninput="window._oiForm.observaciones=this.value" placeholder="ej. Pauta drive time AM; coordinar testigos al cierre…" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12.5px">
        </div>

        <!-- Periodo de transmisión -->
        <div class="sec" style="display:flex;align-items:center;justify-content:space-between">
          <span>Periodo de transmisión <span style="font-weight:400;color:var(--text3);font-size:11px">· captura cada día que va a transmitir</span></span>
          <button class="btn btn-sm btn-teal" onclick="addPeriodoRow()">+ Agregar día</button>
        </div>
        <div id="oi-periodo-wrap"></div>

      </div>
    </div>

    <div class="form-footer" style="background:var(--surface);border-top:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div style="font-size:11px;color:var(--text3)" id="oi-validation-msg"></div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="cancelOIForm()">Cancelar</button>
        <button class="btn btn-teal" id="oi-save-btn" onclick="saveOIForm()">${edit?'Guardar cambios':'Guardar orden interna (→ 2.1)'}</button>
      </div>
    </div>
  `;
}

// Callbacks del form
function onOIEstacionChange(){
  const v = document.getElementById('oi-estacion').value;
  window._oiForm.estacion_id = v;
  recomputeOIForm();
}
function onOIPrecioChange(){
  const v = parseFloat(document.getElementById('oi-precio').value);
  window._oiForm.precio_spot = isFinite(v) ? v : '';
  recomputeOIForm();
}

function addPeriodoRow(){
  const f = window._oiForm;
  // Sugerir fecha: día siguiente a la última, o la fecha de inicio de campaña
  const oc = findById(data.orden_cliente, f.ocId);
  let sugerida = oc.fecha_inicio_campania;
  if (f.periodo.length > 0){
    const ult = f.periodo.map(p=>p.fecha).sort().reverse()[0];
    if (ult){
      const [y,m,d] = ult.split('-').map(Number);
      const dt = new Date(Date.UTC(y,m-1,d));
      dt.setUTCDate(dt.getUTCDate()+1);
      sugerida = dt.toISOString().slice(0,10);
      // Si sobrepasa, usar la última válida
      if (sugerida > oc.fecha_fin_campania) sugerida = ult;
    }
  }
  // Heredar ventana de la última fila si existe
  const ultimo = f.periodo[f.periodo.length-1];
  f.periodo.push({
    fecha: sugerida,
    hora_inicio: ultimo?.hora_inicio || '07:00',
    hora_termino: ultimo?.hora_termino || '09:00',
    spots_diarios: ultimo?.spots_diarios || 0
  });
  recomputeOIForm();
}

function removePeriodoRow(idx){
  window._oiForm.periodo.splice(idx, 1);
  recomputeOIForm();
}

function updatePeriodoField(idx, field, value){
  const row = window._oiForm.periodo[idx];
  if (!row) return;
  if (field === 'spots_diarios'){
    row[field] = parseInt(value)||0;
  } else {
    row[field] = value;
  }
  recomputeOIForm();
}

function recomputeOIForm(){
  const f = window._oiForm;
  const oc = findById(data.orden_cliente, f.ocId);
  const tarifaCliente = oc.precio_unitario || 0;
  const tarifaEst = parseFloat(f.precio_spot) || 0;
  const totalSpots = f.periodo.reduce((s,p)=>s+(p.spots_diarios||0), 0);
  const importeOI = totalSpots * tarifaEst;
  const pctOIR = tarifaCliente > 0 ? ((tarifaCliente - tarifaEst) / tarifaCliente * 100) : 0;

  // Spots ya asignados (excluyendo la OI en edición)
  const oesOtros = data.orden_interna.filter(x => x.orden_id===f.ocId && x.id!==f.editId);
  const spotsYaAsignados = oesOtros.reduce((s,o)=>s+oiTotalSpots(o),0);
  const disponiblesPrevios = (oc.total_spots||0) - spotsYaAsignados;
  const remanente = disponiblesPrevios - totalSpots;

  // Render balance
  const balanceHtml = `
    <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr 1.2fr;gap:14px;align-items:center">
      <div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Total OC</div>
        <div style="font-family:var(--mono);font-size:16px;font-weight:600">${oc.total_spots||0}</div>
        <div style="font-size:10px;color:var(--text3)">spots solicitados</div>
      </div>
      <div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Ya asignados a otras OI</div>
        <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text2)">${spotsYaAsignados}</div>
      </div>
      <div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">En esta OI</div>
        <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--teal-text)">${totalSpots}</div>
      </div>
      <div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Por asignar (resto OC)</div>
        <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:${remanente<0?'var(--red-text)':remanente===0?'var(--green-text)':'var(--amber-text)'}">${remanente}</div>
      </div>
    </div>
  `;
  const balEl = document.getElementById('oi-balance-content');
  if (balEl) balEl.innerHTML = balanceHtml;

  // Validación filas (bloqueante)
  const fechaIni = oc.fecha_inicio_campania;
  const fechaFin = oc.fecha_fin_campania;
  let errores = [];
  f.periodo.forEach((p, idx) => {
    if (!p.fecha) { errores.push(`Fila ${idx+1}: falta la fecha`); return; }
    if (p.fecha < fechaIni || p.fecha > fechaFin){
      errores.push(`Fila ${idx+1}: la fecha ${p.fecha} cae fuera del rango de campaña (${fechaIni} a ${fechaFin})`);
    }
    if (!p.hora_inicio || !p.hora_termino) errores.push(`Fila ${idx+1}: faltan horarios`);
    if (p.hora_inicio && p.hora_termino && p.hora_inicio >= p.hora_termino) errores.push(`Fila ${idx+1}: hora término debe ser posterior a la de inicio`);
    if (!p.spots_diarios || p.spots_diarios <= 0) errores.push(`Fila ${idx+1}: spots diarios debe ser > 0`);
  });
  if (!f.estacion_id) errores.unshift('Falta seleccionar estación');
  if (!f.precio_spot || tarifaEst <= 0) errores.unshift('Falta la tarifa estación');
  if (tarifaEst > tarifaCliente) errores.unshift(`La tarifa estación (${fmt(tarifaEst)}) no puede ser mayor que la tarifa cliente (${fmt(tarifaCliente)})`);
  if (f.periodo.length === 0) errores.unshift('Captura al menos un día en el periodo de transmisión');
  if (remanente < 0) errores.unshift(`Excede el total de la OC en ${Math.abs(remanente)} spots (OC pide ${oc.total_spots}, ya hay ${spotsYaAsignados} en otras OI + ${totalSpots} aquí)`);

  // Render filas
  const periodoHtml = `
    <div style="overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px">
      <table style="width:100%;border-collapse:separate;border-spacing:0;font-size:12px">
        <thead>
          <tr style="background:var(--surface2)">
            <th style="text-align:left;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;width:110px">Día</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;width:140px">Fecha</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;width:100px">Inicio</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;width:100px">Término</th>
            <th style="text-align:center;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;width:90px">Spots</th>
            <th style="text-align:right;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600">Importe</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody>
          ${f.periodo.length===0 ? `
            <tr><td colspan="7" style="padding:18px;text-align:center;color:var(--text3);font-size:12px">Sin filas. Haz click en «+ Agregar día» para capturar el periodo.</td></tr>
          ` : f.periodo.map((p, idx) => {
            const fueraRango = p.fecha && (p.fecha < fechaIni || p.fecha > fechaFin);
            const dia = p.fecha ? diaDeFecha(p.fecha) : '—';
            const importe = (p.spots_diarios||0) * tarifaEst;
            return `<tr style="border-top:1px solid var(--border-soft);${fueraRango?'background:#FCEBEB':''}">
              <td style="padding:6px 10px;font-weight:500;font-size:11.5px;color:${fueraRango?'var(--red-text)':'var(--text1)'}">${dia}</td>
              <td style="padding:6px 10px">
                <input type="date" min="${fechaIni}" max="${fechaFin}" value="${p.fecha||''}" onchange="updatePeriodoField(${idx},'fecha',this.value)" style="width:100%;padding:5px 7px;border:1px solid ${fueraRango?'var(--red-border)':'var(--border)'};border-radius:4px;font-family:var(--mono);font-size:11.5px">
              </td>
              <td style="padding:6px 10px">

function cancelOIForm(){
  const ocId = window._oiForm?.ocId;
  window._oiForm = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = ocId || null;
  setTimeout(render, 10);
}

function saveOIForm(){
  const f = window._oiForm;
  const oc = findById(data.orden_cliente, f.ocId);
  const est = findRef('estacion', f.estacion_id);
  if (!oc || !est){ alert('Faltan datos'); return; }
  const tarifaCliente = oc.precio_unitario || 0;
  const tarifaEst = parseFloat(f.precio_spot) || 0;
  const totalSpots = f.periodo.reduce((s,p)=>s+(p.spots_diarios||0), 0);
  const pctOIR = tarifaCliente > 0 ? ((tarifaCliente - tarifaEst) / tarifaCliente * 100) : 0;

  if (f.editId){
    // Editar
    const oi = findById(data.orden_interna, f.editId);
    if (!oi){ alert('No encontrada'); return; }
    oi.estacion_id = f.estacion_id;
    oi.plaza_id = est.plaza_id;
    oi.precio_spot = tarifaEst;
    oi.observaciones_estacion = f.observaciones;
    oi.periodo_transmision = f.periodo.map(p=>({...p}));
    oi.spots_solicitados = totalSpots;
    oi.spots_asignados = totalSpots;
    oi.fecha_transmision = oiPrimeraFecha(oi);
    oi.hora_inicio = f.periodo[0]?.hora_inicio || '';
    oi.hora_fin = f.periodo[0]?.hora_termino || '';
    oi.porcentaje_participacion_oir = +pctOIR.toFixed(1);
    oi.updated_at = new Date().toISOString().slice(0,10);
  } else {
    // Crear nueva OI
    // Letra correlativa
    const existentes = data.orden_interna.filter(x=>x.orden_id===oc.id);
    const letra = String.fromCharCode(65 + existentes.length); // A, B, C, ...
    const newId = 'oe' + (data.orden_interna.length + 1);
    const folio = oc.folio_orden.replace('OC-','OI-') + letra;
    const nueva = {
      id: newId,
      folio_orden_interna: folio,
      orden_id: oc.id,
      contrato_id: oc.contrato_id,
      anunciante_id: oc.anunciante_id,
      vendedor_id: oc.vendedor_principal_id,
      agencia_id: oc.agencia_id,
      categoria_id: oc.categoria_id,
      producto: oc.producto,
      estacion_id: f.estacion_id,
      plaza_id: est.plaza_id,
      fecha_transmision: oiPrimeraFechaDe(f.periodo),
      hora_inicio: f.periodo[0]?.hora_inicio || '',
      hora_fin: f.periodo[0]?.hora_termino || '',
      duracion_spot: oc.duracion_spot,
      spots_solicitados: totalSpots,
      spots_asignados: totalSpots,
      periodo_transmision: f.periodo.map(p=>({...p})),
      precio_spot: tarifaEst,
      porcentaje_participacion_oir: +pctOIR.toFixed(1),
      estatus: 'asignada_afiliado',
      observaciones_estacion: f.observaciones,
      created_at: new Date().toISOString().slice(0,10),
      updated_at: new Date().toISOString().slice(0,10)
    };
    data.orden_interna.push(nueva);

    // Si la OC estaba en orden_cliente_con_vobo, pasa a orden_interna
    if (oc.estatus_orden === 'orden_cliente_con_vobo'){
      oc.estatus_orden = 'orden_interna';
    }
  }

  window._oiForm = null;
  state.formMode = null;
  show('orden_cliente');
  state.selected = oc.id;
  setTimeout(render, 10);
}

function oiPrimeraFechaDe(periodo){
  if (!Array.isArray(periodo) || !periodo.length) return '';
  return periodo.map(p=>p.fecha).filter(Boolean).sort()[0] || '';
}

// Punto de entrada desde el detalle de OC

  window._oiForm = null; // limpio para reset

function editOE(id){

  if (oi.estatus !== 'asignada_afiliado'){
    alert('Solo se puede editar una OI en sub-estado 2.1 (Asignada al afiliado). Para 2.2 y 2.3 se editan los datos correspondientes en sus pantallas (Pasos C y D).');

  window._oiForm = null;
  state.formMode = 'oi_edit';

}

function capturarProgramados(oiId){
  const oi = findById(data.orden_interna, oiId);
  if (!oi){ alert('OI no encontrada'); return; }
  if (oi.estatus !== 'asignada_afiliado'){
    alert('Solo se pueden capturar programados en sub-estado 2.1 (Asignada al afiliado).');

function onProgFileChange(input){
  const f = input.files && input.files[0];
  if (!f) return;
  window._progForm.archivo_nombre = f.name;
  // Leer como data URL para poder embeberlo después en el PDF #2
  const reader = new FileReader();
  reader.onload = (e) => {
    window._progForm.archivo_dataurl = e.target.result;
    window._progForm.archivo_tipo = f.type;
    const el = document.getElementById('prog-adjunto-nombre');
    if (el) el.textContent = f.name + ' · cargado';
    recomputeProgramadosForm();
  };
  reader.readAsDataURL(f);
  // Mostrar nombre mientras carga
  const el = document.getElementById('prog-adjunto-nombre');
  if (el) el.textContent = f.name + ' · leyendo…';
}

function recomputeProgramadosForm(){
  const f = window._progForm;
  const oi = findById(data.orden_interna, f.oiId);
  if (!oi) return;
  const periodo = Array.isArray(oi.periodo_transmision) ? oi.periodo_transmision : [];

  // Contar filas modificadas (overrides reales: diferentes a la asignación)
  let nModif = 0, totalAsignadoSpots = 0, totalProgramadoSpots = 0;
  periodo.forEach(p => {
    totalAsignadoSpots += (p.spots_diarios||0);

                <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--amber-text);font-weight:500;background:#FFF7E6">${terminoP}</td>
                <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--amber-text);font-weight:500;background:#FFF7E6">${spotsP}</td>
                <td style="padding:5px 6px;text-align:right;display:flex;gap:4px;justify-content:flex-end">
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:10.5px" onclick="openProgEdit('${p.fecha}')">Editar</button>
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:10.5px;color:var(--red-text)" onclick="clearProgOverride('${p.fecha}')" title="Quitar la modificación (volver a lo asignado)">✕</button>
                </td>
              ` : `
                <td colspan="3" style="padding:7px 10px;text-align:center;font-size:11px;color:var(--green-text);font-style:italic;border-left:1px solid var(--border-soft)">OK · igual a lo asignado</td>
                <td style="padding:5px 6px;text-align:right">
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:10.5px" onclick="openProgEdit('${p.fecha}')">Editar</button>
                </td>
              `)}
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr style="background:var(--surface2);border-top:2px solid var(--border)">
            <td colspan="4" style="padding:9px 10px;text-align:right;font-size:11px;color:var(--text2);font-weight:600">Totales</td>
            <td style="padding:9px 10px;text-align:center;font-family:var(--mono);font-weight:700">${totalAsignadoSpots}</td>
            <td colspan="2" style="padding:9px 10px;text-align:right;font-size:11px;color:var(--text2);font-weight:600;border-left:1px solid var(--border-soft);background:#FFF7E6"></td>
            <td style="padding:9px 10px;text-align:center;font-family:var(--mono);font-weight:700;background:#FFF7E6;color:${totalProgramadoSpots===totalAsignadoSpots?'var(--text1)':'var(--amber-text)'}">${totalProgramadoSpots}</td>
            <td style="background:#FFF7E6"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
  const wrap = document.getElementById('prog-tabla-wrap');
  if (wrap) wrap.innerHTML = html;

  // Validación final (siempre se puede avanzar; las modificaciones son opcionales)
  const valEl = document.getElementById('prog-validation-msg');
  if (valEl){
    if (nModif === 0){
      valEl.innerHTML = `<span style="color:var(--text3)">Sin modificaciones · todos los días se programan según la asignación original.</span>`;
    } else {
      valEl.innerHTML = `<span style="color:var(--amber-text)">${nModif} día${nModif===1?'':'s'} con modificación respecto a la asignación.</span>`;
    }
  }

  // Botón avanzar deshabilitado si hay alguna fila en modo edición sin cerrar
  const algunaEnEdicion = Object.values(f.overrides).some(o => o?._editing);
  const avBtn = document.getElementById('prog-avanzar-btn');
  if (avBtn){
    if (algunaEnEdicion){
      avBtn.disabled = true; avBtn.style.opacity = '0.5'; avBtn.style.cursor='not-allowed';
      avBtn.title = 'Cierra las filas que estás editando antes de avanzar';
    } else {
      avBtn.disabled = false; avBtn.style.opacity=''; avBtn.style.cursor='';
      avBtn.title = '';
    }
  }
}

// Helpers de override
function isOverrideDifferent(p, ov){
  if (!ov) return false;
  // Comparar campos
  if (ov.hora_inicio !== undefined && ov.hora_inicio !== p.hora_inicio) return true;
  if (ov.hora_termino !== undefined && ov.hora_termino !== p.hora_termino) return true;
  if (ov.spots_diarios !== undefined && +ov.spots_diarios !== +p.spots_diarios) return true;
  return false;
}

function openProgEdit(fecha){
  const f = window._progForm;
  const oi = findById(data.orden_interna, f.oiId);
  const p = oi.periodo_transmision.find(x => x.fecha === fecha);
  if (!p) return;
  // Si no había override, crear uno con los valores asignados (todavía no es modificación)
  if (!f.overrides[fecha]){
    f.overrides[fecha] = {
      hora_inicio: p.hora_inicio,
      hora_termino: p.hora_termino,
      spots_diarios: p.spots_diarios,
      _editing: true
    };
  } else {
    f.overrides[fecha]._editing = true;
  }
  recomputeProgramadosForm();
}

function closeProgEdit(fecha){
  const f = window._progForm;
  const ov = f.overrides[fecha];
  if (!ov) return;
  const oi = findById(data.orden_interna, f.oiId);
  const p = oi.periodo_transmision.find(x => x.fecha === fecha);
  // Si los valores quedaron iguales a lo asignado, eliminar el override
  if (p && !isOverrideDifferent(p, ov)){
    delete f.overrides[fecha];
  } else {
    ov._editing = false;
  }
  recomputeProgramadosForm();
}

function updateProgOverride(fecha, field, value){
  const f = window._progForm;
  if (!f.overrides[fecha]) return;
  if (field === 'spots_diarios') f.overrides[fecha][field] = parseInt(value) || 0;
  else f.overrides[fecha][field] = value;
  recomputeProgramadosForm();
}

function clearProgOverride(fecha){
  const f = window._progForm;
  delete f.overrides[fecha];
  recomputeProgramadosForm();
}

function cancelProgramados(){
  const oiId = window._progForm?.oiId;
  window._progForm = null;
  state.formMode = null;
  show('orden_estacion');
  state.selected = oiId || null;
  setTimeout(render, 10);
}

function avanzarA22(){
  const f = window._progForm;
  const oi = findById(data.orden_interna, f.oiId);
  if (!oi) return;

  // Persistir solo las modificaciones reales (no las filas iguales a la asignación)
  const modifs = [];
  oi.periodo_transmision.forEach(p => {
    const ov = f.overrides[p.fecha];
    if (ov && isOverrideDifferent(p, ov)){
      modifs.push({
        fecha: p.fecha,
        hora_inicio: ov.hora_inicio,
        hora_termino: ov.hora_termino,
        spots_diarios: +ov.spots_diarios
      });
    }
  });
  oi.horarios_programados = modifs.length ? modifs : [];
  oi.reporte_programados_archivo = f.archivo_nombre || null;
  oi.reporte_programados_dataurl = f.archivo_dataurl || null;
  oi.reporte_programados_tipo = f.archivo_tipo || null;
  oi.estatus = 'programados_conciliados';
  oi.pdf_programados_at = oi.pdf_programados_at || null; // se actualiza solo si se generó PDF
  oi.updated_at = new Date().toISOString().slice(0,10);

  const oiId = oi.id;
  window._progForm = null;
  state.formMode = null;
  show('orden_estacion');
  state.selected = oiId;
  setTimeout(()=>{
    render();
    // Toast simple (alert por ahora)
    setTimeout(()=>{
      // Mostrar info breve en la consola, no alert intrusivo
      console.log(`OI ${oi.folio_orden_interna} avanzó a 2.2 con ${modifs.length} modificación${modifs.length===1?'':'es'}`);
    }, 100);
  }, 10);
}

// Wrapper para generar PDF #2 desde la pantalla de programados
// (reutiliza el generador existente pero parte de los datos actuales del form si está abierto)
function generarPDF2Desde(oiId){
  const f = window._progForm;
  const oi = findById(data.orden_interna, oiId);
  if (!oi) return;
  // Si hay form abierto con cambios sin guardar, persistir temporalmente
  if (f && f.oiId === oiId){
    const tempProgramados = [];
    oi.periodo_transmision.forEach(p => {
      const ov = f.overrides[p.fecha];
      if (ov && isOverrideDifferent(p, ov)){
        tempProgramados.push({
          fecha: p.fecha,
          hora_inicio: ov.hora_inicio,
          hora_termino: ov.hora_termino,
          spots_diarios: +ov.spots_diarios
        });
      }
    });
    // Inyectar momentáneamente para el PDF; restaurar después
    const prev = oi.horarios_programados;
    oi.horarios_programados = tempProgramados;
    try {
      generarPDFOrdenInterna(oiId, 'cliente_programados');
    } finally {
      oi.horarios_programados = prev;
    }
    // Marcar timestamp de generación (no de avance)
    oi.pdf_programados_at = new Date().toISOString();
  } else {
    generarPDFOrdenInterna(oiId, 'cliente_programados');
    oi.pdf_programados_at = new Date().toISOString();
  }
}

// PASO D — CAPTURA DE HORARIOS REALES (camino 2.2 → 2.3)
// ════════════════════════════════════════════════════════════════
// Misma mecánica por excepción que Paso C, pero compara contra los
// horarios programados (que son el override del Paso C si existió,
// o la asignación original si no hubo override).
//
// Al avanzar a 2.3 el sistema:
//  1. Persiste oi.horarios_reales (array sparse de overrides reales)
//  2. Genera 1 incidencia por cada fila con diferencia:
//       - reales > programados → 'bonificacion'
//       - reales < programados → 'descuento'
//  3. Guarda URL/ubicación alterna de testigos + notas globales.

function capturarReales(oiId){
  const oi = findById(data.orden_interna, oiId);
  if (!oi){ alert('OI no encontrada'); return; }
  if (oi.estatus !== 'programados_conciliados'){
    alert('Solo se pueden capturar horarios reales en sub-estado 2.2 (Programados conciliados).');
    return;
  }
  window._realForm = null;
  state.formMode = 'oi_reales';
  state.formEditId = oiId;
  render();
}

// Devuelve el valor "programado" efectivo para una fila del periodo:
// si existe override en horarios_programados, lo usa; si no, devuelve el del periodo.
function programadoDe(oi, p){
  const hp = Array.isArray(oi.horarios_programados) ? oi.horarios_programados : [];
  const ov = hp.find(h => h.fecha === p.fecha);
  if (ov){
    return {
      fecha: p.fecha,
      hora_inicio: ov.hora_inicio,
      hora_termino: ov.hora_termino,
      spots_diarios: ov.spots_diarios
    };
  }
  return { fecha: p.fecha, hora_inicio: p.hora_inicio, hora_termino: p.hora_termino, spots_diarios: p.spots_diarios };
}

function recomputeRealesForm(){
  const f = window._realForm;
  const oi = findById(data.orden_interna, f.oiId);
  if (!oi) return;
  const periodo = Array.isArray(oi.periodo_transmision) ? oi.periodo_transmision : [];

  let nModif = 0, nBonif = 0, nDesc = 0, totalProgramado = 0, totalReal = 0, montoNeto = 0;
  const precio = oi.precio_spot || 0;

  periodo.forEach(p => {
    const prog = programadoDe(oi, p);
    const ov = f.overrides[p.fecha];
    totalProgramado += (prog.spots_diarios||0);
    const realRow = ov ? {
      hora_inicio: ov.hora_inicio ?? prog.hora_inicio,
      hora_termino: ov.hora_termino ?? prog.hora_termino,
      spots_diarios: (ov.spots_diarios !== undefined) ? +ov.spots_diarios : prog.spots_diarios
    } : prog;
    totalReal += realRow.spots_diarios||0;
    if (ov && isOverrideDifferent(prog, ov)){
      nModif++;
      const diff = (realRow.spots_diarios||0) - (prog.spots_diarios||0);
      if (diff > 0){ nBonif++; montoNeto += diff * precio; }
      else if (diff < 0){ nDesc++; montoNeto += diff * precio; }

                      ? `<span class="badge b-red" style="font-size:10px">${diff} desc.</span>`
                      : `<span class="badge b-amber" style="font-size:10px">cambio horario</span>`))
              : `<span style="font-size:10px;color:var(--green-text);font-style:italic">sin cambio</span>`;
            const rowBg = editing ? 'background:#FFF7E6' : (isModif ? 'background:#FFF7E6' : '');

              <td style="padding:7px 10px;font-weight:500;font-size:11.5px">${dia}</td>
              <td style="padding:7px 10px;font-family:var(--mono);font-size:11px">${p.fecha}</td>
              <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px;border-left:1px solid var(--border-soft)">${prog.hora_inicio}</td>
              <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px">${prog.hora_termino}</td>
              <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px">${prog.spots_diarios}</td>
              ${editing ? `
                <td style="padding:5px 6px;border-left:1px solid var(--border-soft);background:#FFF7E6">
                  <input type="time" value="${inicioR}" onchange="updateRealOverride('${p.fecha}','hora_inicio',this.value)" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:11px">
                </td>
                <td style="padding:5px 6px;background:#FFF7E6">
                  <input type="time" value="${terminoR}" onchange="updateRealOverride('${p.fecha}','hora_termino',this.value)" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:11px">
                </td>
                <td style="padding:5px 6px;background:#FFF7E6;text-align:center">
                  <input type="number" min="0" value="${spotsR}" onchange="updateRealOverride('${p.fecha}','spots_diarios',this.value)" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:11px;text-align:center">
                </td>
                <td style="padding:5px 6px;text-align:center;border-left:1px solid var(--border-soft)">${resultBadge}</td>
                <td style="padding:5px 6px;text-align:right">
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:11px" onclick="closeRealEdit('${p.fecha}')">✓ OK</button>
                </td>
              ` : (isModif ? `
                <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--amber-text);font-weight:500;border-left:1px solid var(--border-soft);background:#FFF7E6">${inicioR}</td>
                <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--amber-text);font-weight:500;background:#FFF7E6">${terminoR}</td>
                <td style="padding:7px 10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--amber-text);font-weight:500;background:#FFF7E6">${spotsR}</td>
                <td style="padding:5px 6px;text-align:center;border-left:1px solid var(--border-soft)">${resultBadge}</td>
                <td style="padding:5px 6px;text-align:right;display:flex;gap:4px;justify-content:flex-end">
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:10.5px" onclick="openRealEdit('${p.fecha}')">Editar</button>
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:10.5px;color:var(--red-text)" onclick="clearRealOverride('${p.fecha}')" title="Quitar la modificación (volver a lo programado)">✕</button>
                </td>
              ` : `
                <td colspan="3" style="padding:7px 10px;text-align:center;font-size:11px;color:var(--green-text);font-style:italic;border-left:1px solid var(--border-soft)">Transmitido tal cual lo programado</td>
                <td style="padding:5px 6px;text-align:center;border-left:1px solid var(--border-soft)">${resultBadge}</td>
                <td style="padding:5px 6px;text-align:right">
                  <button class="btn btn-sm" style="padding:3px 9px;font-size:10.5px" onclick="openRealEdit('${p.fecha}')">Editar</button>
                </td>
              `)}
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr style="background:var(--surface2);border-top:2px solid var(--border)">
            <td colspan="4" style="padding:9px 10px;text-align:right;font-size:11px;color:var(--text2);font-weight:600">Totales</td>
            <td style="padding:9px 10px;text-align:center;font-family:var(--mono);font-weight:700">${totalProgramado}</td>
            <td colspan="2" style="padding:9px 10px;text-align:right;font-size:11px;color:var(--text2);font-weight:600;border-left:1px solid var(--border-soft);background:#FFF7E6"></td>
            <td style="padding:9px 10px;text-align:center;font-family:var(--mono);font-weight:700;background:#FFF7E6;color:${totalReal===totalProgramado?'var(--text1)':(totalReal>totalProgramado?'var(--teal-text)':'var(--red-text)')}">${totalReal}</td>
            <td style="padding:9px 10px;text-align:center;border-left:1px solid var(--border-soft);font-family:var(--mono);font-weight:700;color:${montoNeto>=0?'var(--teal-text)':'var(--red-text)'}">${montoNeto!==0?(montoNeto>0?'+':'')+fmt(montoNeto):'—'}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>

    ${(nBonif+nDesc) > 0 ? `
    <div style="background:var(--surface2);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;font-size:12px;color:var(--text2)">
      <strong>Al avanzar a 2.3 se generarán:</strong>
      ${nBonif>0 ? `<span style="margin-left:8px;color:var(--teal-text)">• ${nBonif} bonificación${nBonif===1?'':'es'}</span>`:''}
      ${nDesc>0 ? `<span style="margin-left:8px;color:var(--red-text)">• ${nDesc} descuento${nDesc===1?'':'s'}</span>`:''}
      <span style="margin-left:12px;color:var(--text3)">(impacto neto: ${montoNeto>=0?'+':''}${fmt(montoNeto)})</span>
    </div>
    `:''}
  `;
  const wrap = document.getElementById('real-tabla-wrap');
  if (wrap) wrap.innerHTML = html;

  const valEl = document.getElementById('real-validation-msg');
  if (valEl){
    if (nModif === 0){
      valEl.innerHTML = `<span style="color:var(--green-text)">✓ Sin incidencias · todo se transmitió según lo programado.</span>`;
    } else {
      const parts = [];
      if (nBonif>0) parts.push(`${nBonif} bonif.`);
      if (nDesc>0) parts.push(`${nDesc} desc.`);
      valEl.innerHTML = `<span style="color:var(--amber-text)">${nModif} día${nModif===1?'':'s'} con diferencia · se generarán ${parts.join(' + ')}</span>`;
    }
  }

  const algunaEnEdicion = Object.values(f.overrides).some(o => o?._editing);
  const avBtn = document.getElementById('real-avanzar-btn');
  if (avBtn){
    if (algunaEnEdicion){
      avBtn.disabled = true; avBtn.style.opacity = '0.5'; avBtn.style.cursor='not-allowed';
      avBtn.title = 'Cierra las filas que estás editando antes de avanzar';
    } else {
      avBtn.disabled = false; avBtn.style.opacity=''; avBtn.style.cursor='';
      avBtn.title = '';
    }
  }
}

function onRealFileChange(input){
  const file = input.files && input.files[0];
  if (!file) return;
  window._realForm.reales_archivo_nombre = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    window._realForm.reales_archivo_dataurl = e.target.result;
    window._realForm.reales_archivo_tipo = file.type;
    const el = document.getElementById('real-adjunto-nombre');
    if (el) el.textContent = file.name + ' · cargado';
    recomputeRealesForm();
  };
  reader.readAsDataURL(file);
  const el = document.getElementById('real-adjunto-nombre');
  if (el) el.textContent = file.name + ' · leyendo…';
}

function openRealEdit(fecha){
  const f = window._realForm;
  const oi = findById(data.orden_interna, f.oiId);
  const p = oi.periodo_transmision.find(x => x.fecha === fecha);
  if (!p) return;
  const prog = programadoDe(oi, p);
  if (!f.overrides[fecha]){
    f.overrides[fecha] = {
      hora_inicio: prog.hora_inicio,
      hora_termino: prog.hora_termino,
      spots_diarios: prog.spots_diarios,
      _editing: true
    };
  } else {
    f.overrides[fecha]._editing = true;
  }
  recomputeRealesForm();
}

function closeRealEdit(fecha){
  const f = window._realForm;
  const ov = f.overrides[fecha];
  if (!ov) return;
  const oi = findById(data.orden_interna, f.oiId);
  const p = oi.periodo_transmision.find(x => x.fecha === fecha);
  const prog = programadoDe(oi, p);
  if (!isOverrideDifferent(prog, ov)){
    delete f.overrides[fecha];
  } else {
    ov._editing = false;
  }
  recomputeRealesForm();
}

function updateRealOverride(fecha, field, value){
  const f = window._realForm;
  if (!f.overrides[fecha]) return;
  if (field === 'spots_diarios') f.overrides[fecha][field] = parseInt(value) || 0;
  else f.overrides[fecha][field] = value;
  recomputeRealesForm();
}

function clearRealOverride(fecha){
  const f = window._realForm;
  delete f.overrides[fecha];
  recomputeRealesForm();
}

function cancelReales(){
  const oiId = window._realForm?.oiId;
  window._realForm = null;
  state.formMode = null;
  show('orden_estacion');
  state.selected = oiId || null;
  setTimeout(render, 10);
}

function avanzarA23(){
  const f = window._realForm;
  const oi = findById(data.orden_interna, f.oiId);
  if (!oi) return;

  // 1) Persistir overrides reales
  const reales = [];
  oi.periodo_transmision.forEach(p => {
    const prog = programadoDe(oi, p);
    const ov = f.overrides[p.fecha];
    if (ov && isOverrideDifferent(prog, ov)){
      reales.push({
        fecha: p.fecha,
        hora_inicio: ov.hora_inicio,
        hora_termino: ov.hora_termino,
        spots_diarios: +ov.spots_diarios
      });
    }
  });
  oi.horarios_reales = reales;
  oi.testigos_url = f.testigos_url || null;
  oi.testigos_ubicacion_alterna = f.testigos_ubicacion_alterna || null;
  oi.notas_transmision = f.notas_transmision || null;
  oi.reporte_reales_archivo = f.reales_archivo_nombre || null;
  oi.reporte_reales_dataurl = f.reales_archivo_dataurl || null;
  oi.reporte_reales_tipo = f.reales_archivo_tipo || null;

  // 2) Generar incidencias automáticas (una por fila con diferencia de spots)
  const precio = oi.precio_spot || 0;
  let incCount = data.incidencia ? data.incidencia.length : 0;
  data.incidencia = data.incidencia || [];
  reales.forEach(real => {
    const p = oi.periodo_transmision.find(x => x.fecha === real.fecha);
    const prog = programadoDe(oi, p);
    const diff = real.spots_diarios - prog.spots_diarios;
    if (diff === 0) return; // cambio de horario sin diferencia de spots → sin incidencia
    incCount++;
    data.incidencia.push({
      id: 'in' + incCount,
      orden_interna_id: oi.id,
      tipo: diff > 0 ? 'bonificacion' : 'descuento',
      fecha_transmision: real.fecha,
      spots_asignados: prog.spots_diarios,
      spots_reales: real.spots_diarios,
      diferencia: diff,
      monto_ajuste: diff * precio,
      nota_excepcion: f.notas_transmision || '',
      created_at: new Date().toISOString().slice(0,10)
    });
  });

  // 3) Cambiar estado
  oi.estatus = 'reales_conciliados';
  oi.updated_at = new Date().toISOString().slice(0,10);

  const oiId = oi.id;
  window._realForm = null;
  state.formMode = null;
  show('orden_estacion');
  state.selected = oiId;
  setTimeout(render, 10);
}

// Wrapper para generar PDF #3 desde la pantalla
function generarPDF3Desde(oiId){
  const f = window._realForm;
  const oi = findById(data.orden_interna, oiId);
  if (!oi) return;
  if (f && f.oiId === oiId){
    // Inyectar temporalmente para que el PDF refleje el estado actual
    const temp = [];
    oi.periodo_transmision.forEach(p => {
      const prog = programadoDe(oi, p);
      const ov = f.overrides[p.fecha];
      if (ov && isOverrideDifferent(prog, ov)){
        temp.push({
          fecha: p.fecha,
          hora_inicio: ov.hora_inicio,
          hora_termino: ov.hora_termino,
          spots_diarios: +ov.spots_diarios
        });
      }
    });
    const prev = oi.horarios_reales;
    oi.horarios_reales = temp;
    try {
      generarPDFOrdenInterna(oiId, 'cliente_reales');
    } finally {
      oi.horarios_reales = prev;
    }
    oi.pdf_reales_at = new Date().toISOString();
  } else {
    generarPDFOrdenInterna(oiId, 'cliente_reales');
    oi.pdf_reales_at = new Date().toISOString();
  }
}

function _pdfWindow(titulo){
  const w = window.open('', '_blank', 'width=900,height=1100');
  if (!w){ alert('El navegador bloqueó la ventana emergente. Habilita popups para esta página.'); return null; }

function _pdfBaseCSS(){
  return `
    @page { size: letter; margin: 14mm 14mm; }
    body { font-family: Arial, Helvetica, sans-serif; color:#1a1a1a; font-size:10pt; margin:0; padding:14px 18px 30px; }

    .pdf-meta { font-size:10pt; line-height:1.6; }

    table { width:100%; border-collapse:collapse; font-size:9.5pt; }
    .footer-note { margin-top:30px; font-size:8.5pt; color:#666; }
    .print-bar { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; color:#fff; padding:10px; text-align:center; z-index:100; font-size:11pt; }
    .print-bar button { background:#fff; color:#1a1a1a; border:0; padding:6px 14px; font-size:10pt; border-radius:3px; cursor:pointer; font-weight:600; margin-left:8px; }

}

}

// Helper: refs comunes para los 3 PDFs
function _pdfRefs(oeId){
  const oe = findById(data.orden_interna, oeId);
  if (!oe) return null;
  const oc = findById(data.orden_cliente, oe.orden_id);
  const est = findRef('estacion', oe.estacion_id);
  const af  = est ? findRef('afiliado', est.afiliado_id) : null;
  const pl  = findRef('plaza', oe.plaza_id);
  const an  = oc ? findRef('anunciante', oc.anunciante_id) : null;
  const ag  = (oc && oc.agencia_id) ? findRef('agencia', oc.agencia_id) : null;
  const ve  = oc ? findRef('vendedor', oc.vendedor_principal_id) : null;
  const ef  = oc ? findRef('empresa_facturadora', oc.empresa_facturadora_id) : null;
  const cat_oe = oe.categoria_id ? findRef('categoria', oe.categoria_id) : null;
  return { oe, oc, est, af, pl, an, ag, ve, ef, cat_oe };
}

// PDF #1 — Orden de Servicios Radiofónicos (para el afiliado)
// ─────────────────────────────────────────────────────────────
function generarPDF1(oeId){
  const r = _pdfRefs(oeId);
  if (!r){ alert('Orden interna no encontrada.'); return; }
  const { oe, oc, est, af, pl, an, ag, ve, ef, cat_oe } = r;
  const w = _pdfWindow('PDF #1 · Orden de servicio'); if (!w) return;

  const periodo = Array.isArray(oe.periodo_transmision) ? oe.periodo_transmision : [];
  const totalSpots = oiTotalSpots(oe);
  const totalDias = periodo.length;
  const tarifa = oe.precio_spot || 0;
  const importe = totalSpots * tarifa;
  const iva = importe * 0.16;
  const total = importe + iva;
  const razonFact = ef?.razon_social_empresa || 'RADIO PUBLICIDAD XHMÉXICO, S.A. DE C.V.';
  const direccionFact = ef?.direccion || 'Av. Constituyentes 1154, Col. Lomas Altas, México, D. F., C.P. 11950';
  const hoyTxt = (() => {
    const d = new Date();
    const mes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][d.getMonth()];
    return `${d.getDate()}/ ${mes} /${d.getFullYear()}  ${d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})}`;
  })();
  const fmtFechaCorta = (iso) => {
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  };

  const ventanaTipica = oiVentanaTipica(oe);
  const ventanaTxt = `${ventanaTipica.inicio || '—'} A ${ventanaTipica.termino || '—'}`;

  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Orden de servicio · ${oe.folio_orden_interna}</title>
  <style>${_pdfBaseCSS()}
    .pdf1-frame { border:1px solid #1a1a1a; padding:0; }
    .pdf1-station-banda { padding:8px 14px; border-bottom:1px solid #1a1a1a; display:flex; justify-content:space-between; align-items:center; }
    .pdf1-station-banda b { font-size:11pt }
    .pdf1-data { padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:6px 18px; font-size:10pt; }
    .pdf1-data-row { display:flex; justify-content:space-between; gap:14px; padding:2px 0; }
    .pdf1-data-row b { font-weight:600 }
    .pdf1-data-row .val { font-weight:700 }

  const totalSpots = efectivos.reduce((s,p)=>s+(p.spots_diarios||0), 0);

function renderVerifDetail(it){
  // Solo para verifs ya existentes (los pendientes abren el form directo)
  if (it.pendiente) {
    return `<div class="d-empty">Abre el formulario para capturar la verificación de esta asignación.</div>`;
  }
  const v = it.v;
  const oe = it.oe;
  const oc = findById(data.orden_cliente, oe.orden_id);
  const est = findRef('estacion', oe.estacion_id);
  const an = findRef('anunciante', oe.anunciante_id);
  const inc = data.incidencia.filter(i=>i.verificacion_id===v.id);

  // Datos planeados (snapshot) vs reales
  const planned = {
    fecha: v.fecha_planeada || oe.fecha_transmision,
    hora_inicio: v.hora_inicio_planeada || oe.hora_inicio,
    hora_fin: v.hora_fin_planeada || oe.hora_fin,
    duracion: v.duracion_planeada || oe.duracion_spot,
    spots: v.spots_planeados || oe.spots_asignados,
    precio: v.precio_planeado || oe.precio_spot
  };
  const real = {
    fecha: v.fecha_real || oe.fecha_transmision,
    hora_inicio: v.hora_inicio_real || oe.hora_inicio,
    hora_fin: v.hora_fin_real || oe.hora_fin,
    duracion: v.duracion_spot_real || oe.duracion_spot,
    spots: v.spots_verificados,
    precio: v.precio_spot_real || oe.precio_spot
  };
  // Diffs
  const diffs = [];
  if (planned.fecha !== real.fecha) diffs.push({label:'Fecha', planned:planned.fecha, real:real.fecha});
  if (planned.hora_inicio !== real.hora_inicio) diffs.push({label:'Hora inicio', planned:planned.hora_inicio, real:real.hora_inicio});
  if (planned.hora_fin !== real.hora_fin) diffs.push({label:'Hora fin', planned:planned.hora_fin, real:real.hora_fin});
  if (planned.duracion !== real.duracion) diffs.push({label:'Duración', planned:planned.duracion, real:real.duracion});
  if (planned.spots !== real.spots) diffs.push({label:'Spots', planned:planned.spots, real:real.spots});
  if (planned.precio !== real.precio) diffs.push({label:'Precio', planned:fmt(planned.precio), real:fmt(real.precio)});

  return `
    <div class="dh">
      <div class="dh-row">
        <div>
          <div class="dh-name">Verificación · ${oe.folio_orden_interna}</div>
          <div class="dh-sub"><span class="badge ${v.reconciliada?'b-green':'b-amber'}">${v.reconciliada?'Reconciliada':'Por reconciliar'}</span>${est?`<span class="badge b-teal">${est.nombre_estacion}</span>`:''}</div>
        </div>
      </div>
    </div>
    <div class="db">
      ${diffs.length===0 ? `
        <div class="diff-box ok">
          <div style="font-size:13px;color:var(--green-text);font-weight:600">✓ Sin diferencias</div>
          <div style="font-size:11px;color:var(--text2);margin-top:3px">Todo se ejecutó tal como se asignó.</div>
        </div>
      ` : `
        <div class="diff-box">
          <div style="font-size:12px;color:var(--red-text);font-weight:600;margin-bottom:8px">⚠ ${diffs.length} ${diffs.length===1?'diferencia detectada':'diferencias detectadas'}</div>
          ${diffs.map(d=>`
            <div style="display:flex;align-items:center;gap:10px;font-size:12px;padding:5px 0;border-bottom:1px solid #F5C2C2">
              <span style="font-weight:500;width:90px;color:var(--red-text)">${d.label}</span>
              <span style="font-family:var(--mono);color:var(--text3);text-decoration:line-through">${d.planned}</span>
              <span style="color:var(--text3)">→</span>
              <span style="font-family:var(--mono);color:var(--red-text);font-weight:600">${d.real}</span>
            </div>
          `).join('')}
        </div>
      `}

      <div class="sec">Resumen</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px">
        <div class="mc">
          <div class="mc-lbl">Como se asignó</div>
          <div style="font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text2)">
            ${planned.fecha} · ${planned.hora_inicio}–${planned.hora_fin}<br>
            ${planned.duracion} · ${planned.spots} spots<br>
            ${fmt(planned.precio)}/spot
          </div>
        </div>
        <div class="mc" style="background:${diffs.length===0?'var(--green-bg)':'var(--red-bg)'}">
          <div class="mc-lbl" style="color:${diffs.length===0?'var(--green-text)':'var(--red-text)'}">Como ocurrió</div>
          <div style="font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text)">
            ${real.fecha} · ${real.hora_inicio}–${real.hora_fin}<br>
            ${real.duracion} · ${real.spots} spots<br>
            ${fmt(real.precio)}/spot
          </div>
        </div>
      </div>

      <div class="sec">Reporte del afiliado</div>
      <div class="fl">Fecha del reporte</div>
      <div class="fv mono">${v.fecha_verificacion}</div>
      <div class="fl">Archivo de respaldo</div>
      <div style="display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:12px">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="1" width="8" height="12" rx="1.2" stroke="currentColor" stroke-width="1.1"/></svg>
        ${v.archivo_nombre}
      </div>
      ${v.notas_verificacion?`<div class="fl" style="margin-top:11px">Notas</div><div class="fv muted">${v.notas_verificacion}</div>`:''}

      ${inc.length>0 ? `
        <div class="sec">Incidencias generadas (${inc.length})</div>
        ${inc.map(i=>{
          const tipoLbl = {faltante:'Faltante',excedente:'Excedente',cambio_horario:'Cambio de horario',cambio_fecha:'Cambio de fecha',spot_no_emitido:'Spot no emitido'}[i.tipo_incidencia];
          const tipoCls = {faltante:'b-red',excedente:'b-amber',cambio_horario:'b-blue',cambio_fecha:'b-purple'}[i.tipo_incidencia]||'b-gray';
          const resLbl = {pendiente:'Pendiente',aceptada:'Aceptada',credito_cliente:'Crédito al cliente',descuento_afiliado:'Descuento al afiliado'}[i.resolucion]||i.resolucion;
          const resCls = {pendiente:'b-amber',aceptada:'b-blue',credito_cliente:'b-purple',descuento_afiliado:'b-teal'}[i.resolucion]||'b-gray';
          return `<div style="border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;margin-bottom:6px;font-size:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">

              <span class="badge ${resCls}">${resLbl}</span>
            </div>
            <div style="color:var(--text2);font-size:11px;line-height:1.4">${i.descripcion_incidencia}</div>
            ${i.monto_ajuste?`<div style="font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px">Ajuste: ${fmt(i.monto_ajuste)}</div>`:''}
          </div>`;
        }).join('')}
      `:''}
    </div>
    <div class="df">
      <button class="btn btn-sm" onclick="captureVerifForm('${oe.id}','${v.id}')">Editar lo que ocurrió</button>
      ${!v.reconciliada ? `<button class="btn btn-amber btn-sm" onclick="reconciliar('${v.id}')">Marcar reconciliada y cerrar OE</button>` : `<button class="btn btn-sm" onclick="show('orden_estacion');state.selected='${oe.id}';setTimeout(render,10)">Ver OE cerrada</button>`}
    </div>`;
}

function updateVerifDiffs(){
  const fields = [
    {id:'vr-fecha',  tagId:'dt-fecha',  label:'Fecha',        type:'date'},
    {id:'vr-hi',     tagId:'dt-hi',     label:'Hora inicio',  type:'time'},
    {id:'vr-hf',     tagId:'dt-hf',     label:'Hora fin',     type:'time'},
    {id:'vr-dur',    tagId:'dt-dur',    label:'Duración',     type:'text'},
    {id:'vr-spots',  tagId:'dt-spots',  label:'Spots',        type:'num'},
    {id:'vr-precio', tagId:'dt-precio', label:'Precio',       type:'money'},
  ];

  const diffs = [];
  fields.forEach(f => {
    const el = document.getElementById(f.id);
    if (!el) return;
    const planned = el.dataset.planned;
    const real = el.value;
    const isDiff = planned !== real && real !== '';
    const tag = document.getElementById(f.tagId);
    if (tag) tag.className = 'diff-tag' + (isDiff ? ' show' : '');
    if (isDiff){
      let pDisplay = planned, rDisplay = real;
      if (f.type==='money'){ pDisplay = fmt(planned); rDisplay = fmt(real); }
      diffs.push({...f, planned:pDisplay, real:rDisplay});
    }
  });

  const sum = document.getElementById('diff-summary');
  if (!sum) return;

  if (diffs.length===0){
    sum.innerHTML = `
      <div style="background:var(--green-bg);border:1px solid #A8D585;border-radius:var(--rl);padding:14px 16px;display:flex;align-items:center;gap:10px">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="flex-shrink:0">
          <circle cx="10" cy="10" r="8" stroke="#27500A" stroke-width="1.5"/>
          <path d="M6 10l3 3 5-6" stroke="#27500A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <div style="font-size:13px;font-weight:600;color:#27500A">Sin diferencias</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">Todo coincide con lo asignado. Al confirmar, la OE pasará a cerrada sin incidencias.</div>
        </div>
      </div>`;
    return;
  }

  // Cuántas incidencias se generarán
  const realDur = document.getElementById('vr-dur')?.value;
  const realFecha = document.getElementById('vr-fecha')?.value;
  const realHI = document.getElementById('vr-hi')?.value;
  const realHF = document.getElementById('vr-hf')?.value;
  const realSpots = parseInt(document.getElementById('vr-spots')?.value) || 0;
  const plannedSpots = parseInt(document.getElementById('vr-spots')?.dataset.planned) || 0;

  const incs = [];
  if (realSpots !== plannedSpots) incs.push({tipo:realSpots<plannedSpots?'Faltante':'Excedente', detalle:`${plannedSpots} ordenados → ${realSpots} ejecutados (${realSpots-plannedSpots>=0?'+':''}${realSpots-plannedSpots})`});
  if (realFecha !== document.getElementById('vr-fecha').dataset.planned) incs.push({tipo:'Cambio de fecha', detalle:`${document.getElementById('vr-fecha').dataset.planned} → ${realFecha}`});
  if (realHI !== document.getElementById('vr-hi').dataset.planned || realHF !== document.getElementById('vr-hf').dataset.planned) {
    incs.push({tipo:'Cambio de horario', detalle:`${document.getElementById('vr-hi').dataset.planned}–${document.getElementById('vr-hf').dataset.planned} → ${realHI}–${realHF}`});
  }

  sum.innerHTML = `
    <div style="background:var(--red-bg);border:1px solid #F5C2C2;border-radius:var(--rl);padding:14px 16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1L1 16h16L9 1z" stroke="#791F1F" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 7v4M9 13h.01" stroke="#791F1F" stroke-width="1.5" stroke-linecap="round"/></svg>
        <div style="font-size:13px;font-weight:600;color:#791F1F">${diffs.length} ${diffs.length===1?'campo modificado':'campos modificados'}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:11px">
        ${diffs.map(d=>`<div style="display:flex;gap:10px;font-size:12px;align-items:center"><span style="font-weight:500;width:100px;color:#791F1F">${d.label}</span><span style="font-family:var(--mono);color:var(--text3);text-decoration:line-through">${d.planned}</span><span style="color:var(--text3)">→</span><span style="font-family:var(--mono);color:#791F1F;font-weight:600">${d.real}</span></div>`).join('')}
      </div>
      ${incs.length>0?`
        <div style="border-top:1px solid #F5C2C2;padding-top:10px">
          <div style="font-size:11px;font-weight:600;color:#791F1F;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Se generarán ${incs.length} ${incs.length===1?'incidencia':'incidencias'}:</div>
          <div style="display:flex;flex-direction:column;gap:5px">
            ${incs.map(i=>`<div style="font-size:12px;color:var(--text2)"><span style="font-weight:500;color:#791F1F">${i.tipo}:</span> ${i.detalle}</div>`).join('')}
          </div>
        </div>`:''}
    </div>`;
}

function saveVerifFull(oeId, verifId, closeAfter){
  const oe = findById(data.orden_interna, oeId);
  let verif = verifId ? findById(data.verificacion, verifId) : null;

  // Valores planeados (snapshot — guardamos si es nuevo)
  const planned = verif ? {
    fecha: verif.fecha_planeada || oe.fecha_transmision,
    hora_inicio: verif.hora_inicio_planeada || oe.hora_inicio,
    hora_fin: verif.hora_fin_planeada || oe.hora_fin,
    duracion: verif.duracion_planeada || oe.duracion_spot,
    spots: verif.spots_planeados !== undefined ? verif.spots_planeados : oe.spots_asignados,
    precio: verif.precio_planeado || oe.precio_spot
  } : {
    fecha: oe.fecha_transmision,
    hora_inicio: oe.hora_inicio,
    hora_fin: oe.hora_fin,
    duracion: oe.duracion_spot,
    spots: oe.spots_asignados,
    precio: oe.precio_spot
  };

  // Valores reales del formulario
  const real = {
    fecha: document.getElementById('vr-fecha').value,
    hora_inicio: document.getElementById('vr-hi').value,
    hora_fin: document.getElementById('vr-hf').value,
    duracion: document.getElementById('vr-dur').value,
    spots: parseInt(document.getElementById('vr-spots').value) || 0,
    precio: parseFloat(document.getElementById('vr-precio').value) || 0
  };

  if (isNaN(real.spots)) { alert('Captura los spots transmitidos.'); return; }

  // Crear o actualizar verif
  if (!verif){
    verif = {
      id: 'v'+(data.verificacion.length+100),
      orden_interna_id: oeId,
      // Snapshot
      fecha_planeada: planned.fecha,
      hora_inicio_planeada: planned.hora_inicio,
      hora_fin_planeada: planned.hora_fin,
      duracion_planeada: planned.duracion,
      spots_planeados: planned.spots,
      precio_planeado: planned.precio,
      created_at: new Date().toISOString().substring(0,10)
    };
    data.verificacion.push(verif);
  }
  // Valores reales
  verif.fecha_real = real.fecha;
  verif.hora_inicio_real = real.hora_inicio;
  verif.hora_fin_real = real.hora_fin;
  verif.duracion_spot_real = real.duracion;
  verif.spots_verificados = real.spots;
  verif.precio_spot_real = real.precio;
  verif.fecha_verificacion = document.getElementById('vr-fec-reporte').value;
  verif.notas_verificacion = document.getElementById('vr-notas').value;
  verif.archivo_nombre = verif.archivo_nombre || ('reporte_'+oe.folio_orden_interna+'.pdf');
  verif.reconciliada = closeAfter;

  // Eliminar incidencias anteriores de esta verificación (re-generación)
  data.incidencia = data.incidencia.filter(i => i.verificacion_id !== verif.id);

  // Generar incidencias por cada diff
  const fechaIncStr = real.fecha || oe.fecha_transmision;
  if (real.spots !== planned.spots){
    data.incidencia.push({
      id: 'in'+(Date.now()),
      verificacion_id: verif.id, orden_interna_id: oeId,
      tipo_incidencia: real.spots<planned.spots ? 'faltante' : 'excedente',
      spots_ordenados: planned.spots, spots_ejecutados: real.spots,
      fecha_incidencia: fechaIncStr,
      descripcion_incidencia: verif.notas_verificacion || ('Diferencia detectada: '+planned.spots+' ordenados vs '+real.spots+' ejecutados'),
      resolucion: 'pendiente', monto_ajuste: null
    });
  }
  if (real.fecha !== planned.fecha){
    data.incidencia.push({
      id: 'in'+(Date.now()+1),
      verificacion_id: verif.id, orden_interna_id: oeId,
      tipo_incidencia: 'cambio_fecha',
      spots_ordenados: planned.spots, spots_ejecutados: real.spots,
      fecha_incidencia: fechaIncStr,
      descripcion_incidencia: 'Fecha original '+planned.fecha+', se transmitió en '+real.fecha,
      resolucion: 'pendiente', monto_ajuste: null
    });
  }
  if (real.hora_inicio !== planned.hora_inicio || real.hora_fin !== planned.hora_fin){
    data.incidencia.push({
      id: 'in'+(Date.now()+2),
      verificacion_id: verif.id, orden_interna_id: oeId,
      tipo_incidencia: 'cambio_horario',
      spots_ordenados: planned.spots, spots_ejecutados: real.spots,
      fecha_incidencia: fechaIncStr,
      descripcion_incidencia: 'Horario original '+planned.hora_inicio+'–'+planned.hora_fin+', real '+real.hora_inicio+'–'+real.hora_fin,
      resolucion: 'pendiente', monto_ajuste: null
    });
  }

  // Actualizar la OrdenInterna con los valores reales
  oe.fecha_transmision = real.fecha;
  oe.hora_inicio = real.hora_inicio;
  oe.hora_fin = real.hora_fin;
  oe.duracion_spot = real.duracion;
  oe.spots_asignados = real.spots;
  oe.precio_spot = real.precio;
  oe.estatus = closeAfter ? 'cerrada' : 'en_revision';

  // Regresar a la lista
  state.selected = verif.id;
  show('verificacion');
}

function reconciliar(vId){
  const v = findById(data.verificacion, vId);
  v.reconciliada = true;
  const oe = findById(data.orden_interna, v.orden_interna_id);
  oe.estatus = 'cerrada';
  render();
}


/* ════════════════════════════════════════════════
   RENDERER: INCIDENCIAS
════════════════════════════════════════════════ */
renderers.incidencia = () => {
  // Vista de incidencias del modelo v5 (binario: bonificación / descuento).
  // Las incidencias se crean automáticamente al confirmar 2.3. Esta vista
  // es de consulta y analítica (qué afiliados generan más incidencias).
  let items = (data.incidencia||[]).filter(i=>{
    if (state.filter==='bonificacion' && i.tipo!=='bonificacion') return false;
    if (state.filter==='descuento'    && i.tipo!=='descuento')    return false;
    if (state.search){
      const q = state.search.toLowerCase();
      const oe = findById(data.orden_interna, i.orden_interna_id);
      const est = oe ? findRef('estacion', oe.estacion_id) : null;
      return (oe?.folio_orden_interna||'').toLowerCase().includes(q) || (est?.nombre_estacion||'').toLowerCase().includes(q) || (i.nota_excepcion||'').toLowerCase().includes(q);
    }
    return true;
  });

  const stats = {
    total:(data.incidencia||[]).length,
    bonificacion:(data.incidencia||[]).filter(i=>i.tipo==='bonificacion').length,
    descuento:(data.incidencia||[]).filter(i=>i.tipo==='descuento').length,
    bonifMonto:(data.incidencia||[]).filter(i=>i.tipo==='bonificacion').reduce((s,i)=>s+(i.monto_ajuste||0),0),
    descMonto:(data.incidencia||[]).filter(i=>i.tipo==='descuento').reduce((s,i)=>s+Math.abs(i.monto_ajuste||0),0)
  };

  return `
  <div class="cat-header">
    <div>
      <div class="cat-title">Incidencias</div>
      <div class="cat-sub">Diferencias entre lo asignado y lo realmente transmitido. Solo dos tipos: <strong>bonificación</strong> (afiliado dio de más, se acredita al cliente) y <strong>descuento</strong> (afiliado no cumplió, se descuenta de su pago). Se generan automáticamente al confirmar el sub-estado 2.3 de cada OI.</div>
    </div>
  </div>
  <div style="background:var(--surface2);padding:14px 22px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:18px;font-size:12px">
    <div><div style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Total incidencias</div><div style="font-family:var(--mono);font-size:18px;font-weight:600">${stats.total}</div></div>
    <div><div style="color:var(--teal-text);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Bonificaciones</div><div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--teal-text)">${stats.bonificacion}</div><div style="font-size:10px;color:var(--text3)">${fmt(stats.bonifMonto)}</div></div>
    <div><div style="color:var(--red-text);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Descuentos</div><div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--red-text)">${stats.descuento}</div><div style="font-size:10px;color:var(--text3)">${fmt(stats.descMonto)}</div></div>
    <div><div style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:3px">Saldo neto</div><div style="font-family:var(--mono);font-size:18px;font-weight:600">${fmt(stats.bonifMonto - stats.descMonto)}</div></div>
  </div>
  <div class="toolbar">
    <input class="search" placeholder="Buscar OI, estación, nota…" value="${state.search}" oninput="state.search=this.value;render()">
    <button class="fp ${state.filter==='all'?'active':''}" onclick="state.filter='all';render()">Todas</button>
    <button class="fp ${state.filter==='bonificacion'?'active':''}" onclick="state.filter='bonificacion';render()">Bonificaciones</button>
    <button class="fp ${state.filter==='descuento'?'active':''}" onclick="state.filter='descuento';render()">Descuentos</button>
    <div class="tb-spacer"></div>
    <span class="tb-count">${items.length} de ${stats.total}</span>
  </div>
  <div class="split">
    <div class="list-pane">
      <table>
        <thead><tr>
          <th style="width:14%">OI</th>
          <th style="width:18%">Estación / Afiliado</th>
          <th style="width:11%">Fecha</th>
          <th style="width:8%" class="td-center">Tipo</th>
          <th style="width:9%" class="td-center">Asig. → Real</th>
          <th style="width:12%" class="td-right">Monto</th>
          <th style="width:28%">Nota</th>
        </tr></thead>
        <tbody>
          ${items.map(i=>{
            const oe = findById(data.orden_interna, i.orden_interna_id);
            const est = oe ? findRef('estacion', oe.estacion_id) : null;
            const af = est ? findRef('afiliado', est.afiliado_id) : null;
            const tipoCls = i.tipo==='bonificacion' ? 'b-teal' : 'b-red';
            return `<tr class="${state.selected===i.id?'sel':''}" onclick="state.selected='${i.id}';render()">
              <td><div class="td-mono">${oe?oe.folio_orden_interna:'—'}</div></td>
              <td><div style="font-size:12px">${est?est.nombre_estacion:'—'}</div><div style="font-size:10px;color:var(--text3)">${af?af.nombre_afiliado:''}</div></td>
              <td class="td-mono" style="font-size:11px">${i.fecha_transmision}</td>
              <td class="td-center"><span class="badge ${tipoCls}" style="font-size:10px">${i.tipo}</span></td>
              <td class="td-center td-mono" style="font-size:11px">${i.spots_asignados} → ${i.spots_reales}</td>
              <td class="td-right td-mono" style="font-weight:500;color:${i.tipo==='bonificacion'?'var(--teal-text)':'var(--red-text)'}">${fmt(i.monto_ajuste)}</td>
              <td style="font-size:11px;color:var(--text2)">${i.nota_excepcion||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane" id="detail-pane">${state.selected ? `<div style="padding:30px;color:var(--text3);text-align:center;font-size:12px">Detalle de incidencia pendiente de implementar en Pasos C/D</div>` : emptyDetail('Selecciona una incidencia para ver el detalle')}</div>
  </div>`;
};


function renderIncDetail(i){
  const oe = findById(data.orden_interna, i.orden_interna_id);
  const oc = oe ? findById(data.orden_cliente, oe.orden_id) : null;
  const an = oe ? findRef('anunciante', oe.anunciante_id) : null;
  const est = oe ? findRef('estacion', oe.estacion_id) : null;
  const diff = i.spots_ejecutados - i.spots_ordenados;
  const tipoLbl = {faltante:'Faltante',excedente:'Excedente',cambio_horario:'Cambio de horario',cambio_fecha:'Cambio de fecha',spot_no_emitido:'Spot no emitido'}[i.tipo_incidencia];

  return `
    <div class="dh">
      <div class="dh-name">Incidencia · ${oe?oe.folio_orden_interna:'—'}</div>
      <div class="dh-sub"><span class="badge ${i.resolucion==='pendiente'?'b-amber':'b-green'}">${i.resolucion.replace('_',' ')}</span></div>
    </div>
    <div class="db">
      <div class="heredado-block">
        <div class="heredado-title"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5l3 3 4-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Contexto</div>
        <div class="heredado-grid">
          <div class="heredado-row"><span class="heredado-lbl">Orden cliente</span><span class="heredado-val mono">${oc?oc.folio_orden:'—'}</span></div>
          <div class="heredado-row"><span class="heredado-lbl">Anunciante</span><span class="heredado-val">${an?an.nombre_comercial:'—'}</span></div>
          <div class="heredado-row"><span class="heredado-lbl">Estación</span><span class="heredado-val">${est?est.nombre_estacion:'—'}</span></div>
          <div class="heredado-row"><span class="heredado-lbl">Fecha</span><span class="heredado-val mono">${i.fecha_incidencia}</span></div>
        </div>
      </div>

      <div class="sec">Diferencia</div>
      <div class="diff-box">
        <div class="diff-row" style="margin-bottom:6px">
          <span style="font-size:11px;color:var(--text3)">Ordenados</span>
          <span class="diff-val">${i.spots_ordenados}</span>
          <span style="color:var(--text3)">→</span>
          <span style="font-size:11px;color:var(--text3)">Ejecutados</span>
          <span class="diff-val">${i.spots_ejecutados}</span>
        </div>
        <div class="diff-row">
          <span class="badge b-red">${tipoLbl}</span>
          <strong class="diff-val" style="margin-left:auto;color:var(--red-text)">${diff>=0?'+':''}${diff}</strong>
        </div>
      </div>

      <div class="sec">Descripción</div>
      <div class="fv muted">${i.descripcion_incidencia}</div>

      <div class="sec">Resolución</div>
      <div class="fl">Tipo de resolución</div>
      <select class="fsel" id="ir-tipo">
        <option value="pendiente" ${i.resolucion==='pendiente'?'selected':''}>Pendiente</option>
        <option value="aceptada" ${i.resolucion==='aceptada'?'selected':''}>Aceptada sin ajuste</option>
        <option value="credito_cliente" ${i.resolucion==='credito_cliente'?'selected':''}>Crédito al cliente</option>
        <option value="descuento_afiliado" ${i.resolucion==='descuento_afiliado'?'selected':''}>Descuento al afiliado</option>
        <option value="sin_resolucion" ${i.resolucion==='sin_resolucion'?'selected':''}>Sin resolución</option>
      </select>
      <div class="fl">Monto del ajuste (MXN)</div>
      <input type="number" class="fi" id="ir-monto" value="${i.monto_ajuste||''}" placeholder="0.00" step="0.01">
    </div>
    <div class="df">
      <button class="btn btn-sm">Cancelar</button>
      <button class="btn btn-teal btn-sm" onclick="resolverIncidencia('${i.id}')">Guardar resolución</button>
    </div>`;
}

function resolverIncidencia(id){
  const i = findById(data.incidencia, id);
  i.resolucion = document.getElementById('ir-tipo').value;
  i.monto_ajuste = parseFloat(document.getElementById('ir-monto').value) || null;
  render();
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
