<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GRC-OIR — Fase 0: Catálogos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--surface3:#e6e5de;
  --border:#e0dfd8;--border-med:#c8c7bf;--border-strong:#b0afa8;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-border:#AFA9EC;
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-text:#085041;--teal-border:#5DCAA5;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#FAC775;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --r:8px;--rl:12px;
  --font:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Consolas',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
 
/* ── Header ── */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.02em}
.logo span{color:var(--purple)}
.fase-tag{font-size:11px;font-family:var(--mono);background:var(--purple-bg);color:var(--purple-text);padding:3px 10px;border-radius:20px;font-weight:500}
.header-spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple-bg);color:var(--purple-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
 
/* ── Layout ── */
.app-body{flex:1;display:flex;min-height:0;overflow:hidden}
 
/* ── Sidebar ── */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:14px 0}
.side-section{margin-bottom:18px}
.side-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.side-item{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.side-item:hover{color:var(--text);background:var(--surface2)}
.side-item.active{color:var(--purple);background:var(--purple-bg);border-left-color:var(--purple);font-weight:500}
.side-icon{width:14px;height:14px;flex-shrink:0;opacity:.8}
.side-count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:8px}
.side-item.active .side-count{background:#fff;color:var(--purple-text)}
 
/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
 
/* Header del catálogo */
.cat-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:16px}
.cat-title{font-size:18px;font-weight:600}
.cat-sub{font-size:12px;color:var(--text3);margin-top:3px;max-width:680px}
 
/* Toolbar */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.search{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 12px;font-size:13px;font-family:var(--font);color:var(--text);width:240px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--purple)}
.search::placeholder{color:var(--text3)}
.sel-f{height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 10px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;cursor:pointer}
.sel-f:focus{border-color:var(--purple)}
.fp{height:28px;padding:0 13px;border-radius:20px;border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.fp:hover{color:var(--text);border-color:var(--border-strong)}
.fp.active{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple-text);font-weight:500}
.tb-spacer{flex:1}
.tb-count{font-size:12px;color:var(--text3);font-family:var(--mono)}
 
/* Split */
.split{display:flex;flex:1;overflow:hidden;min-height:0}
.list-pane{flex:1;overflow:auto;background:var(--surface)}
.detail-pane{width:420px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
 
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);letter-spacing:.05em;text-transform:uppercase;position:sticky;top:0;white-space:nowrap;z-index:1}
tbody td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody tr.sel td{background:var(--purple-bg)}
tbody tr.sel-teal td{background:var(--teal-bg)}
tbody tr.sel-amber td{background:var(--amber-bg)}
.td-main{font-weight:500;color:var(--text)}
.td-2{color:var(--text2)}
.td-mono{font-family:var(--mono);font-size:12px;color:var(--text2)}
.td-right{text-align:right}
.td-center{text-align:center}
 
/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap}
.b-purple{background:var(--purple-bg);color:var(--purple-text)}
.b-teal{background:var(--teal-bg);color:var(--teal-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
 
/* Detail panel */
.d-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;padding:32px;text-align:center}
.d-icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--border-med);display:flex;align-items:center;justify-content:center;color:var(--text3)}
.dh{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.dh-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.dh-name{font-size:16px;font-weight:600;color:var(--text)}
.dh-sub{font-size:12px;color:var(--text2);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.db{flex:1;overflow-y:auto;padding:14px 18px}
 
/* Sections inside detail */
.sec{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sec:first-child{margin-top:0}
 
/* Form fields */
.fl{font-size:11px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.fl-required::after{content:'*';color:var(--red-text);margin-left:2px}
.fl-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.fl-tag.cat{background:var(--purple-bg);color:var(--purple-text)}
.fl-tag.her{background:var(--amber-bg);color:var(--amber-text)}
.fl-tag.audit{background:var(--red-bg);color:var(--red-text)}
.fl-tag.calc{background:var(--blue-bg);color:var(--blue-text)}
.fv{font-size:13px;color:var(--text);margin-bottom:11px;min-height:18px}
.fv.mono{font-family:var(--mono);font-size:12px}
.fv.muted{color:var(--text2)}
.fv.link{color:#185FA5}
.fi{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;transition:border-color .15s}
.fi:focus{border-color:var(--purple);background:var(--surface)}
.fi:read-only{background:var(--surface3);color:var(--text2);cursor:not-allowed}
.fsel{width:100%;height:34px;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:0 9px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;cursor:pointer}
.fsel:focus{border-color:var(--purple);background:var(--surface)}
.ftxt{width:100%;border-radius:var(--r);border:1px solid var(--border-med);background:var(--surface2);padding:8px 11px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;margin-bottom:10px;resize:vertical;min-height:60px}
.ftxt:focus{border-color:var(--purple);background:var(--surface)}
.fchk-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px;padding:9px 12px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s}
.fchk-row:hover{background:var(--surface3)}
.fchk{margin-top:1px;flex-shrink:0;accent-color:var(--purple)}
.fchk-body{flex:1}
.fchk-lbl{font-size:13px;color:var(--text);font-weight:500}
.fchk-desc{font-size:11px;color:var(--text3);margin-top:2px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
 
/* Audit notice */
.audit-notice{background:var(--red-bg);border:1px solid #F5C2C2;border-radius:var(--r);padding:8px 11px;margin-bottom:10px;font-size:12px;color:var(--red-text);display:flex;gap:8px;align-items:flex-start}
.audit-notice strong{font-weight:600}
 
/* Inherited notice */
.inherit-notice{background:var(--amber-bg);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--amber-text);margin-top:-7px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
 
/* Footer of detail */
.df{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--surface)}
 
/* Buttons */
.btn{height:34px;padding:0 14px;border-radius:var(--r);border:1px solid var(--border-med);background:transparent;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-sm{height:28px;padding:0 11px;font-size:12px}
.btn-xs{height:24px;padding:0 10px;font-size:11px}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-purple:hover{background:#4840a0;border-color:#4840a0;color:#fff}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-teal:hover{background:#0d5e49;color:#fff}
.btn-danger{background:var(--red-bg);border-color:#F5C2C2;color:var(--red-text)}
.btn-danger:hover{background:#F8DEDE}
 
/* Related items inside detail */
.rel-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;font-size:13px;transition:all .12s;cursor:pointer}
.rel-item:hover{border-color:var(--border-med);background:var(--surface2)}
.rel-name{font-weight:500;color:var(--text)}
.rel-sub{font-size:12px;color:var(--text2);margin-top:2px}
 
/* Inline form (e.g. agregar estación dentro de afiliado) */
.inline-form{background:var(--surface2);border-radius:var(--rl);border:1px solid var(--border-med);padding:13px;margin-bottom:8px}
.if-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
 
/* History panel for audit log */
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.history-item:last-child{border-bottom:none}
.history-when{color:var(--text3);font-family:var(--mono);font-size:10px;width:80px;flex-shrink:0}
.history-body{flex:1}
.history-user{font-weight:500;color:var(--text)}
.history-change{color:var(--text2);margin-top:2px}
.history-change .old{color:var(--red-text);text-decoration:line-through}
.history-change .new{color:var(--green-text);font-weight:500}
 
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
</style>
</head>

function fmt(n){return '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtFull(n){return '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(n){return Number(n).toFixed(n%1===0?0:2)+'%'}
function findById(arr,id){return arr.find(x=>x.id===id)}
 
let state = { cat:'anunciante', selected:null, editing:false, creating:false, filter:'all', search:'' };
 
function show(cat){
  state.cat = cat; state.selected = null; state.editing = false; state.creating = false; state.filter = 'all'; state.search = '';
  document.querySelectorAll('.side-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  render();
}
 
function render(){
  const main = document.getElementById('main');
  const r = renderers[state.cat];
  if (!r) { main.innerHTML='<div style="padding:40px;color:var(--text3)">Catálogo no implementado.</div>'; return; }
  main.innerHTML = r();
  updateCounts();
}
 
function updateCounts(){
  ['anunciante','agencia','contrato','afiliado','plaza','tarifa','vendedor','categoria','constantes'].forEach(k=>{
    const el = document.getElementById('cnt-'+k);
    if (el) el.textContent = (data[k]||[]).length;
  });
}
 
function emptyDetail(msg){
  return `<div class="d-empty"><div class="d-icon">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M9 6v4M9 12h.01" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
  </div>${msg}</div>`;
}

════════════════════════════════════════════════ */
 
const renderers = {};
 
/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
renderers.anunciante = () => {
  const items = data.anunciante.filter(a => {
    if (state.filter==='activo' && !a.activo) return false;

    if (state.filter==='via_agencia' && !a.agencia_id) return false;
    if (state.search) { const q = state.search.toLowerCase(); return a.nombre_comercial.toLowerCase().includes(q) || a.nombre_fiscal.toLowerCase().includes(q) || a.rfc_anunciante.toLowerCase().includes(q) || (a.referencia_anunciante||'').toLowerCase().includes(q); }
    return true;
  });
 
  const sel = state.selected ? findById(data.anunciante, state.selected) : null;
  const marcas = sel ? data.marca.filter(m=>m.anunciante_id===sel.id) : [];
  const contratos = sel ? data.contrato.filter(c=>c.anunciante_id===sel.id) : [];

    <button class="fp ${state.filter==='directo'?'active':''}" onclick="state.filter='directo';render()">Sin agencia</button>
    <div class="tb-spacer"></div>
    <span class="tb-count">${items.length} de ${data.anunciante.length}</span>

function saveAgencia(id){
  const a = findById(data.agencia, id);
  const newCom = parseFloat(document.getElementById('ag-com').value) || null;
  // Audit log para % comisión
  if (newCom !== a.porcentaje_comision_agencia_default) {
    const motivo = document.getElementById('ag-mot').value;
    if (!motivo) { alert('Debes capturar el motivo del cambio cuando modificas el % de comisión.'); return; }
    data.log_cambios.unshift({
      entidad:'Agencia', entidad_id:a.id, campo_modificado:'porcentaje_comision_agencia_default',
      valor_anterior: (a.porcentaje_comision_agencia_default||'NULL').toString()+(a.porcentaje_comision_agencia_default?'.00':''),
      valor_nuevo: (newCom||'NULL').toString()+(newCom?'.00':''),
      usuario:'victor.garcia (Ventas)', fecha_cambio:new Date().toISOString().substring(0,16).replace('T',' '),
      motivo_cambio: motivo
    });
  }
  a.nombre_agencia = document.getElementById('ag-nom').value || a.nombre_agencia;
  a.rfc_agencia = document.getElementById('ag-rfc').value || a.rfc_agencia;
  a.contacto_nombre = document.getElementById('ag-cn').value;
  a.contacto_email = document.getElementById('ag-ce').value;
  a.contacto_telefono = document.getElementById('ag-ct').value;
  a.porcentaje_comision_agencia_default = newCom;
  render();
}

          ${items.map(v=>`<tr class="${state.selected===v.id?'sel':''}" onclick="state.selected='${v.id}';render()">
            <td class="td-main">${v.nombre_vendedor}</td>
            <td class="td-2 td-mono" style="font-size:12px">${v.email_vendedor}</td>
            <td class="td-center td-mono">${v.porcentaje_comision_default?fmtPct(v.porcentaje_comision_default):'—'}</td>
            <td class="td-center"><span class="badge ${v.activo?'b-green':'b-gray'}">${v.activo?'Activo':'Inactivo'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane">${sel?`
      <div class="dh"><div class="dh-name">${sel.nombre_vendedor}</div><div class="dh-sub">${sel.email_vendedor}</div></div>
      <div class="db">
        <div class="sec">Parámetros sensibles</div>
        <div class="audit-notice"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:1px"><path d="M8 1L1 14h14L8 1z" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v4M8 12h.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <div>Modificable por Dirección/Admin. Cada cambio queda registrado en log de auditoría.</div></div>
        <div class="fl">% Comisión default <span class="fl-tag audit">Audit log</span></div>
        <div class="fv mono" style="font-size:18px;font-weight:600;color:var(--purple-text)">${fmtPct(sel.porcentaje_comision_default||0)}</div>
      </div>
      <div class="df"><button class="btn btn-purple btn-sm">Editar</button></div>
    `:emptyDetail('Selecciona un vendedor')}</div>
  </div>`;
};
function newVendedor(){ alert('Form nuevo vendedor: nombre, correo, % comisión default.'); }
 
/* ─────────────────────────────────────────────
   CATEGORÍAS
───────────────────────────────────────────── */
renderers.categoria = () => {
  const sel = state.selected ? findById(data.categoria, state.selected) : null;
  return `
  <div class="cat-header">
    <div><div class="cat-title">Categorías comerciales</div><div class="cat-sub">Catálogo de categorías de industria para segmentar órdenes y reportes.</div></div>
    <button class="btn btn-purple" onclick="newCategoria()">+ Nueva categoría</button>
  </div>
  <div class="toolbar"><input class="search" placeholder="Buscar categoría…" value="${state.search}" oninput="state.search=this.value;renderList()"><div class="tb-spacer"></div><span class="tb-count">${data.categoria.length} categorías</span></div>
  <div class="split">
    <div class="list-pane">
      <table>
        <thead><tr><th style="width:30%">Categoría</th><th style="width:55%">Descripción</th><th style="width:15%" class="td-center">Estatus</th></tr></thead>
        <tbody>
          ${data.categoria.filter(c=>!state.search||c.nombre_categoria.toLowerCase().includes(state.search.toLowerCase())).map(c=>`<tr class="${state.selected===c.id?'sel':''}" onclick="state.selected='${c.id}';render()">
            <td class="td-main">${c.nombre_categoria}</td>
            <td class="td-2">${c.descripcion_categoria||'—'}</td>
            <td class="td-center"><span class="badge ${c.activo?'b-green':'b-gray'}">${c.activo?'Activa':'Inactiva'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="detail-pane">${sel?`
      <div class="dh"><div class="dh-name">${sel.nombre_categoria}</div></div>
      <div class="db">
        <div class="fl">Descripción</div><div class="fv muted">${sel.descripcion_categoria||'Sin descripción'}</div>
      </div>
      <div class="df"><button class="btn btn-purple btn-sm">Editar</button></div>
    `:emptyDetail('Selecciona una categoría')}</div>
  </div>`;
};
function newCategoria(){ alert('Form nueva categoría: nombre + descripción.'); }
 
/* ════════════════════════════════════════════════
   CONSTANTES DEL SISTEMA (solo lectura)
   Agrupa valores SAT (UsoCFDI, FormaPago, MetodoPago, ClaveProdServ,
   ClaveUnidad, MonedaSAT, RegimenFiscal) + configuración del timbrador
   (TipoComprobante, Serie). Filtros por grupo. Edición restringida a
   administrador del sistema (no disponible en este prototipo).
════════════════════════════════════════════════ */
const CONSTANTES_GROUPS = ['TipoComprobante','Serie','RegimenFiscal','ClaveProdServ','ClaveUnidad','UsoCFDI','FormaPago','MetodoPago','MonedaSAT'];
const CONSTANTES_GROUP_LABEL = {
  'TipoComprobante':  'Tipo de comprobante CFDI',
  'Serie':            'Serie de la factura',
  'RegimenFiscal':    'Régimen fiscal SAT',
  'ClaveProdServ':    'Clave de producto/servicio SAT',
  'ClaveUnidad':      'Clave de unidad SAT',
  'UsoCFDI':          'Uso del CFDI',
  'FormaPago':        'Forma de pago SAT',
  'MetodoPago':       'Método de pago SAT',
  'MonedaSAT':        'Moneda',
};
const CONSTANTES_GROUP_DESC = {
  'TipoComprobante':  'Tipo de CFDI emitido. "33" es el formato legacy del timbrador externo; "I/E/P" son los códigos CFDI 4.0.',
  'Serie':            'Cadena que identifica la serie de la factura emisora. Cada empresa facturadora usa una serie distinta.',
  'RegimenFiscal':    'Régimen fiscal del emisor según catálogo SAT c_RegimenFiscal.',
  'ClaveProdServ':    'Clave del producto/servicio según catálogo SAT c_ClaveProdServ. OIR factura típicamente servicios de publicidad.',
  'ClaveUnidad':      'Unidad de medida del concepto facturado. Para servicios suele ser "E48".',
  'UsoCFDI':          'Catálogo SAT c_UsoCFDI. El receptor elige el uso que dará a la factura.',
  'FormaPago':        'Catálogo SAT c_FormaPago. Medio por el que se realiza el pago.',
  'MetodoPago':       'PUE (pago en una sola exhibición) o PPD (pago en parcialidades o diferido).',
  'MonedaSAT':        'Catálogo SAT c_Moneda. MXN es el default.',
};
 
renderers.constantes = () => {
  if (!state.filterGroup) state.filterGroup = 'all';
  const allConst = data.constantes || [];
 
  // Filtrado
  let items = allConst.slice();
  if (state.filterGroup !== 'all') items = items.filter(c => c.grupo === state.filterGroup);
  if (state.search){
    const q = state.search.toLowerCase();
    items = items.filter(c =>
      c.clave.toLowerCase().includes(q) ||
      c.descripcion.toLowerCase().includes(q) ||
      c.grupo.toLowerCase().includes(q)
    );
  }
 
  // Counts por grupo
  const counts = {};
  CONSTANTES_GROUPS.forEach(g => { counts[g] = allConst.filter(c => c.grupo === g).length; });
 
  const filterLabel = state.filterGroup !== 'all' ? CONSTANTES_GROUP_LABEL[state.filterGroup] : '';
 
  return `
  <div class="cat-header">
    <div>
      <div class="cat-title">Constantes del sistema <span style="font-size:11px;color:var(--text3);font-weight:500;background:var(--surface2);padding:2px 8px;border-radius:10px;margin-left:6px">Solo lectura</span></div>
      <div class="cat-sub">Catálogos del SAT y configuración del timbrador externo usados por Facturación (Fase 2). Los valores que aparecen aquí son los que el operador puede elegir en las pantallas 4.1 y 4.2. La edición está restringida al administrador del sistema.</div>
    </div>
  </div>
 
  <!-- Filtros por grupo -->
  <div style="background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 22px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <button class="fp ${state.filterGroup==='all'?'active':''}" onclick="state.filterGroup='all';render()">Todas <span style="opacity:.6;margin-left:3px">${allConst.length}</span></button>
    ${CONSTANTES_GROUPS.map(g => `<button class="fp ${state.filterGroup===g?'active':''}" onclick="state.filterGroup='${g}';render()" title="${CONSTANTES_GROUP_DESC[g]||''}">${CONSTANTES_GROUP_LABEL[g]||g} <span style="opacity:.6;margin-left:3px">${counts[g]||0}</span></button>`).join('')}
  </div>
 
  <div class="toolbar">
    <input class="search" placeholder="Buscar por clave, descripción o grupo…" value="${state.search||''}" oninput="state.search=this.value;render()">
    <div class="tb-spacer"></div>
    <span class="tb-count">${items.length} de ${allConst.length}</span>
  </div>
 
  ${filterLabel ? `<div style="padding:10px 22px;background:var(--purple-bg);border-bottom:1px solid var(--border);font-size:11.5px;color:var(--purple-text);line-height:1.5"><strong>${filterLabel}</strong> · ${CONSTANTES_GROUP_DESC[state.filterGroup]||''}</div>`:''}
 
  <div style="flex:1;overflow:auto;padding:0">
    <table>
      <thead>
        <tr>
          <th style="width:18%">Grupo</th>
          <th style="width:14%">Clave</th>
          <th style="width:48%">Descripción</th>
          <th style="width:12%">Valor configurable</th>
          <th style="width:8%" class="td-center">Estatus</th>
        </tr>
      </thead>
      <tbody>
        ${items.length === 0 ? `<tr><td colspan="5" style="padding:30px;text-align:center;color:var(--text3);font-size:12px">Sin coincidencias.</td></tr>` :
          items.map(c => {
            return `<tr>
              <td><span class="badge b-purple" style="font-size:10px">${c.grupo}</span></td>
              <td class="td-mono" style="font-weight:600">${c.clave}</td>
              <td class="td-2">${c.descripcion}</td>
              <td class="td-mono" style="font-size:11px;color:var(--text2)">${c.valor||'—'}</td>
              <td class="td-center"><span class="badge ${c.activo?'b-green':'b-gray'}" style="font-size:10px">${c.activo?'Activo':'Inactivo'}</span></td>
            </tr>`;
          }).join('')
        }
      </tbody>
    </table>
  </div>
  `;
};
 
/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
