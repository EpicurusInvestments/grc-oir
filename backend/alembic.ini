# alembic.ini — Migraciones del Sistema GRC-OIR (SQL Server en AWS RDS)
#
# La URL de conexión NO se pone aquí: se construye desde el .env en migrations/env.py
# (settings.sqlalchemy_url), para no versionar credenciales.

[alembic]
script_location = migrations
prepend_sys_path = .
# Las revisiones se nombran con timestamp + slug para orden cronológico claro.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
